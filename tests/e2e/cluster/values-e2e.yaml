global:
  environment: e2e
  domain: localhost

postgresql:
  environment: e2e
  storage:
    size: 2Gi
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m
  monitoring:
    enabled: false
  credentials:
    username: musematic
    password: change-me
    database: musematic
    existingSecret: ""

redis:
  auth:
    password: change-me
  global:
    imageRegistry: mirror.gcr.io
    security:
      allowInsecureImages: true
    redis:
      password: change-me
  redis-cluster:
    fullnameOverride: musematic-redis
    image:
      registry: mirror.gcr.io
      repository: bitnamilegacy/redis-cluster
      tag: 8.2.1-debian-12-r0
    password: change-me
    existingSecret: redis-credentials
    existingSecretPasswordKey: password
    cluster:
      init: false
      nodes: 3
      replicas: 0
    volumePermissions:
      enabled: false
    sysctlImage:
      enabled: false
    redis:
      maxmemory: 256Mi
      resources:
        requests:
          cpu: 150m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      livenessProbe:
        initialDelaySeconds: 60
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 12
      readinessProbe:
        initialDelaySeconds: 30
        periodSeconds: 5
        timeoutSeconds: 5
        failureThreshold: 60
    persistence:
      size: 2Gi
    metrics:
      enabled: false
    pdb:
      create: false
  networkPolicy:
    enabled: false

kafka:
  namespace: strimzi-system
  clusterName: musematic-kafka
  combined: true
  combinedReplicas: 1
  replicationFactor: 1
  minInsyncReplicas: 1
  jvmOptions:
    "-Xms": 256m
    "-Xmx": 512m
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi
  storage:
    size: 2Gi
    class: standard
  networkPolicy:
    enabled: false

minio:
  namespace: platform-data
  bucketInit:
    enabled: false
  standalone: true
  servers: 1
  volumesPerServer: 1
  storageSize: 2Gi
  minio:
    enabled: true
  images:
    minio:
      repository: mirror.gcr.io/minio/minio
      tag: latest
    mc:
      repository: mirror.gcr.io/minio/mc
      tag: latest
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi
  networkPolicy:
    enabled: false
  s3:
    endpointUrl: http://musematic-minio.platform-data.svc.cluster.local:9000
    accessKey: platform
    secretKey: change-me
    region: us-east-1
    bucketPrefix: platform

qdrant:
  qdrant:
    replicaCount: 1
    image:
      repository: mirror.gcr.io/qdrant/qdrant
      tag: v1.16.3
    config:
      cluster:
        enabled: false
    persistence:
      size: 2Gi
    resources:
      requests:
        memory: 512Mi
        cpu: 250m
  collections:
    replicationFactor: 1
  networkPolicy:
    enabled: false
  backup:
    enabled: false

neo4j:
  neo4j:
    fullnameOverride: musematic-neo4j
    password: test-neo4j
    image:
      customImage: mirror.gcr.io/library/neo4j:5.21.0
    resources:
      cpu: 500m
      memory: 1Gi
      requests:
        memory: 1Gi
        cpu: 500m
      limits:
        memory: 2Gi
        cpu: "1"
  persistence:
    size: 2Gi
  networkPolicy:
    enabled: false
  backup:
    enabled: false
    image: mirror.gcr.io/library/neo4j:5.21.0
  schemaInit:
    enabled: false
    image: mirror.gcr.io/library/neo4j:5.21.0

clickhouse:
  enabled: true
  clickhouse:
    replicaCount: 1
    keeper:
      enabled: false
      replicaCount: 1
    auth:
      user: default
      password: ""
    resources:
      requests:
        cpu: 250m
        memory: 1Gi
      limits:
        cpu: "1"
        memory: 4Gi
    config:
      max_memory_usage: "2147483648"
      max_insert_block_size: 262144
  persistence:
    size: 2Gi
  schemaInit:
    enabled: false
  backup:
    enabled: false
  networkPolicy:
    enabled: false

opensearch:
  global:
    dockerRegistry: mirror.gcr.io
  opensearch:
    singleNode: true
    protocol: http
    replicas: 1
    image:
      repository: opensearchproject/opensearch
      tag: "2.18.0"
    plugins:
      enabled: false
    config:
      opensearch.yml: |
        cluster.name: opensearch-cluster
        network.host: 0.0.0.0
        discovery.type: single-node
        plugins.security.disabled: true
    extraEnvs:
      - name: DISABLE_SECURITY_PLUGIN
        value: "true"
      - name: DISABLE_INSTALL_DEMO_CONFIG
        value: "true"
      - name: OPENSEARCH_JAVA_OPTS
        value: "-Xms512m -Xmx512m"
    keystore: []
    extraInitContainers: []
    sysctlInit:
      enabled: false
    persistence:
      enableInitChown: false
      image: library/busybox
      imageTag: latest
      size: 2Gi
    resources:
      requests:
        cpu: 250m
        memory: 1Gi
      limits:
        cpu: 500m
        memory: 1Gi
  opensearch-dashboards:
    enabled: false
    image:
      repository: opensearchproject/opensearch-dashboards
      tag: "2.18.0"
  networkPolicy:
    enabled: false
  initJob:
    enabled: false
    image:
      repository: mirror.gcr.io/library/python
      tag: "3.12-slim"

controlPlane:
  image:
    repository: ghcr.io/musematic/control-plane
    tag: local
    pullPolicy: IfNotPresent
  migration:
    enabled: false
  common:
    featureE2EMode: true
    mockLlmEnabled: true
    zeroTrustVisibility: true
    otelResourceAttributes: deployment.environment=e2e
    extraEnv:
      FEATURE_MULTI_REGION: "true"
      FEATURE_MAINTENANCE_MODE: "true"
      API_ANONYMOUS_TIER_NAME: enterprise
      API_DEFAULT_TIER_NAME: enterprise
      A2A_RATE_LIMIT_PER_PRINCIPAL_PER_MINUTE: "1000"
      MCP_RATE_LIMIT_PER_PRINCIPAL_PER_MINUTE: "1000"
  privacy:
    dsrEnabled: true
    dlpEnabled: true
    residencyEnforcementEnabled: true
    clickhousePiiTables: []

  securityCompliance:
    manualEvidenceBucket: evidence-bundles
  auth:
    oauth:
      rateLimitMax: 1000
      rateLimitWindow: 60
      google:
        authorizeUrl: http://mock-google-oidc.platform.svc.cluster.local:8080/authorize
        tokenUrl: http://mock-google-oidc.platform.svc.cluster.local:8080/token
        tokenInfoUrl: http://mock-google-oidc.platform.svc.cluster.local:8080/tokeninfo
      github:
        authorizeUrl: http://mock-github-oauth.platform.svc.cluster.local:8080/login/oauth/authorize
        tokenUrl: http://mock-github-oauth.platform.svc.cluster.local:8080/login/oauth/access_token
        userUrl: http://mock-github-oauth.platform.svc.cluster.local:8080/user
        emailsUrl: http://mock-github-oauth.platform.svc.cluster.local:8080/user/emails
        teamsUrl: http://mock-github-oauth.platform.svc.cluster.local:8080/user/teams
        orgMembershipUrlTemplate: http://mock-github-oauth.platform.svc.cluster.local:8080/user/memberships/orgs/{org}
  connections:
    kafkaBrokers: musematic-kafka-kafka-bootstrap.strimzi-system.svc.cluster.local:9092
    neo4jPassword: test-neo4j
    redisTestMode: cluster
    # E2E-only deterministic Fernet key; not used outside local kind tests.
    authMfaEncryptionKey: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
    rotatingSecrets:
      ROTATING_SECRET_INCIDENT_RESPONSE_INTEGRATIONS_LOCAL_PAGERDUTY_CURRENT: e2e-pagerduty-routing-key
      ROTATING_SECRET_TEST_DB_PASSWORD_CURRENT: test-db-current
  api:
    replicaCount: 1
    service:
      type: NodePort
      port: 8000
      nodePort: 30081
  scheduler:
    replicaCount: 1
  worker:
    replicaCount: 1
  wsHub:
    replicaCount: 1
    service:
      type: NodePort
      port: 8001
      nodePort: 30082

runtimeController:
  replicaCount: 1
  image:
    repository: ghcr.io/musematic/runtime-controller
    tag: local
  config:
    otelResourceAttributes: deployment.environment=e2e
  secrets:
    POSTGRES_DSN: postgres://musematic:change-me@musematic-postgres-rw.platform-data.svc.cluster.local:5432/musematic?sslmode=disable
    REDIS_ADDR: musematic-redis.platform.svc.cluster.local:6379
    REDIS_PASSWORD: change-me
    KAFKA_BROKERS: musematic-kafka-kafka-bootstrap.strimzi-system.svc.cluster.local:9092
    S3_ENDPOINT_URL: http://musematic-minio.platform-data.svc.cluster.local:9000
    S3_BUCKET: platform-execution-artifacts
    S3_ACCESS_KEY: platform
    S3_SECRET_KEY: change-me
    S3_REGION: us-east-1
    S3_USE_PATH_STYLE: "true"
    K8S_DRY_RUN: "false"
  networkPolicy:
    enabled: false

reasoningEngine:
  replicaCount: 1
  image:
    repository: ghcr.io/musematic/reasoning-engine
    tag: local
  hpa:
    minReplicas: 1
    maxReplicas: 1
    targetCPUUtilizationPercentage: 70
  config:
    otelResourceAttributes: deployment.environment=e2e
  secrets:
    POSTGRES_DSN: postgres://musematic:change-me@musematic-postgres-rw.platform-data.svc.cluster.local:5432/musematic?sslmode=disable
    REDIS_ADDR: musematic-redis.platform.svc.cluster.local:6379
    REDIS_PASSWORD: change-me
    KAFKA_BROKERS: musematic-kafka-kafka-bootstrap.strimzi-system.svc.cluster.local:9092
    MINIO_ENDPOINT: http://musematic-minio.platform-data.svc.cluster.local:9000
    MINIO_BUCKET: reasoning-traces

simulationController:
  replicaCount: 1
  image:
    repository: ghcr.io/musematic/simulation-controller
    tag: local
  service:
    type: ClusterIP
    port: 50055
  env:
    OTEL_RESOURCE_ATTRIBUTES: deployment.environment=e2e
  secrets:
    POSTGRES_DSN: postgres://musematic:change-me@musematic-postgres-rw.platform-data.svc.cluster.local:5432/musematic?sslmode=disable
    KAFKA_BROKERS: musematic-kafka-kafka-bootstrap.strimzi-system.svc.cluster.local:9092
    S3_ENDPOINT_URL: http://musematic-minio.platform-data.svc.cluster.local:9000
    S3_ACCESS_KEY: platform
    S3_SECRET_KEY: change-me

sandboxManager:
  fullnameOverride: sandbox-manager
  image:
    repository: ghcr.io/musematic/sandbox-manager
    tag: local
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  config:
    postgresDsn: postgres://musematic:change-me@musematic-postgres-rw.platform-data.svc.cluster.local:5432/musematic?sslmode=disable
    kafkaBrokers: musematic-kafka-kafka-bootstrap.strimzi-system.svc.cluster.local:9092
    minioEndpoint: http://musematic-minio.platform-data.svc.cluster.local:9000
    minioBucket: platform-execution-artifacts
    k8sNamespace: platform-execution

ui:
  replicaCount: 1
  image:
    repository: ghcr.io/musematic/ui
    tag: local
    pullPolicy: IfNotPresent
  service:
    type: NodePort
    port: 3000
    nodePort: 30080
  env:
    NEXT_PUBLIC_API_URL: http://localhost:8081
    NEXT_PUBLIC_WS_URL: ws://localhost:8082/ws
    NEXT_PUBLIC_APP_ENV: e2e

mockOAuth:
  google:
    enabled: true
    image:
      repository: ghcr.io/musematic/mock-google-oidc
      tag: local
      pullPolicy: IfNotPresent
    replicas: 1
    service:
      type: NodePort
      port: 8080
      nodePort: 30083
    resources:
      requests:
        memory: 64Mi
        cpu: 50m
      limits:
        memory: 128Mi
        cpu: 200m
    seedUsers:
      - key: j-admin
        sub: google-admin-001
        email: j-admin@e2e.test
        email_verified: true
      - key: j-creator
        sub: google-creator-001
        email: j-creator@e2e.test
        email_verified: true
      - key: j-consumer
        sub: google-consumer-001
        email: j-consumer@e2e.test
        email_verified: true
      - key: signup-google-example
        sub: google-signup-example-001
        email: signup-google@example.com
        email_verified: true
      - key: signup-google-unauthorized
        sub: google-signup-unauthorized-001
        email: signup-google@unauthorized.com
        email_verified: true
  github:
    enabled: true
    image:
      repository: ghcr.io/musematic/mock-github-oauth
      tag: local
      pullPolicy: IfNotPresent
    replicas: 1
    service:
      type: NodePort
      port: 8080
      nodePort: 30084
    resources:
      requests:
        memory: 64Mi
        cpu: 50m
      limits:
        memory: 128Mi
        cpu: 200m
    seedUsers:
      - key: j-admin-gh
        id: 1001
        login: j-admin
        email: j-admin@e2e.test
      - key: j-creator-gh
        id: 1002
        login: j-creator
        email: j-creator@e2e.test
        orgs:
          - musematic
      - key: signup-github-member
        id: 1101
        login: signup-github-member
        email: signup-github-member@e2e.test
        orgs:
          - musematic
      - key: signup-github-outsider
        id: 1102
        login: signup-github-outsider
        email: signup-github-outsider@e2e.test
