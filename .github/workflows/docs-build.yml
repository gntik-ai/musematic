name: Docs build

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'requirements-docs.txt'
      - 'scripts/generate-env-docs.py'
      - 'scripts/check-doc-references.py'
      - 'scripts/check-doc-translation-parity.py'
      - 'scripts/export-openapi.py'
      - 'scripts/aggregate-helm-docs.py'
      - 'apps/control-plane/**'
      - 'deploy/helm/**'
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    name: Build documentation
    runs-on: ubuntu-latest
    env:
      DISABLE_MKDOCS_2_WARNING: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements-docs.txt
            apps/control-plane/pyproject.toml

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Install docs dependencies
        run: python -m pip install -r requirements-docs.txt

      - name: Install control-plane dependencies
        run: python -m pip install -e "./apps/control-plane"

      - name: Install helm-docs
        run: |
          set -euo pipefail
          version=1.13.1
          archive="helm-docs_${version}_Linux_x86_64.tar.gz"
          curl -fsSLO "https://github.com/norwoodj/helm-docs/releases/download/v${version}/${archive}"
          curl -fsSLO "https://github.com/norwoodj/helm-docs/releases/download/v${version}/checksums.txt"
          grep "${archive}" checksums.txt | sha256sum -c -
          tar -xzf "${archive}"
          sudo mv helm-docs /usr/local/bin/helm-docs

      - name: Check OpenAPI snapshot drift
        run: |
          python scripts/export-openapi.py
          git diff --exit-code docs/api-reference/openapi.json \
            || {
              echo "OpenAPI spec drift - re-run scripts/export-openapi.py and commit docs/api-reference/openapi.json"
              exit 1
            }

      - name: Check Helm values snapshot drift
        run: |
          helm-docs --chart-search-root=deploy/helm
          python scripts/aggregate-helm-docs.py --output docs/configuration/helm-values.md
          git diff --exit-code docs/configuration/helm-values.md deploy/helm \
            || {
              echo "Helm values docs drift - re-run helm-docs --chart-search-root=deploy/helm and python scripts/aggregate-helm-docs.py --output docs/configuration/helm-values.md"
              exit 1
            }

      - name: Build MkDocs site
        run: mkdocs build --strict

      - name: Upload site artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: site/

      - name: Deploy versioned docs
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mike deploy --push --update-aliases v1.3.0 latest
