name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: read
  security-events: write
  issues: write
  pull-requests: write

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      go-reasoning: ${{ steps.filter.outputs.go-reasoning }}
      go-runtime: ${{ steps.filter.outputs.go-runtime }}
      go-sandbox: ${{ steps.filter.outputs.go-sandbox }}
      go-simulation: ${{ steps.filter.outputs.go-simulation }}
      go-any: ${{ steps.matrices.outputs.go-any }}
      go-matrix: ${{ steps.matrices.outputs.go-matrix }}
      frontend: ${{ steps.filter.outputs.frontend }}
      localization-messages: ${{ steps.filter.outputs.localization-messages }}
      helm: ${{ steps.filter.outputs.helm }}
      migrations: ${{ steps.filter.outputs.migrations }}
      proto: ${{ steps.filter.outputs.proto }}
      images: ${{ steps.filter.outputs.images }}
      image-any: ${{ steps.matrices.outputs.image-any }}
      image-matrix: ${{ steps.matrices.outputs.image-matrix }}
      readme: ${{ steps.filter.outputs.readme }}
      docs: ${{ steps.filter.outputs.docs }}
      e2e: ${{ steps.filter.outputs.e2e }}
      terraform: ${{ steps.filter.outputs.terraform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            python:
              - 'apps/control-plane/**'
              - 'scripts/check-me-endpoint-scope.py'
              - 'scripts/tests/test_check_me_endpoint_scope.py'
              - 'scripts/check-secret-access.py'
              - 'scripts/tests/test_check_secret_access.py'
              - 'scripts/check-admin-role-gates.py'
              - 'scripts/tests/test_check_admin_role_gates.py'
              - '!apps/control-plane/**/*.md'
            go-reasoning:
              - 'services/reasoning-engine/**'
              - '!services/reasoning-engine/**/*.md'
            go-runtime:
              - 'services/runtime-controller/**'
              - '!services/runtime-controller/**/*.md'
            go-sandbox:
              - 'services/sandbox-manager/**'
              - '!services/sandbox-manager/**/*.md'
            go-simulation:
              - 'services/simulation-controller/**'
              - '!services/simulation-controller/**/*.md'
            frontend:
              - 'apps/web/**'
              - '!apps/web/**/*.md'
            localization-messages:
              - 'apps/web/messages/**'
            helm:
              - 'deploy/helm/**'
              - '!deploy/helm/**/*.md'
            migrations:
              - 'apps/control-plane/migrations/**'
            proto:
              - 'services/*/proto/**'
              - '!services/*/proto/**/*.md'
            images:
              - 'apps/control-plane/**'
              - 'apps/web/**'
              - 'services/**'
              - '!apps/control-plane/**/*.md'
              - '!apps/web/**/*.md'
              - '!services/**/*.md'
            readme:
              - 'README*.md'
            docs:
              - 'docs/**'
              - 'mkdocs.yml'
              - 'requirements-docs.txt'
              - 'scripts/generate-env-docs.py'
              - 'scripts/check-doc-references.py'
              - 'scripts/check-doc-translation-parity.py'
              - 'scripts/export-openapi.py'
              - 'scripts/aggregate-helm-docs.py'
            e2e:
              - 'tests/e2e/**'
              - 'deploy/helm/**'
              - 'apps/control-plane/**'
              - 'apps/web/**'
              - 'services/**'
            terraform:
              - 'terraform/**'

      - name: Build dynamic matrices
        id: matrices
        env:
          GO_REASONING: ${{ steps.filter.outputs.go-reasoning }}
          GO_RUNTIME: ${{ steps.filter.outputs.go-runtime }}
          GO_SANDBOX: ${{ steps.filter.outputs.go-sandbox }}
          GO_SIMULATION: ${{ steps.filter.outputs.go-simulation }}
          PYTHON_CHANGED: ${{ steps.filter.outputs.python }}
          FRONTEND_CHANGED: ${{ steps.filter.outputs.frontend }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          output_path = Path(os.environ["GITHUB_OUTPUT"])

          go_rows = []
          if os.environ["GO_REASONING"] == "true":
              go_rows.append(
                  {
                      "service": "reasoning-engine",
                      "coverage_exclude_re": "/(api/grpc/v1|proto/api/grpc/v1|cmd/reasoning-engine|internal/events|internal/escalation|pkg/persistence)$",
                  }
              )
          if os.environ["GO_RUNTIME"] == "true":
              go_rows.append(
                  {
                      "service": "runtime-controller",
                      "coverage_exclude_re": "/api/grpc/v1$|/cmd/runtime-controller$|/internal/state$|/pkg/k8s$",
                  }
              )
          if os.environ["GO_SANDBOX"] == "true":
              go_rows.append({"service": "sandbox-manager", "coverage_exclude_re": ""})
          if os.environ["GO_SIMULATION"] == "true":
              go_rows.append({"service": "simulation-controller", "coverage_exclude_re": ""})

          image_rows = []
          if os.environ["PYTHON_CHANGED"] == "true":
              image_rows.append(
                  {
                      "image": "control-plane",
                      "dockerfile": "apps/control-plane/Dockerfile",
                      "context": "apps/control-plane",
                  }
              )
          if os.environ["FRONTEND_CHANGED"] == "true":
              image_rows.append(
                  {
                      "image": "web",
                      "dockerfile": "apps/web/Dockerfile",
                      "context": ".",
                  }
              )
          for env_key, service_name in (
              ("GO_REASONING", "reasoning-engine"),
              ("GO_RUNTIME", "runtime-controller"),
              ("GO_SANDBOX", "sandbox-manager"),
              ("GO_SIMULATION", "simulation-controller"),
          ):
              if os.environ[env_key] == "true":
                  image_rows.append(
                      {
                          "image": service_name,
                          "dockerfile": f"services/{service_name}/Dockerfile",
                          "context": f"services/{service_name}",
                      }
                  )

          with output_path.open("a", encoding="utf-8") as handle:
              handle.write(f"go-any={'true' if go_rows else 'false'}\n")
              handle.write(f"go-matrix={json.dumps({'include': go_rows})}\n")
              handle.write(f"image-any={'true' if image_rows else 'false'}\n")
              handle.write(f"image-matrix={json.dumps({'include': image_rows})}\n")
          PY

  lint-python:
    name: Lint Python
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/control-plane
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/control-plane/pyproject.toml

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Ruff
        run: ruff check src/platform entrypoints

      - name: Privacy cascade coverage
        working-directory: .
        run: python ci/lint_privacy_cascade_coverage.py

      - name: Lint direct LLM calls
        run: python ../../ci/lint_llm_calls.py --root ../..

      - name: Lint sensitive log leakage
        run: python ../../ci/check_sensitive_logs.py tests src

      - name: Check /me endpoint scoping
        working-directory: .
        run: python scripts/check-me-endpoint-scope.py

      - name: Lint admin role gates
        run: python scripts/lint_admin_role_gates.py

      - name: Lint bootstrap secret logging
        run: python scripts/lint_bootstrap_secrets.py

      - name: Verify admin OpenAPI tags
        run: python scripts/verify_admin_openapi_tags.py

  typecheck-python:
    name: Type-check Python
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/control-plane
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/control-plane/pyproject.toml

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Mypy
        run: mypy src/platform

  check-secret-access:
    name: Check secret access boundaries
    needs: changes
    if: needs.changes.outputs.python == 'true' || needs.changes.outputs.go-any == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check direct secret access
        run: python scripts/check-secret-access.py

  check-admin-role-gates:
    name: Check admin role gates
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check admin role gates
        run: python scripts/check-admin-role-gates.py

  test-python:
    name: Test Python (>=95% coverage)
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: musematic
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d musematic"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    defaults:
      run:
        working-directory: apps/control-plane
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/control-plane/pyproject.toml

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Pytest
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/musematic
          REDIS_TEST_MODE: standalone
          REDIS_URL: redis://localhost:6379
        run: pytest --import-mode=importlib --cov --cov-report=xml --cov-fail-under=95

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage
          path: apps/control-plane/coverage.xml

  openapi-lint:
    name: OpenAPI lint
    needs:
      - changes
      - test-python
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/control-plane/pyproject.toml

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: python -m pip install -e "./apps/control-plane[dev]"

      - name: Generate OpenAPI doc
        run: |
          cd apps/control-plane
          PYTHONPATH=src python -c "from platform.main import create_app; import json; print(json.dumps(create_app().openapi()))" > /tmp/openapi.json

      - name: Lint with Spectral
        env:
          NPM_CONFIG_CACHE: /tmp/.npm
        run: >
          npx --yes @stoplight/spectral-cli@6.15.0 lint /tmp/openapi.json
          --ruleset .spectral.yaml
          --fail-severity error
          --display-only-failures

  journey-tests:
    name: Journey tests (${{ matrix.secret_mode }})
    needs: changes
    if: needs.changes.outputs.e2e == 'true' || needs.changes.outputs.python == 'true' || needs.changes.outputs.helm == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        secret_mode: [mock, kubernetes, vault]
    env:
      CLUSTER_NAME: musematic-${{ matrix.secret_mode }}-${{ github.run_id }}
      PLATFORM_VAULT_MODE: ${{ matrix.secret_mode }}
      E2E_JOURNEY_WORKERS: "2"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tests/e2e/pyproject.toml

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Setup kind
        uses: helm/kind-action@v1
        with:
          install_only: true
          version: v0.23.0

      - name: Install E2E dependencies
        run: python -m pip install -e "./tests/e2e[e2e]"

      - name: Bootstrap kind cluster
        run: tests/e2e/cluster/bootstrap.sh

      - name: Run OAuth bootstrap suite
        working-directory: tests/e2e
        env:
          PLATFORM_VAULT_MODE: ${{ matrix.secret_mode }}
        run: |
          mkdir -p reports
          python -m pytest \
            suites/oauth_bootstrap \
            -v \
            --junitxml=reports/oauth-bootstrap-${{ matrix.secret_mode }}.xml

      - name: Run J01, J11, and J19 journeys
        working-directory: tests/e2e
        run: |
          mkdir -p reports
          python -m pytest \
            journeys/test_j01_admin_bootstrap.py \
            journeys/test_j11_security_officer.py \
            journeys/test_j19_new_user_signup.py \
            -m journey \
            -n "${E2E_JOURNEY_WORKERS}" \
            --dist=loadfile \
            --junitxml=reports/journey-${{ matrix.secret_mode }}.xml

      - name: Capture cluster state on failure
        if: failure()
        run: tests/e2e/cluster/capture-state.sh

      - name: Delete kind cluster
        if: always()
        run: kind delete cluster --name "${CLUSTER_NAME}"

  readme-parity:
    name: README parity
    needs: changes
    if: needs.changes.outputs.readme == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Run README parity check
        id: parity
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number || 0 }}
        run: |
          set +e
          if [ "$PR_NUMBER" = "0" ]; then
            python scripts/check-readme-parity.py | tee /tmp/readme-parity.out
          else
            python scripts/check-readme-parity.py --pr-number "$PR_NUMBER" | tee /tmp/readme-parity.out
          fi
          status="${PIPESTATUS[0]}"
          set -e
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Comment on parity drift
        if: github.event_name == 'pull_request' && steps.parity.outputs.status != '0'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr comment "$PR_NUMBER" --body-file /tmp/readme-parity.out --edit-last \
            || gh pr comment "$PR_NUMBER" --body-file /tmp/readme-parity.out

      - name: Open or update drift issue
        if: github.event_name == 'pull_request' && steps.parity.outputs.status != '0'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: scripts/open-or-update-drift-issue.sh "$PR_NUMBER" /tmp/readme-parity.out

      - name: Fail on hard README parity errors
        if: steps.parity.outputs.status == '2'
        run: exit 2

  docs-staleness:
    name: Docs staleness
    needs: changes
    if: needs.changes.outputs.docs == 'true' || needs.changes.outputs.helm == 'true' || needs.changes.outputs.python == 'true' || needs.changes.outputs.go-any == 'true'
    runs-on: ubuntu-latest
    env:
      DISABLE_MKDOCS_2_WARNING: "true"
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install docs dependencies
        run: python -m pip install -r requirements-docs.txt

      - name: Install helm-docs
        run: |
          set -euo pipefail
          version=1.13.1
          archive="helm-docs_${version}_Linux_x86_64.tar.gz"
          curl -fsSLO "https://github.com/norwoodj/helm-docs/releases/download/v${version}/${archive}"
          curl -fsSLO "https://github.com/norwoodj/helm-docs/releases/download/v${version}/checksums.txt"
          grep "${archive}" checksums.txt | sha256sum -c -
          tar -xzf "${archive}"
          sudo mv helm-docs /usr/local/bin/helm-docs

      - name: Start docs staleness report
        run: |
          : > /tmp/docs-staleness.out

      - name: Check env-var docs drift
        id: env_var_docs_drift
        continue-on-error: true
        run: |
          set -euo pipefail
          echo "Checking env-var-doc drift" | tee -a /tmp/docs-staleness.out
          python scripts/generate-env-docs.py > /tmp/environment-variables.md
          diff -u docs/configuration/environment-variables.md /tmp/environment-variables.md \
            >> /tmp/docs-staleness.out 2>&1

      - name: Check Helm values docs drift
        id: helm_values_docs_drift
        continue-on-error: true
        run: |
          set -euo pipefail
          echo "Checking Helm values docs drift" | tee -a /tmp/docs-staleness.out
          helm-docs --chart-search-root=deploy/helm >> /tmp/docs-staleness.out 2>&1
          git diff --exit-code deploy/helm >> /tmp/docs-staleness.out 2>&1
          python scripts/aggregate-helm-docs.py > /tmp/helm-values.md
          diff -u docs/configuration/helm-values.md /tmp/helm-values.md \
            >> /tmp/docs-staleness.out 2>&1

      - name: Check FR references
        id: fr_reference_docs_drift
        continue-on-error: true
        run: |
          set -euo pipefail
          echo "Checking FR references" | tee -a /tmp/docs-staleness.out
          python scripts/check-doc-references.py docs >> /tmp/docs-staleness.out 2>&1

      - name: Check docs translation parity
        id: docs_translation_parity
        continue-on-error: true
        run: |
          set -euo pipefail
          echo "Checking docs translation parity" | tee -a /tmp/docs-staleness.out
          python scripts/check-doc-translation-parity.py docs >> /tmp/docs-staleness.out 2>&1

      - name: Add docs staleness remediation
        if: always() && (steps.env_var_docs_drift.outcome == 'failure' || steps.helm_values_docs_drift.outcome == 'failure' || steps.fr_reference_docs_drift.outcome == 'failure' || steps.docs_translation_parity.outcome == 'failure')
        run: |
          {
            echo
            echo "Docs staleness detected."
            echo
            echo "Remediation:"
            echo "- Env-var-doc drift: re-run python scripts/generate-env-docs.py --output docs/configuration/environment-variables.md and commit the result"
            echo "- Re-run helm-docs --chart-search-root=deploy/helm and commit changed chart README files"
            echo "- Re-run python scripts/aggregate-helm-docs.py --output docs/configuration/helm-values.md and commit the result"
            echo "- Fix any broken FR references reported above"
            echo "- Add or refresh localized files under docs/getting-started, docs/user-guide, and docs/admin-guide within the 7-day grace window"
          } >> /tmp/docs-staleness.out

      - name: Comment on docs staleness
        if: always() && github.event_name == 'pull_request' && (steps.env_var_docs_drift.outcome == 'failure' || steps.helm_values_docs_drift.outcome == 'failure' || steps.fr_reference_docs_drift.outcome == 'failure' || steps.docs_translation_parity.outcome == 'failure')
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr comment "$PR_NUMBER" --body-file /tmp/docs-staleness.out --edit-last \
            || gh pr comment "$PR_NUMBER" --body-file /tmp/docs-staleness.out

      - name: Fail on docs staleness
        if: always() && (steps.env_var_docs_drift.outcome == 'failure' || steps.helm_values_docs_drift.outcome == 'failure' || steps.fr_reference_docs_drift.outcome == 'failure' || steps.docs_translation_parity.outcome == 'failure')
        run: exit 1

  validate-terraform:
    name: Validate Terraform
    needs: changes
    if: needs.changes.outputs.terraform == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.9

      - name: Terraform fmt
        run: terraform fmt -check -recursive terraform

      - name: Terraform validate dev
        working-directory: terraform/environments/dev
        run: |
          terraform init -backend=false
          terraform validate

      - name: Terraform validate production
        working-directory: terraform/environments/production
        run: |
          terraform init -backend=false
          terraform validate

  lint-go:
    name: Lint Go (${{ matrix.service }})
    needs: changes
    if: needs.changes.outputs.go-any == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.changes.outputs.go-matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: services/${{ matrix.service }}/go.mod
          cache: true

      - name: GolangCI-Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.6.2
          working-directory: services/${{ matrix.service }}
          args: --timeout=5m

  test-go:
    name: Test Go (${{ matrix.service }}, >=95% coverage)
    needs: changes
    if: needs.changes.outputs.go-any == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.changes.outputs.go-matrix) }}
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/${{ matrix.service }}/go.mod
          cache: true

      - name: Go test (race)
        run: go test -race ./...

      - name: Go coverage
        env:
          COVERAGE_EXCLUDE_RE: ${{ matrix.coverage_exclude_re }}
        run: |
          if [ -n "$COVERAGE_EXCLUDE_RE" ]; then
            packages="$(go list ./... | grep -Ev "$COVERAGE_EXCLUDE_RE")"
            coverpkg="$(printf '%s\n' "$packages" | paste -sd, -)"
            go test $packages -coverpkg="$coverpkg" -coverprofile=coverage.out
          else
            go test ./... -coverprofile=coverage.out
          fi

      - name: Check coverage threshold
        run: |
          total="$(go tool cover -func=coverage.out | awk '/^total:/ {print $3}' | tr -d '%')"
          awk -v total="$total" 'BEGIN { if (total + 0 < 95.0) { printf "FAIL: %s%% < 95%%\n", total; exit 1 } }'

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage-${{ matrix.service }}
          path: services/${{ matrix.service }}/coverage.out

  lint-frontend:
    name: Lint Frontend
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm type-check

  test-frontend:
    name: Test Frontend (>=95% coverage)
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run coverage
        run: pnpm test:coverage

      - name: Run accessibility checks
        continue-on-error: true
        run: pnpm test:a11y

      - name: Upload accessibility report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-a11y
          path: |
            apps/web/test-results/a11y-results.json
            apps/web/playwright-report/a11y/

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: apps/web/coverage/

  localization-drift-check:
    name: Localization drift check
    needs: changes
    if: >
      github.event_name == 'pull_request' &&
      needs.changes.outputs.localization-messages == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: musematic
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d musematic"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/control-plane/pyproject.toml

      - name: Install dependencies
        run: python -m pip install -e "./apps/control-plane[dev]"

      - name: Run migrations
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/musematic
          POSTGRES_DSN: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/musematic
        run: make migrate

      - name: Check translation drift
        env:
          POSTGRES_DSN: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/musematic
        run: |
          set +e
          cd apps/control-plane
          python -m platform.localization.tooling.drift_check \
            --repo-root ../.. \
            --pr-base "${{ github.event.pull_request.base.sha }}" \
            2>&1 | tee /tmp/localization-drift.log
          status="${PIPESTATUS[0]}"
          {
            echo "### Localization drift check"
            echo
            echo '```'
            cat /tmp/localization-drift.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$status"

  localization-vendor-sync:
    name: Localization vendor sync
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/control-plane/pyproject.toml

      - name: Install dependencies
        run: python -m pip install -e "./apps/control-plane[dev]"

      - name: Prepare vendor token for SecretProvider
        working-directory: apps/control-plane
        env:
          LOCALIZATION_VENDOR_API_TOKEN: ${{ secrets.LOCALIZATION_VENDOR_API_TOKEN }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          token = os.environ.get("LOCALIZATION_VENDOR_API_TOKEN")
          if not token:
              raise SystemExit(0)
          Path(".vault-secrets.json").write_text(
              json.dumps(
                  {
                      "secret/data/musematic/ci/connectors/localization/vendor-api-token": {
                          "value": token
                      }
                  },
                  sort_keys=True,
                  indent=2,
              )
              + "\n",
              encoding="utf-8",
          )
          PY

      - name: Pull vendor translations
        working-directory: apps/control-plane
        env:
          LOKALISE_PROJECT_ID: ${{ vars.LOKALISE_PROJECT_ID }}
        run: |
          python -m platform.localization.tooling.vendor_sync \
            --vendor lokalise \
            --project-id "${LOKALISE_PROJECT_ID:-}" \
            --messages-dir ../web/messages

      - name: Detect catalogue changes
        id: translation_changes
        run: |
          if git diff --quiet -- apps/web/messages; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open translation sync PR
        if: steps.translation_changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          branch="chore/translations-sync-$(date -u +%Y%m%d%H%M%S)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$branch"
          git add apps/web/messages
          git commit -m "chore: sync localization catalogues"
          git push origin "$branch"
          gh pr create \
            --draft \
            --title "chore: sync localization catalogues" \
            --body "Automated localization vendor sync for non-English message catalogues."

  build-images:
    name: Build image (${{ matrix.image }})
    needs: changes
    if: needs.changes.outputs.image-any == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.changes.outputs.image-matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.image }}
          tags: |
            type=sha,prefix=sha-
          flavor: |
            latest=false

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  helm-lint:
    name: Helm lint
    needs: changes
    if: needs.changes.outputs.helm == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Install kubeconform
        run: |
          curl --fail --location --silent --show-error --retry 5 --retry-delay 5 --retry-all-errors \
            -o kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          gzip -t kubeconform.tar.gz
          tar -xzf kubeconform.tar.gz kubeconform
          sudo install -m 0755 kubeconform /usr/local/bin/kubeconform

      - name: Install helm-unittest
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --version v0.7.1 --verify=false

      - name: Check Loki label cardinality
        run: python scripts/ci/check_loki_label_cardinality.py

      - name: Validate observability dashboards and alerts
        run: |
          helm unittest deploy/helm/observability
          python scripts/ci/check_observability_dashboards.py

      - name: Lint charts
        run: |
          for chart in deploy/helm/*/; do
            helm dependency build "$chart" >/dev/null 2>&1 || true
            helm lint "$chart" --strict
            helm template release "$chart" \
              | kubeconform -strict -ignore-missing-schemas -kubernetes-version 1.29.0
            helm template release "$chart" --api-versions loki.grafana.com/v1/LokiRule \
              | kubeconform -strict -ignore-missing-schemas -kubernetes-version 1.29.0
          done

  migration-check:
    name: Migration chain integrity
    needs: changes
    if: needs.changes.outputs.migrations == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: musematic
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d musematic"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/control-plane/pyproject.toml

      - name: Install dependencies
        run: python -m pip install -e "./apps/control-plane[dev]"

      - name: Validate migration chain
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/musematic
        run: |
          make migrate
          output="$(make migrate-check)"
          echo "$output"
          if echo "$output" | grep -q "Rev:"; then
            echo "Migration graph is not linear"
            exit 1
          fi

  security-secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE}}

  security-trivy:
    name: Trivy image scan (${{ matrix.image }})
    needs:
      - changes
      - build-images
    if: needs.changes.outputs.image-any == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.changes.outputs.image-matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build scan target
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          load: true
          push: false
          tags: scan-target:${{ matrix.image }}

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: scan-target:${{ matrix.image }}
          format: sarif
          output: trivy-${{ matrix.image }}.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Upload SARIF
        if: ${{ always() && hashFiles(format('trivy-{0}.sarif', matrix.image)) != '' }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.image }}.sarif
          category: trivy-${{ matrix.image }}

      - name: Upload scan artifact
        if: ${{ always() && hashFiles(format('trivy-{0}.sarif', matrix.image)) != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: scan-results-trivy-${{ matrix.image }}
          path: trivy-${{ matrix.image }}.sarif

  security-pip-audit:
    name: pip-audit
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/control-plane/pyproject.toml

      - name: Install scanner
        run: python -m pip install --upgrade "pip>=26.0.1" pip-audit

      - name: Run pip-audit
        run: |
          mkdir -p scan-results
          pip-audit ./apps/control-plane \
            --cache-dir "${RUNNER_TEMP}/pip-audit-cache" \
            --progress-spinner off \
            -f json \
            -o scan-results/pip-audit.json || true
          test -s scan-results/pip-audit.json || echo '{"dependencies":[]}' > scan-results/pip-audit.json

      - name: Upload scan artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-results-pip-audit
          path: scan-results/pip-audit.json

  security-bandit:
    name: Bandit
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/control-plane/pyproject.toml

      - name: Install scanner
        run: python -m pip install "bandit[toml]"

      - name: Run Bandit
        run: |
          mkdir -p scan-results
          bandit -r apps/control-plane/src -f json -o scan-results/bandit.json || true
          test -s scan-results/bandit.json || echo '{"results":[]}' > scan-results/bandit.json

      - name: Upload scan artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-results-bandit
          path: scan-results/bandit.json

  security-govulncheck:
    name: govulncheck
    needs: changes
    if: needs.changes.outputs.go-any == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          cache: true

      - name: Install scanner
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: |
          mkdir -p scan-results
          : > scan-results/govulncheck.jsonl
          : > scan-results/govulncheck.stderr.log
          for mod in services/*/go.mod; do
            service_dir="$(dirname "$mod")"
            (cd "$service_dir" && govulncheck -json ./...) >> scan-results/govulncheck.jsonl 2>> scan-results/govulncheck.stderr.log || true
          done
          python ci/normalize_govulncheck.py \
            scan-results/govulncheck.jsonl \
            --output scan-results/govulncheck.json \
            --invalid-output scan-results/govulncheck-invalid.log

      - name: Upload scan artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-results-govulncheck
          path: |
            scan-results/govulncheck.json
            scan-results/govulncheck-invalid.log
            scan-results/govulncheck.stderr.log

  security-gosec:
    name: gosec
    needs: changes
    if: needs.changes.outputs.go-any == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          cache: true

      - name: Install scanner
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run gosec
        run: |
          mkdir -p scan-results
          gosec -fmt=json -out=scan-results/gosec.json ./services/... || true
          test -s scan-results/gosec.json || echo '{"Issues":[]}' > scan-results/gosec.json

      - name: Upload scan artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-results-gosec
          path: scan-results/gosec.json

  security-npm-audit:
    name: npm audit
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run npm audit
        run: |
          mkdir -p ../../scan-results
          pnpm audit --json > ../../scan-results/npm-audit.json || true
          test -s ../../scan-results/npm-audit.json || echo '{"vulnerabilities":{}}' > ../../scan-results/npm-audit.json

      - name: Upload scan artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-results-npm-audit
          path: scan-results/npm-audit.json

  upload-security-artefacts:
    name: Upload security artefacts
    needs:
      - changes
      - security-trivy
      - security-pip-audit
      - security-bandit
      - security-govulncheck
      - security-gosec
      - security-npm-audit
    if: >
      always() &&
      (needs.changes.outputs.image-any == 'true' ||
       needs.changes.outputs.python == 'true' ||
       needs.changes.outputs.go-any == 'true' ||
       needs.changes.outputs.frontend == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download scan artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: scan-results-*
          merge-multiple: true
          path: scan-results

      - name: Normalize and upload scan results
        env:
          PLATFORM_API_URL: ${{ secrets.PLATFORM_API_URL }}
          PLATFORM_JWT: ${{ secrets.PLATFORM_RELEASE_PUBLISHER_JWT }}
          PLATFORM_OIDC_EXCHANGE_URL: ${{ secrets.PLATFORM_OIDC_EXCHANGE_URL }}
        run: |
          python ci/normalize_scan_results.py scan-results \
            --release-version "${GITHUB_SHA}" \
            --metadata scan-metadata.json \
            --output scan-results/normalized.json

      - name: Upload normalized scan artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-results-normalized
          path: scan-results/normalized.json

  proto-check:
    name: Proto lint
    needs: changes
    if: needs.changes.outputs.proto == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Buf
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true

      - name: Validate proto formatting and generation
        working-directory: services/reasoning-engine
        run: |
          pushd proto
          buf format --diff --exit-code
          buf lint
          popd
          buf generate proto --template buf.gen.yaml
          git diff --exit-code -- api/grpc/v1
