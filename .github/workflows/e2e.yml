name: E2E

"on":
  pull_request:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  CLUSTER_NAME: amp-e2e
  PORT_UI: 8080
  PORT_API: 8081
  PORT_WS: 8082

jobs:
  e2e:
    name: e2e
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: tests/e2e
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free runner disk space
        run: |
          df -h
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /usr/share/swift || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          docker system prune -af --volumes || true
          df -h

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tests/e2e/pyproject.toml

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext-base

      - name: Install E2E dependencies
        run: python -m pip install -e ".[e2e]"

      - name: Render kind config
        run: make render-kind-config

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: ${{ env.CLUSTER_NAME }}
          config: /tmp/kind-config-${{ env.CLUSTER_NAME }}.yaml

      - name: Build and load local images
        run: make load-images

      - name: Report Docker disk usage after image load
        run: docker system df || true

      - name: Provision E2E environment
        run: SKIP_LOAD_IMAGES=true make e2e-up

      - name: Run bounded-context suites
        run: make e2e-test

      - name: Run E2E journey tests
        run: make e2e-journeys

      - name: Run chaos suites
        run: make e2e-chaos

      - name: Run performance suites
        run: make e2e-perf

      - name: Capture cluster state on failure
        if: failure()
        run: |
          mkdir -p reports
          make capture-state > reports/state-dump.txt 2>&1 || true

      - name: Upload E2E reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-reports-${{ github.run_id }}
          path: tests/e2e/reports/
          retention-days: 30
          if-no-files-found: warn

      - name: Tear down kind cluster
        if: always()
        run: make e2e-down || true
