# UPD-054 (107) — SaaS-pass soak workflow.
#
# Runs `make e2e-saas-soak` on a nightly cron against the latest commit
# on main. Catches the long-tail flakes (cleanup leaks, fixture races
# under sustained load) that a single PR-time invocation cannot find.
#
# Does NOT block PR merges; failure posts a comment to the soak
# tracking issue so the platform team can triage.
#
# Per spec.md SC-006: zero orphan tenants / DNS records / Stripe
# customers / K8s Secrets after 100 runs.

name: SaaS-pass soak

on:
  schedule:
    # 02:00 UTC daily — picks up changes that landed during the work day.
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      iterations:
        description: "Number of soak iterations (default 100)"
        required: false
        default: "100"

permissions:
  contents: read
  issues: write
  packages: read

jobs:
  soak:
    name: SaaS-pass soak
    runs-on: ubuntu-latest
    timeout-minutes: 600  # 10h — single-iteration is ~30min so 100 iter ~ 8h
    env:
      E2E_SAAS_SOAK_ITERATIONS: ${{ inputs.iterations || '100' }}
      E2E_JOURNEY_WORKERS: "4"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tests/e2e/pyproject.toml

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Setup kind
        uses: helm/kind-action@v1
        with:
          install_only: true
          version: v0.23.0

      - name: Install stripe-cli
        run: |
          set -euo pipefail
          version=1.21.8
          archive="stripe_${version}_linux_x86_64.tar.gz"
          curl -fsSLO "https://github.com/stripe/stripe-cli/releases/download/v${version}/${archive}"
          tar -xzf "${archive}" stripe
          sudo mv stripe /usr/local/bin/stripe

      - name: Install E2E dependencies
        run: python -m pip install -e "./tests/e2e[e2e]"

      - name: Bootstrap kind cluster
        run: tests/e2e/cluster/bootstrap.sh

      - name: Run SaaS-pass soak
        run: make e2e-saas-soak

      - name: Verify no orphans
        if: always()
        run: python tests/e2e/scripts/verify_no_orphans.py

      - name: Post soak failure comment
        if: failure() && github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Find the open issue with the `infra: soak-failure` label, or open a new one.
          issue=$(gh issue list --label "infra: soak-failure" --state open --limit 1 --json number --jq '.[0].number' || true)
          run_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          body=$(printf '%s\n%s\n%s\n' \
            "Soak run failed: $run_url" \
            "" \
            "See the failure-artefact bundle in the run for the four-pillar dump (screenshots, audit chain, tenant state, journey log).")
          if [ -n "$issue" ]; then
            gh issue comment "$issue" --body "$body"
          else
            gh issue create \
              --title "SaaS-pass soak run failed ${{ github.run_id }}" \
              --label "infra: soak-failure" \
              --body "$body"
          fi

      - name: Upload soak artefacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-saas-soak-${{ github.run_id }}-reports
          path: tests/e2e/reports/
          retention-days: 30

      - name: Delete kind cluster
        if: always()
        run: kind delete cluster --name "musematic-soak-${{ github.run_id }}" || true
