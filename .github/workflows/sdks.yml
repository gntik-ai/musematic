name: SDKs

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag (e.g. v1.4.0)
        required: true
        type: string
      dry_run:
        description: Generate SDKs without publishing them
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  packages: write
  id-token: write

concurrency:
  group: sdks-${{ github.event.release.tag_name || inputs.release_tag }}
  cancel-in-progress: false

jobs:
  fetch-openapi:
    name: Fetch OpenAPI document
    runs-on: ubuntu-latest
    outputs:
      openapi_sha: ${{ steps.hash.outputs.sha }}
      release_tag: ${{ steps.version.outputs.tag }}
      package_version: ${{ steps.version.outputs.version }}
    steps:
      - name: Resolve release version
        id: version
        run: |
          tag="${{ github.event.release.tag_name || inputs.release_tag }}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Fetch /api/openapi.json
        run: |
          set -euo pipefail
          curl --fail --retry 3 --retry-delay 5             "https://api.musematic.ai/api/openapi.json"             --output openapi.json
          test -s openapi.json

      - name: Verify version matches release
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path('openapi.json').read_text(encoding='utf-8'))
          expected = '${{ steps.version.outputs.version }}'
          actual = str(payload.get('info', {}).get('version', ''))
          if actual != expected:
              raise SystemExit(f'OpenAPI version mismatch: expected {expected}, got {actual}')
          PY

      - name: Filter out admin operations
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path('openapi.json').read_text(encoding='utf-8'))
          payload['paths'] = {
              path: operations
              for path, operations in payload.get('paths', {}).items()
              if not any(
                  isinstance(operation, dict) and 'admin' in operation.get('tags', [])
                  for operation in operations.values()
              )
          }
          Path('openapi.json').write_text(json.dumps(payload), encoding='utf-8')
          PY

      - name: Hash for traceability
        id: hash
        run: echo "sha=$(sha256sum openapi.json | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Upload OpenAPI artifact
        uses: actions/upload-artifact@v4
        with:
          name: openapi
          path: openapi.json
          retention-days: 90

      - name: Attach OpenAPI to release
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ steps.version.outputs.tag }}" openapi.json --clobber

  guard-schema-skew:
    name: Detect breaking schema changes
    runs-on: ubuntu-latest
    needs: [fetch-openapi]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download current OpenAPI
        uses: actions/download-artifact@v4
        with:
          name: openapi
          path: current

      - name: Download previous release OpenAPI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p previous
          previous_tag="$(gh release list --limit 2 | tail -1 | awk '{print $1}')"
          if [ -n "$previous_tag" ]; then
            gh release download "$previous_tag" --pattern 'openapi.json' --dir previous ||               echo 'no previous release openapi asset found; skipping download'
          else
            echo 'no previous release found; skipping'
          fi

      - name: Diff paths and schema shapes
        env:
          GH_RELEASE_BODY: ${{ github.event.release.body || '' }}
        run: |
          if [ -f previous/openapi.json ]; then
            python ci/schema_diff.py previous/openapi.json current/openapi.json
          else
            echo 'No previous OpenAPI artifact; skipping schema skew guard.'
          fi

  generate:
    name: Generate ${{ matrix.lang }}
    runs-on: ubuntu-latest
    needs: [fetch-openapi]
    strategy:
      fail-fast: true
      matrix:
        lang: [python, go, typescript, rust]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download OpenAPI artifact
        uses: actions/download-artifact@v4
        with:
          name: openapi
          path: .

      - name: Setup Python
        if: matrix.lang == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Go
        if: matrix.lang == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - name: Setup Node
        if: matrix.lang == 'typescript' || matrix.lang == 'rust'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Python - openapi-python-client
        if: matrix.lang == 'python'
        run: |
          python -m pip install 'openapi-python-client==0.21.*'
          openapi-python-client generate --path openapi.json --output-path musematic-client
          ls -1 musematic-client/

      - name: Go - oapi-codegen
        if: matrix.lang == 'go'
        run: |
          go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@v2.4.0
          mkdir -p musematic-sdk-go
          oapi-codegen -generate types,client -package musematic openapi.json > musematic-sdk-go/client.go
          cat > musematic-sdk-go/go.mod <<'EOF'
          module github.com/gntik-ai/musematic-sdk-go

          go 1.25.0
          EOF

      - name: TypeScript - openapi-typescript
        if: matrix.lang == 'typescript'
        run: |
          npm install --no-save 'openapi-typescript@7' 'openapi-fetch@0.11'
          mkdir -p musematic-sdk-ts/src
          npx openapi-typescript openapi.json -o musematic-sdk-ts/src/schema.d.ts
          cat > musematic-sdk-ts/package.json <<EOF
          {
            "name": "@musematic/sdk",
            "version": "${{ needs.fetch-openapi.outputs.package_version }}",
            "type": "module",
            "files": ["src"],
            "exports": {
              ".": {
                "types": "./src/schema.d.ts"
              }
            }
          }
          EOF
          echo '# musematic TypeScript SDK' > musematic-sdk-ts/README.md

      - name: Rust - openapi-generator-cli
        if: matrix.lang == 'rust'
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-21-jre-headless
          npm install -g '@openapitools/openapi-generator-cli@2.13'
          openapi-generator-cli generate             -i openapi.json             -g rust             -o musematic-sdk-rust

      - name: Upload SDK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdk-${{ matrix.lang }}
          path: |
            musematic-client/
            musematic-sdk-go/
            musematic-sdk-ts/
            musematic-sdk-rust/
          if-no-files-found: error

  publish:
    name: Publish ${{ matrix.lang }}
    runs-on: ubuntu-latest
    needs: [generate, guard-schema-skew, fetch-openapi]
    if: ${{ success() && !inputs.dry_run }}
    strategy:
      fail-fast: false
      matrix:
        lang: [python, go, typescript, rust]
    steps:
      - name: Download SDK artifact
        uses: actions/download-artifact@v4
        with:
          name: sdk-${{ matrix.lang }}

      - name: Setup Python
        if: matrix.lang == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Python - publish to PyPI
        if: matrix.lang == 'python'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          python -m pip install build twine
          cd musematic-client
          python -m build
          twine upload dist/*

      - name: Go - attach to GitHub release
        if: matrix.lang == 'go'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tar -czf musematic-sdk-go.tgz musematic-sdk-go
          gh release upload "${{ needs.fetch-openapi.outputs.release_tag }}" musematic-sdk-go.tgz --clobber

      - name: TypeScript - publish to npm
        if: matrix.lang == 'typescript'
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd musematic-sdk-ts
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          npm publish --access public

      - name: Rust - publish to crates.io
        if: matrix.lang == 'rust'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          cd musematic-sdk-rust
          cargo publish
