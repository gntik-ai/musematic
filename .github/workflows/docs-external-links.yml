name: README external link check

on:
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-readme-links:
    name: Check README external links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check external links
        id: linkcheck
        env:
          NPM_CONFIG_CACHE: /tmp/.npm
        run: |
          set +e
          status=0
          : > /tmp/readme-external-links.out
          for file in README*.md; do
            [ -e "$file" ] || continue
            echo "Checking $file" | tee -a /tmp/readme-external-links.out
            npx --yes markdown-link-check "$file" --config .github/markdown-link-check.json \
              | tee -a /tmp/readme-external-links.out
            file_status="${PIPESTATUS[0]}"
            if [ "$file_status" != "0" ]; then
              status="$file_status"
            fi
          done
          set -e
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Open tracking issue on failure
        if: steps.linkcheck.outputs.status != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create docs \
            --color 0969da \
            --description "Documentation work" >/dev/null 2>&1 || true
          gh label create external-link-rot \
            --color d29922 \
            --description "External documentation link check failed" >/dev/null 2>&1 || true
          {
            echo "The weekly README external link check failed."
            echo
            echo '```text'
            cat /tmp/readme-external-links.out
            echo '```'
          } > /tmp/readme-external-links-issue.md
          gh issue create \
            --title "External link rot detected in READMEs" \
            --body-file /tmp/readme-external-links-issue.md \
            --label docs,external-link-rot

      - name: Fail workflow when links fail
        if: steps.linkcheck.outputs.status != '0'
        run: exit 1
