<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="720" viewBox="0 0 1120 720" role="img" aria-labelledby="title desc">
  <title id="title">Musematic architecture overview</title>
  <desc id="desc">High-level Musematic topology showing the Next.js frontend, Python control plane, Go satellite services, Kafka event bus, data stores, and observability stack.</desc>
  <rect width="1120" height="720" fill="#f8fafc"/>
  <rect x="36" y="36" width="1048" height="648" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="560" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#0f172a">Musematic Platform Topology</text>
  <text x="560" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#475569">Kubernetes-native control plane with scalable satellite services</text>

  <rect x="400" y="155" width="320" height="82" rx="10" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="560" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#312e81">Kafka Event Bus</text>
  <text x="560" y="214" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#4338ca">domain events, audit stream, workflow signals</text>

  <rect x="410" y="300" width="300" height="160" rx="12" fill="#ecfeff" stroke="#0891b2" stroke-width="3"/>
  <text x="560" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#164e63">Python Control Plane</text>
  <text x="560" y="374" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#155e75">FastAPI bounded contexts</text>
  <text x="560" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#155e75">governance, policy, registry, workspaces</text>
  <text x="560" y="422" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#155e75">analytics, incidents, privacy, cost controls</text>

  <rect x="84" y="315" width="190" height="68" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="179" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#14532d">Next.js Frontend</text>
  <text x="179" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#166534">operator and user workbench</text>

  <rect x="96" y="455" width="250" height="44" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="221" y="482" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#9a3412">runtime-controller</text>
  <rect x="96" y="511" width="250" height="44" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="221" y="538" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#9a3412">sandbox-manager</text>
  <rect x="96" y="567" width="250" height="44" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="221" y="594" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#9a3412">reasoning-engine</text>
  <rect x="96" y="623" width="250" height="44" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="221" y="650" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#9a3412">simulation-controller</text>
  <text x="221" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#7c2d12">Go Satellite Services</text>

  <rect x="786" y="285" width="250" height="44" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="2"/>
  <text x="911" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#334155">PostgreSQL</text>
  <rect x="786" y="338" width="250" height="44" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="2"/>
  <text x="911" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#334155">Redis</text>
  <rect x="786" y="391" width="250" height="44" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="2"/>
  <text x="911" y="418" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#334155">Qdrant</text>
  <rect x="786" y="444" width="250" height="44" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="2"/>
  <text x="911" y="471" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#334155">Neo4j</text>
  <rect x="786" y="497" width="250" height="44" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="2"/>
  <text x="911" y="524" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#334155">ClickHouse</text>
  <rect x="786" y="550" width="250" height="44" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="2"/>
  <text x="911" y="577" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#334155">OpenSearch</text>
  <rect x="786" y="603" width="250" height="44" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="2"/>
  <text x="911" y="630" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#334155">S3-compatible storage</text>
  <text x="911" y="259" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#334155">Data Stores</text>

  <rect x="375" y="560" width="370" height="80" rx="12" fill="#fdf2f8" stroke="#db2777" stroke-width="2"/>
  <text x="560" y="592" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#831843">Observability Stack</text>
  <text x="560" y="620" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9d174d">Prometheus, Grafana, Jaeger, Loki</text>

  <path d="M274 349 L410 370" stroke="#0f172a" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M560 237 L560 300" stroke="#0f172a" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M410 408 L346 477" stroke="#0f172a" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M410 420 L346 533" stroke="#0f172a" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M410 432 L346 589" stroke="#0f172a" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M410 444 L346 645" stroke="#0f172a" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M710 360 L786 307" stroke="#0f172a" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M710 380 L786 360" stroke="#0f172a" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M710 400 L786 413" stroke="#0f172a" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M710 420 L786 466" stroke="#0f172a" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M710 440 L786 519" stroke="#0f172a" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M560 460 L560 560" stroke="#0f172a" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M560 300 L560 237" stroke="#4f46e5" stroke-width="2" fill="none" stroke-dasharray="7 6"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#0f172a"/>
    </marker>
  </defs>
</svg>
