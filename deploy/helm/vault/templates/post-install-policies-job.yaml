{{- if .Values.policyJob.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "musematic-vault.fullname" . }}-policies
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "musematic-vault.labels" . | indent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
{{ include "musematic-vault.labels" . | indent 8 }}
        app.kubernetes.io/name: {{ include "musematic-vault.fullname" . }}-policies
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-vault
          image: {{ .Values.policyJob.image | quote }}
          env:
            - name: VAULT_ADDR
              value: {{ .Values.policyJob.vaultAddr | quote }}
          command:
            - /bin/sh
            - -ec
            - |
              until vault status >/dev/null 2>&1; do
                sleep 5
              done
      containers:
        - name: write-policies
          image: {{ .Values.policyJob.image | quote }}
          env:
            - name: VAULT_ADDR
              value: {{ .Values.policyJob.vaultAddr | quote }}
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.policyJob.tokenSecretName | quote }}
                  key: {{ .Values.policyJob.tokenSecretKey | quote }}
                  optional: true
          volumeMounts:
            - name: policies
              mountPath: /policies
              readOnly: true
          command:
            - /bin/sh
            - -ec
            - |
              for policy_file in /policies/platform-*.hcl; do
                policy_name="$(basename "${policy_file}" .hcl)"
                if vault policy read "${policy_name}" >/tmp/current-policy 2>/dev/null; then
                  if diff -q /tmp/current-policy "${policy_file}" >/dev/null 2>&1; then
                    echo "policy ${policy_name} already current"
                    continue
                  fi
                fi
                vault policy write "${policy_name}" "${policy_file}"
              done
      volumes:
        - name: policies
          configMap:
            name: {{ include "musematic-vault.fullname" . }}-policies
{{- end }}
