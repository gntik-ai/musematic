{{- $existing := lookup "v1" "Secret" .Release.Namespace "qdrant-api-key" -}}
{{- $apiKey := randAlphaNum 32 -}}
{{- if and $existing $existing.data (hasKey $existing.data "QDRANT_API_KEY") -}}
{{- $apiKey = (index $existing.data "QDRANT_API_KEY" | b64dec) -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: qdrant-api-key
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  QDRANT_API_KEY: {{ $apiKey | quote }}
