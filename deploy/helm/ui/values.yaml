replicaCount: 1

image:
  repository: ghcr.io/musematic/ui
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3000
  nodePort: null

env:
  NEXT_PUBLIC_API_URL: http://localhost:8000
  NEXT_PUBLIC_WS_URL: ws://localhost:8000/ws
  NEXT_PUBLIC_APP_ENV: production

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
