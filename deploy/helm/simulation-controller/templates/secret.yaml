apiVersion: v1
kind: Secret
metadata:
  name: {{ include "simulation-controller.fullname" . }}-secrets
type: Opaque
stringData:
  POSTGRES_DSN: {{ .Values.secrets.POSTGRES_DSN | quote }}
  KAFKA_BROKERS: {{ .Values.secrets.KAFKA_BROKERS | quote }}
  S3_ENDPOINT_URL: {{ .Values.secrets.S3_ENDPOINT_URL | quote }}
  S3_ACCESS_KEY: {{ .Values.secrets.S3_ACCESS_KEY | quote }}
  S3_SECRET_KEY: {{ .Values.secrets.S3_SECRET_KEY | quote }}
