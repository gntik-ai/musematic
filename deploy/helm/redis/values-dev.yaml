redis-cluster:
  architecture: standalone
  cluster:
    nodes: 1
    replicas: 0
  redis:
    maxmemory: "1Gi"
  persistence:
    size: 10Gi
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi
  metrics:
    enabled: false
  pdb:
    create: false

networkPolicy:
  enabled: false
