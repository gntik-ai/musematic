apiVersion: apps/v1
kind: Deployment
metadata:
  name: public-pages
  namespace: {{ .Values.namespace }}
  labels:
{{ include "musematic-public-pages.labels" . | indent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
{{ include "musematic-public-pages.selectorLabels" . | indent 6 }}
  template:
    metadata:
      labels:
{{ include "musematic-public-pages.selectorLabels" . | indent 8 }}
    spec:
      securityContext:
{{ toYaml .Values.securityContext | indent 8 }}
      containers:
        - name: public-pages
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: NEXT_PUBLIC_ROUTE_GROUP
              value: "public"
            - name: POSTGRES_REPLICA_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.replicaDsnSecretRef.name }}
                  key: {{ .Values.postgres.replicaDsnSecretRef.key }}
                  optional: true
            - name: PUBLIC_PAGES_SNAPSHOT_CONFIGMAP
              value: {{ .Values.snapshot.configmapName }}
          resources:
{{ toYaml .Values.resources | indent 12 }}
          volumeMounts:
            - name: snapshot
              mountPath: /etc/public-pages/snapshot
              readOnly: true
          livenessProbe:
            httpGet:
              path: /legal/sub-processors
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /legal/sub-processors
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: snapshot
          configMap:
            name: {{ .Values.snapshot.configmapName }}
            optional: true
