apiVersion: v1
kind: Service
metadata:
  name: public-pages
  namespace: {{ .Values.namespace }}
  labels:
{{ include "musematic-public-pages.labels" . | indent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: 3000
      protocol: TCP
  selector:
{{ include "musematic-public-pages.selectorLabels" . | indent 4 }}
