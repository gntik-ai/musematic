{{- if not .Values.credentials.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: platform-data
type: kubernetes.io/basic-auth
stringData:
  username: {{ .Values.credentials.username | quote }}
  password: {{ required "credentials.password is required when credentials.existingSecret is empty" .Values.credentials.password | quote }}
  database: {{ .Values.credentials.database | quote }}
{{- end }}

