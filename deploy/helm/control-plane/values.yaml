image:
  repository: ghcr.io/musematic/control-plane
  tag: latest
  pullPolicy: IfNotPresent

common:
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi
  featureE2EMode: false
  mockLlmEnabled: false
  zeroTrustVisibility: false
  otelExporterEndpoint: http://otel-collector.platform-observability.svc.cluster.local:4318
  otelServiceName: control-plane
  otelResourceAttributes: deployment.environment=production
  wsClientBufferSize: 1000
  wsHeartbeatIntervalSeconds: 30
  wsHeartbeatTimeoutSeconds: 10

connections:
  postgresDsn: postgresql+asyncpg://postgres:change-me@musematic-postgres-rw.platform-data.svc.cluster.local:5432/musematic
  redisUrl: redis://:change-me@musematic-redis-redis-cluster.platform-data.svc.cluster.local:6379/0
  kafkaBrokers: musematic-kafka-kafka-bootstrap.platform-data.svc.cluster.local:9092
  qdrantHost: musematic-qdrant.platform-data.svc.cluster.local
  qdrantPort: 6333
  qdrantGrpcPort: 6334
  neo4jUri: bolt://musematic-neo4j.platform-data.svc.cluster.local:7687
  neo4jUser: neo4j
  neo4jPassword: neo4j
  clickhouseHost: musematic-clickhouse.platform-data.svc.cluster.local
  clickhousePort: 8123
  clickhouseUser: default
  clickhousePassword: ""
  clickhouseDatabase: default
  opensearchHosts: http://musematic-opensearch.platform-data.svc.cluster.local:9200
  opensearchUsername: admin
  opensearchPassword: admin
  s3EndpointUrl: http://musematic-minio.platform-data.svc.cluster.local:9000
  s3AccessKey: platform
  s3SecretKey: change-me
  s3Region: us-east-1
  s3BucketPrefix: platform
  s3UsePathStyle: true
  s3Provider: generic
  grpcRuntimeController: musematic-runtime-controller.platform.svc.cluster.local:50051
  grpcReasoningEngine: reasoning-engine.platform.svc.cluster.local:50052
  grpcSandboxManager: sandbox-manager.platform.svc.cluster.local:50053
  grpcSimulationController: musematic-simulation-controller.platform.svc.cluster.local:50055
  authJwtSecretKey: change-me
  authJwtAlgorithm: HS256

migration:
  enabled: true
  hook: pre-install,pre-upgrade
  backoffLimit: 3
  retryAttempts: 1
  retryDelaySeconds: 5

api:
  enabled: true
  replicaCount: 1
  service:
    type: ClusterIP
    port: 8000
    nodePort: null

scheduler:
  enabled: true
  replicaCount: 1

worker:
  enabled: true
  replicaCount: 1

wsHub:
  enabled: true
  replicaCount: 1
  service:
    type: ClusterIP
    port: 8001
    nodePort: null
