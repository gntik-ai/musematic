wsHub:
  replicaCount: 2

  image:
    repository: ghcr.io/andrea-mucci/musematic/control-plane
    tag: latest
    pullPolicy: IfNotPresent

  port: 8001
  terminationGracePeriodSeconds: 30

  env:
    PLATFORM_PROFILE: ws-hub
    WS_CLIENT_BUFFER_SIZE: "1000"
    WS_HEARTBEAT_INTERVAL_SECONDS: "30"
    WS_HEARTBEAT_TIMEOUT_SECONDS: "10"

  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi
