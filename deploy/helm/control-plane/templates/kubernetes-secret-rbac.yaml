{{- if eq .Values.vault.mode "kubernetes" }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "musematic-control-plane.fullname" . }}-secret-writer
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "musematic-control-plane.componentLabels" . | indent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "musematic-control-plane.fullname" . }}-secret-writer
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "musematic-control-plane.componentLabels" . | indent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "musematic-control-plane.fullname" . }}-secret-writer
subjects:
  - kind: ServiceAccount
    name: {{ include "musematic-control-plane.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
