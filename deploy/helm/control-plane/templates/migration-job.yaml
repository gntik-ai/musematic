{{- if .Values.migration.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "musematic-control-plane.fullname" . }}-migrate
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: {{ .Values.migration.hook | quote }}
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ .Values.migration.backoffLimit }}
  template:
    metadata:
      labels:
{{ include "musematic-control-plane.componentLabels" . | indent 8 }}
        app.kubernetes.io/name: {{ include "musematic-control-plane.fullname" . }}-migrate
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/sh
            - -ec
            - |
              attempts={{ .Values.migration.retryAttempts }}
              delay={{ .Values.migration.retryDelaySeconds }}
              count=1
              until alembic -c migrations/alembic.ini upgrade head; do
                if [ "$count" -ge "$attempts" ]; then
                  echo "migration failed after ${count} attempt(s)" >&2
                  exit 1
                fi
                echo "migration attempt ${count}/${attempts} failed; retrying in ${delay}s" >&2
                count=$((count + 1))
                sleep "$delay"
              done
          env:
            - name: QDRANT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: qdrant-api-key
                  key: QDRANT_API_KEY
                  optional: true
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: neo4j-credentials
                  key: NEO4J_PASSWORD
                  optional: true
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clickhouse-credentials
                  key: CLICKHOUSE_PASSWORD
                  optional: true
            - name: OPENSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: opensearch-credentials
                  key: OPENSEARCH_PASSWORD
                  optional: true
          envFrom:
            - configMapRef:
                name: {{ include "musematic-control-plane.configName" . }}
            - secretRef:
                name: {{ include "musematic-control-plane.secretName" . }}
{{- end }}
