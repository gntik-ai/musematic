{{- if .Values.scheduler.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "musematic-control-plane.schedulerName" . }}
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.scheduler.replicaCount }}
  selector:
    matchLabels:
{{ include "musematic-control-plane.componentLabels" . | indent 6 }}
      app.kubernetes.io/name: {{ include "musematic-control-plane.schedulerName" . }}
  template:
    metadata:
      labels:
{{ include "musematic-control-plane.componentLabels" . | indent 8 }}
        app.kubernetes.io/name: {{ include "musematic-control-plane.schedulerName" . }}
    spec:
      serviceAccountName: {{ include "musematic-control-plane.serviceAccountName" . }}
      volumes:
        - name: vault-token
          projected:
            sources:
              - serviceAccountToken:
                  audience: vault
                  expirationSeconds: 3600
                  path: vault-token
      containers:
        - name: scheduler
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python", "-m", "entrypoints.scheduler_main"]
          volumeMounts:
            - name: vault-token
              mountPath: /var/run/secrets/tokens
              readOnly: true
          env:
            - name: PLATFORM_PROFILE
              value: scheduler
            - name: QDRANT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: qdrant-api-key
                  key: QDRANT_API_KEY
                  optional: true
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: neo4j-credentials
                  key: NEO4J_PASSWORD
                  optional: true
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clickhouse-credentials
                  key: CLICKHOUSE_PASSWORD
                  optional: true
            - name: OPENSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: opensearch-credentials
                  key: OPENSEARCH_PASSWORD
                  optional: true
          envFrom:
            - configMapRef:
                name: {{ include "musematic-control-plane.configName" . }}
            - secretRef:
                name: {{ include "musematic-control-plane.secretName" . }}
          ports:
            - name: http
              containerPort: 8001
          readinessProbe:
            tcpSocket:
              port: http
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 20
          resources:
{{ toYaml .Values.common.resources | indent 12 }}
{{- end }}
