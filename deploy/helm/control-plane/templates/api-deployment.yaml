{{- if .Values.api.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "musematic-control-plane.apiName" . }}
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
{{ include "musematic-control-plane.componentLabels" . | indent 6 }}
      app.kubernetes.io/name: {{ include "musematic-control-plane.apiName" . }}
  template:
    metadata:
      labels:
{{ include "musematic-control-plane.componentLabels" . | indent 8 }}
        app.kubernetes.io/name: {{ include "musematic-control-plane.apiName" . }}
    spec:
      serviceAccountName: {{ include "musematic-control-plane.serviceAccountName" . }}
      volumes:
        - name: vault-token
          projected:
            sources:
              - serviceAccountToken:
                  audience: vault
                  expirationSeconds: 3600
                  path: vault-token
{{ if .Values.oauth.google.clientSecretRef.name }}
        - name: oauth-google-client-secret
          secret:
            secretName: {{ .Values.oauth.google.clientSecretRef.name | quote }}
            items:
              - key: {{ .Values.oauth.google.clientSecretRef.key | quote }}
                path: client-secret
{{- end }}
{{ if .Values.oauth.github.clientSecretRef.name }}
        - name: oauth-github-client-secret
          secret:
            secretName: {{ .Values.oauth.github.clientSecretRef.name | quote }}
            items:
              - key: {{ .Values.oauth.github.clientSecretRef.key | quote }}
                path: client-secret
{{- end }}
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python", "-m", "entrypoints.api_main"]
          volumeMounts:
            - name: vault-token
              mountPath: /var/run/secrets/tokens
              readOnly: true
{{ if .Values.oauth.google.clientSecretRef.name }}
            - name: oauth-google-client-secret
              mountPath: /etc/secrets/google-client-secret
              subPath: client-secret
              readOnly: true
{{- end }}
{{ if .Values.oauth.github.clientSecretRef.name }}
            - name: oauth-github-client-secret
              mountPath: /etc/secrets/github-client-secret
              subPath: client-secret
              readOnly: true
{{- end }}
          env:
            - name: PLATFORM_PROFILE
              value: api
            - name: QDRANT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: qdrant-api-key
                  key: QDRANT_API_KEY
                  optional: true
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: neo4j-credentials
                  key: NEO4J_PASSWORD
                  optional: true
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clickhouse-credentials
                  key: CLICKHOUSE_PASSWORD
                  optional: true
            - name: OPENSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: opensearch-credentials
                  key: OPENSEARCH_PASSWORD
                  optional: true
          envFrom:
            - configMapRef:
                name: {{ include "musematic-control-plane.configName" . }}
            - secretRef:
                name: {{ include "musematic-control-plane.secretName" . }}
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: http
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
          resources:
{{ toYaml (.Values.api.resources | default .Values.common.resources) | indent 12 }}
{{- end }}
