{{- if .Values.wsHub.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "musematic-control-plane.wsHubName" . }}
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.wsHub.replicaCount }}
  selector:
    matchLabels:
{{ include "musematic-control-plane.componentLabels" . | indent 6 }}
      app.kubernetes.io/name: {{ include "musematic-control-plane.wsHubName" . }}
  template:
    metadata:
      labels:
{{ include "musematic-control-plane.componentLabels" . | indent 8 }}
        app.kubernetes.io/name: {{ include "musematic-control-plane.wsHubName" . }}
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: ws-hub
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python", "-m", "entrypoints.ws_main"]
          env:
            - name: PLATFORM_PROFILE
              value: ws-hub
          envFrom:
            - configMapRef:
                name: {{ include "musematic-control-plane.configName" . }}
            - secretRef:
                name: {{ include "musematic-control-plane.secretName" . }}
          ports:
            - name: http
              containerPort: 8001
          readinessProbe:
            tcpSocket:
              port: http
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 20
          resources:
{{ toYaml .Values.common.resources | indent 12 }}
{{- end }}
