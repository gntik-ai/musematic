apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "musematic-control-plane.configName" . }}
  namespace: {{ .Release.Namespace }}
data:
  KAFKA_BROKERS: {{ .Values.connections.kafkaBrokers | quote }}
  REDIS_URL: {{ .Values.connections.redisUrl | quote }}
  REDIS_TEST_MODE: {{ .Values.connections.redisTestMode | quote }}
  QDRANT_HOST: {{ .Values.connections.qdrantHost | quote }}
  QDRANT_PORT: {{ .Values.connections.qdrantPort | quote }}
  QDRANT_GRPC_PORT: {{ .Values.connections.qdrantGrpcPort | quote }}
  NEO4J_URI: {{ .Values.connections.neo4jUri | quote }}
  NEO4J_USER: {{ .Values.connections.neo4jUser | quote }}
  CLICKHOUSE_HOST: {{ .Values.connections.clickhouseHost | quote }}
  CLICKHOUSE_PORT: {{ .Values.connections.clickhousePort | quote }}
  CLICKHOUSE_USER: {{ .Values.connections.clickhouseUser | quote }}
  CLICKHOUSE_DATABASE: {{ .Values.connections.clickhouseDatabase | quote }}
  OPENSEARCH_HOSTS: {{ .Values.connections.opensearchHosts | quote }}
  OPENSEARCH_USERNAME: {{ .Values.connections.opensearchUsername | quote }}
  OPENSEARCH_USE_SSL: "false"
  OPENSEARCH_VERIFY_CERTS: "false"
  S3_ENDPOINT_URL: {{ .Values.connections.s3EndpointUrl | quote }}
  S3_REGION: {{ .Values.connections.s3Region | quote }}
  S3_BUCKET_PREFIX: {{ .Values.connections.s3BucketPrefix | quote }}
  S3_USE_PATH_STYLE: {{ ternary "true" "false" .Values.connections.s3UsePathStyle | quote }}
  S3_PROVIDER: {{ .Values.connections.s3Provider | quote }}
  GRPC_RUNTIME_CONTROLLER: {{ .Values.connections.grpcRuntimeController | quote }}
  GRPC_REASONING_ENGINE: {{ .Values.connections.grpcReasoningEngine | quote }}
  GRPC_SANDBOX_MANAGER: {{ .Values.connections.grpcSandboxManager | quote }}
  GRPC_SIMULATION_CONTROLLER: {{ .Values.connections.grpcSimulationController | quote }}
  FEATURE_E2E_MODE: {{ ternary "true" "false" .Values.common.featureE2EMode | quote }}
  MOCK_LLM_ENABLED: {{ ternary "true" "false" .Values.common.mockLlmEnabled | quote }}
  VISIBILITY_ZERO_TRUST_ENABLED: {{ ternary "true" "false" .Values.common.zeroTrustVisibility | quote }}
  OTEL_EXPORTER_ENDPOINT: {{ .Values.common.otelExporterEndpoint | quote }}
  OTEL_SERVICE_NAME: {{ .Values.common.otelServiceName | quote }}
  OTEL_RESOURCE_ATTRIBUTES: {{ .Values.common.otelResourceAttributes | quote }}
  WS_CLIENT_BUFFER_SIZE: {{ .Values.common.wsClientBufferSize | quote }}
  WS_HEARTBEAT_INTERVAL_SECONDS: {{ .Values.common.wsHeartbeatIntervalSeconds | quote }}
  WS_HEARTBEAT_TIMEOUT_SECONDS: {{ .Values.common.wsHeartbeatTimeoutSeconds | quote }}
  AUTH_JWT_ALGORITHM: {{ .Values.connections.authJwtAlgorithm | quote }}
  AUTH_OAUTH_GOOGLE_AUTHORIZE_URL: {{ .Values.auth.oauth.google.authorizeUrl | quote }}
  AUTH_OAUTH_GOOGLE_TOKEN_URL: {{ .Values.auth.oauth.google.tokenUrl | quote }}
  AUTH_OAUTH_GOOGLE_TOKEN_INFO_URL: {{ .Values.auth.oauth.google.tokenInfoUrl | quote }}
  AUTH_OAUTH_GITHUB_AUTHORIZE_URL: {{ .Values.auth.oauth.github.authorizeUrl | quote }}
  AUTH_OAUTH_GITHUB_TOKEN_URL: {{ .Values.auth.oauth.github.tokenUrl | quote }}
  AUTH_OAUTH_GITHUB_USER_URL: {{ .Values.auth.oauth.github.userUrl | quote }}
  AUTH_OAUTH_GITHUB_EMAILS_URL: {{ .Values.auth.oauth.github.emailsUrl | quote }}
  AUTH_OAUTH_GITHUB_TEAMS_URL: {{ .Values.auth.oauth.github.teamsUrl | quote }}
  AUTH_OAUTH_GITHUB_ORG_MEMBERSHIP_URL_TEMPLATE: {{ .Values.auth.oauth.github.orgMembershipUrlTemplate | quote }}
  SECURITY_COMPLIANCE_MANUAL_EVIDENCE_BUCKET: {{ .Values.securityCompliance.manualEvidenceBucket | quote }}
