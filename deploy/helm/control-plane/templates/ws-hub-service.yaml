{{- if .Values.wsHub.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "musematic-control-plane.wsHubName" . }}
  namespace: {{ .Release.Namespace }}
spec:
  type: {{ .Values.wsHub.service.type }}
  selector:
{{ include "musematic-control-plane.componentLabels" . | indent 4 }}
    app.kubernetes.io/name: {{ include "musematic-control-plane.wsHubName" . }}
  ports:
    - name: http
      port: {{ .Values.wsHub.service.port }}
      targetPort: http
      {{- if and (eq .Values.wsHub.service.type "NodePort") .Values.wsHub.service.nodePort }}
      nodePort: {{ .Values.wsHub.service.nodePort }}
      {{- end }}
{{- end }}
