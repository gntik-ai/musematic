opensearch:
  fullnameOverride: "musematic-opensearch"
  masterService: "musematic-opensearch"
  replicas: 1
  image:
    repository: opensearchproject/opensearch
    tag: "2.18.0"
  extraEnvs:
    # Mirrors OPENSEARCH_* runtime config consumed by AsyncOpenSearchClient.
    - name: OPENSEARCH_JAVA_OPTS
      value: "-Xms1g -Xmx1g"
    - name: DISABLE_SECURITY_PLUGIN
      value: "false"
    - name: AWS_EC2_METADATA_DISABLED
      value: "true"
    - name: AWS_REGION
      value: "us-east-1"
    - name: AWS_DEFAULT_REGION
      value: "us-east-1"
    - name: AWS_ACCESS_KEY_ID
      valueFrom:
        secretKeyRef:
          name: minio-platform-credentials
          key: MINIO_ACCESS_KEY
    - name: AWS_SECRET_ACCESS_KEY
      valueFrom:
        secretKeyRef:
          name: minio-platform-credentials
          key: MINIO_SECRET_KEY
  plugins:
    enabled: true
    installList:
      - analysis-icu
      - repository-s3
  keystore:
    - secretName: opensearch-keystore-bootstrap
  extraInitContainers:
    - name: configure-s3-keystore
      image: opensearchproject/opensearch:2.18.0
      command:
        - /bin/sh
        - -ec
        - |
          export OPENSEARCH_PATH_CONF=/tmp/keystore
          echo "$S3_ACCESS_KEY" | /usr/share/opensearch/bin/opensearch-keystore add -xf s3.client.default.access_key
          echo "$S3_SECRET_KEY" | /usr/share/opensearch/bin/opensearch-keystore add -xf s3.client.default.secret_key
      env:
        - name: S3_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: minio-platform-credentials
              key: MINIO_ACCESS_KEY
        - name: S3_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: minio-platform-credentials
              key: MINIO_SECRET_KEY
      volumeMounts:
        - name: keystore
          mountPath: /tmp/keystore
  extraVolumes:
    - name: synonyms
      configMap:
        name: opensearch-synonyms
  extraVolumeMounts:
    - name: synonyms
      mountPath: /usr/share/opensearch/config/synonyms
      readOnly: true
  persistence:
    enabled: true
    storageClass: ""
    size: 10Gi
  service:
    type: ClusterIP
    port: 9200
  resources:
    requests:
      cpu: "500m"
      memory: "2Gi"
    limits:
      cpu: "1"
      memory: "2Gi"

opensearch-dashboards:
  enabled: true
  fullnameOverride: "musematic-opensearch-dashboards"
  image:
    repository: opensearchproject/opensearch-dashboards
    tag: "2.18.0"
  extraEnvs:
    # Dashboards uses the same OPENSEARCH_HOSTS endpoint the control plane will call.
    - name: OPENSEARCH_HOSTS
      value: '["http://musematic-opensearch:9200"]'
    - name: DISABLE_SECURITY_DASHBOARDS_PLUGIN
      value: "false"
  resources:
    requests:
      cpu: "200m"
      memory: "512Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

credentials:
  username: admin
  password: ""

networkPolicy:
  enabled: true

initJob:
  enabled: true
  image:
    repository: python
    tag: "3.12-slim"
  backoffLimit: 4
  opensearchUrl: "http://musematic-opensearch:9200"
  snapshotRepository:
    name: "opensearch-backups"
    type: "s3"
    bucket: "backups"
    basePath: "backups/opensearch"
    endpoint: "http://musematic-minio.platform-data:9000"
    region: "us-east-1"
