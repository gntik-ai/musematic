{{- $existing := lookup "v1" "Secret" .Release.Namespace "opensearch-credentials" -}}
{{- $password := .Values.credentials.password -}}
{{- if and $existing $existing.data (hasKey $existing.data "OPENSEARCH_PASSWORD") -}}
{{- $password = (index $existing.data "OPENSEARCH_PASSWORD" | b64dec) -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: opensearch-credentials
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  OPENSEARCH_USERNAME: {{ .Values.credentials.username | quote }}
  OPENSEARCH_PASSWORD: {{ $password | quote }}
