apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: musematic-clickhouse
  namespace: {{ .Release.Namespace }}
spec:
  serviceName: musematic-clickhouse
  replicas: {{ .Values.clickhouse.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: clickhouse
  template:
    metadata:
      labels:
        app.kubernetes.io/name: clickhouse
    spec:
      containers:
        - name: clickhouse
          image: {{ .Values.clickhouse.image | quote }}
          env:
            - name: CLICKHOUSE_USER
              value: {{ .Values.clickhouse.auth.user | quote }}
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clickhouse-credentials
                  key: CLICKHOUSE_PASSWORD
          ports:
            - name: http
              containerPort: {{ .Values.service.httpPort }}
            - name: native
              containerPort: {{ .Values.service.nativePort }}
            - name: interserver
              containerPort: {{ .Values.service.interserverHttpPort }}
          readinessProbe:
            httpGet:
              path: /ping
              port: http
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 60
          resources:
{{ toYaml .Values.clickhouse.resources | indent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
            - name: server-config
              mountPath: /etc/clickhouse-server/config.d
      volumes:
        - name: server-config
          configMap:
            name: musematic-clickhouse-server-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.persistence.storageClassName | quote }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
