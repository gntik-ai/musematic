{{- if .Values.schemaInit.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: clickhouse-schema-init
  namespace: {{ .Release.Namespace }}
  labels:
    app: clickhouse-schema-init
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  template:
    metadata:
      labels:
        app: clickhouse-schema-init
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-clickhouse
          image: {{ .Values.schemaInit.image | quote }}
          env:
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clickhouse-credentials
                  key: CLICKHOUSE_PASSWORD
          command:
            - /bin/bash
            - -ec
            - |
              for attempt in $(seq 1 {{ .Values.schemaInit.retries }}); do
                if clickhouse-client \
                  --host musematic-clickhouse.{{ .Release.Namespace }}.svc.cluster.local \
                  --port {{ .Values.service.nativePort }} \
                  --user {{ .Values.clickhouse.auth.user }} \
                  --password "$CLICKHOUSE_PASSWORD" \
                  --query "SELECT 1" >/dev/null 2>&1; then
                  exit 0
                fi
                sleep {{ .Values.schemaInit.retryIntervalSeconds }}
              done
              exit 1
      containers:
        - name: schema-init
          image: {{ .Values.schemaInit.image | quote }}
          command:
            - /bin/bash
            - -ec
            - |
              cat /scripts/*.sql | clickhouse-client \
                --host musematic-clickhouse.{{ .Release.Namespace }}.svc.cluster.local \
                --port {{ .Values.service.nativePort }} \
                --user {{ .Values.clickhouse.auth.user }} \
                --password "$CLICKHOUSE_PASSWORD" \
                --multiquery
          env:
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clickhouse-credentials
                  key: CLICKHOUSE_PASSWORD
          volumeMounts:
            - name: init-scripts
              mountPath: /scripts
      volumes:
        - name: init-scripts
          configMap:
            name: musematic-clickhouse-init
{{- end }}
