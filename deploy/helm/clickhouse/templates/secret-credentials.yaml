{{- $existing := lookup "v1" "Secret" .Release.Namespace "clickhouse-credentials" -}}
{{- $password := randAlphaNum 32 -}}
{{- if and $existing $existing.data (hasKey $existing.data "CLICKHOUSE_PASSWORD") -}}
{{- $password = (index $existing.data "CLICKHOUSE_PASSWORD" | b64dec) -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: clickhouse-credentials
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  CLICKHOUSE_PASSWORD: {{ $password | quote }}
