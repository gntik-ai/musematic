{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: musematic-clickhouse
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: clickhouse
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: platform-control
      ports:
        - protocol: TCP
          port: 8123
        - protocol: TCP
          port: 9000
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: platform-execution
      ports:
        - protocol: TCP
          port: 8123
        - protocol: TCP
          port: 9000
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: platform-observability
      ports:
        - protocol: TCP
          port: 8123
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: clickhouse
      ports:
        - protocol: TCP
          port: 9000
        - protocol: TCP
          port: 9009
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: clickhouse-keeper
      ports:
        - protocol: TCP
          port: 9181
        - protocol: TCP
          port: 9234
        - protocol: TCP
          port: 9444
{{- end }}
