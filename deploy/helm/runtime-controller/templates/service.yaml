apiVersion: v1
kind: Service
metadata:
  name: musematic-runtime-controller
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: runtime-controller
  ports:
    - name: grpc
      port: {{ .Values.grpcPort }}
      targetPort: grpc
    - name: http
      port: {{ .Values.httpPort }}
      targetPort: http
