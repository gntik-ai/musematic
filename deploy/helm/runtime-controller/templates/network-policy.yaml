{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: musematic-runtime-controller
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: runtime-controller
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: platform-control
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: platform-execution
      ports:
        - protocol: TCP
          port: {{ .Values.grpcPort }}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: platform-observability
      ports:
        - protocol: TCP
          port: {{ .Values.httpPort }}
{{- end }}
