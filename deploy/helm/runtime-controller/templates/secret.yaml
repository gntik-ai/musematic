apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.configSecretRef }}
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  POSTGRES_DSN: {{ .Values.secrets.POSTGRES_DSN | quote }}
  REDIS_ADDR: {{ .Values.secrets.REDIS_ADDR | quote }}
  REDIS_PASSWORD: {{ .Values.secrets.REDIS_PASSWORD | quote }}
  KAFKA_BROKERS: {{ .Values.secrets.KAFKA_BROKERS | quote }}
  S3_ENDPOINT_URL: {{ .Values.secrets.S3_ENDPOINT_URL | quote }}
  S3_BUCKET: {{ .Values.secrets.S3_BUCKET | quote }}
  S3_ACCESS_KEY: {{ .Values.secrets.S3_ACCESS_KEY | quote }}
  S3_SECRET_KEY: {{ .Values.secrets.S3_SECRET_KEY | quote }}
  S3_REGION: {{ .Values.secrets.S3_REGION | quote }}
  S3_USE_PATH_STYLE: {{ .Values.secrets.S3_USE_PATH_STYLE | quote }}
  K8S_DRY_RUN: {{ .Values.secrets.K8S_DRY_RUN | quote }}
