replicaCount: 1

image:
  repository: ghcr.io/andrea-mucci/musematic/runtime-controller
  tag: latest
  pullPolicy: IfNotPresent

grpcPort: 50051
httpPort: 8080

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 512Mi

configSecretRef: runtime-controller-config

secrets:
  POSTGRES_DSN: ""
  REDIS_ADDR: ""
  REDIS_PASSWORD: ""
  KAFKA_BROKERS: ""
  S3_ENDPOINT_URL: ""
  S3_BUCKET: ""
  S3_ACCESS_KEY: ""
  S3_SECRET_KEY: ""
  S3_REGION: us-east-1
  S3_USE_PATH_STYLE: "true"
  K8S_DRY_RUN: "false"

config:
  k8sNamespace: platform-execution
  reconcileInterval: 30s
  heartbeatTimeout: 60s
  heartbeatCheckInterval: 10s
  warmPoolIdleTimeout: 5m
  warmPoolReplenishInterval: 30s
  stopGracePeriod: 30s
  agentPackagePresignTTL: 2h
  otelExporterOtlpEndpoint: http://otel-collector.platform-observability.svc.cluster.local:4317
  otelServiceName: runtime-controller
  otelResourceAttributes: deployment.environment=production

networkPolicy:
  enabled: true
