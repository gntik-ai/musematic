replicaCount: 1

image:
  repository: ghcr.io/andrea-mucci/musematic/runtime-controller
  tag: latest
  pullPolicy: IfNotPresent

grpcPort: 50051
httpPort: 8080

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 512Mi

configSecretRef: runtime-controller-config

config:
  k8sNamespace: platform-execution
  reconcileInterval: 30s
  heartbeatTimeout: 60s
  heartbeatCheckInterval: 10s
  warmPoolIdleTimeout: 5m
  warmPoolReplenishInterval: 30s
  stopGracePeriod: 30s
  agentPackagePresignTTL: 2h

networkPolicy:
  enabled: true
