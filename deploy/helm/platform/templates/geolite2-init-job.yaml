{{- if .Values.geolite2 -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-geolite2-init
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: geolite2-init
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: musematic
    app.kubernetes.io/component: abuse-prevention
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "5"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: geolite2-init
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/part-of: musematic
    spec:
      restartPolicy: OnFailure
      containers:
        - name: download
          image: curlimages/curl:8.11.1
          command:
            - /bin/sh
            - -c
            - |
              set -e
              if [ -z "${MAXMIND_LICENSE_KEY}" ]; then
                echo "MAXMIND_LICENSE_KEY is empty; skipping GeoLite2 download."
                exit 0
              fi
              cd /var/lib/geolite2
              # Country DB only — small (~1.5 MB compressed) and sufficient
              # for the geo-block use case.
              curl -fsSL \
                "https://download.maxmind.com/app/geoip_download?edition_id=GeoLite2-Country&license_key=${MAXMIND_LICENSE_KEY}&suffix=tar.gz" \
                -o GeoLite2-Country.tar.gz
              tar -xzf GeoLite2-Country.tar.gz --strip-components=1 \
                --wildcards '*/GeoLite2-Country.mmdb'
              rm -f GeoLite2-Country.tar.gz
              echo "GeoLite2 Country DB ready at $(pwd)/GeoLite2-Country.mmdb"
          env:
            - name: MAXMIND_LICENSE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-geolite2-license
                  key: license-key
                  optional: true
          volumeMounts:
            - name: geolite2-db
              mountPath: /var/lib/geolite2
      volumes:
        - name: geolite2-db
          persistentVolumeClaim:
            claimName: {{ default "geolite2-db" .Values.geolite2.pvcName }}
{{- end }}
