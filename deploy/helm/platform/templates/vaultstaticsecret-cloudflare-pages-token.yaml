{{- /*
UPD-053 (106) US5 — ExternalSecret syncing the Cloudflare Pages API token
from Vault into a Kubernetes Secret consumed by the status-snapshot push
CronJob (which runs `wrangler pages deploy`).

Vault path:    secret/data/musematic/{env}/cloudflare/pages-token
Secret name:   {{ .Values.webStatus.cloudflarePages.apiTokenSecretRef.name | default "cloudflare-pages-token" }}
Refresh cadence: hourly.

Gated on the prod-only Cloudflare Pages push branch:
  webStatus.deployedHere == false
  AND webStatus.pushDestination == "cloudflare-pages"
*/ -}}
{{- if and (not .Values.webStatus.deployedHere) (eq .Values.webStatus.pushDestination "cloudflare-pages") }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.webStatus.cloudflarePages.apiTokenSecretRef.name | default "cloudflare-pages-token" }}
  namespace: platform-edge
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: musematic
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-cluster-store
  target:
    name: {{ .Values.webStatus.cloudflarePages.apiTokenSecretRef.name | default "cloudflare-pages-token" | quote }}
    creationPolicy: Owner
  data:
    - secretKey: {{ .Values.webStatus.cloudflarePages.apiTokenSecretRef.key | default "token" | quote }}
      remoteRef:
        key: musematic/{{ .Values.environment | default "prod" }}/cloudflare/pages-token
        property: token
{{- end }}
