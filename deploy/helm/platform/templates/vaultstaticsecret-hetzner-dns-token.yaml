{{- /*
UPD-053 (106) — ExternalSecret syncing the Hetzner DNS API token from Vault
into a Kubernetes Secret consumed by both the cert-manager Hetzner DNS-01
webhook AND the application-side DNS automation client (read by the control
plane via SecretProvider; the token is also mounted as a Secret because the
cert-manager webhook reads from a Secret, not from Vault directly).

Vault path:    secret/data/musematic/{env}/dns/hetzner/api-token
Secret name:   {{ .Values.hetzner.dns.apiTokenSecretRef.name }}
Refresh cadence: hourly (rotation propagates within ~1h of vault kv put).
*/ -}}
{{- if and .Values.certManager .Values.certManager.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: hetzner-dns-token
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: musematic
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-cluster-store
  target:
    name: {{ .Values.hetzner.dns.apiTokenSecretRef.name | quote }}
    creationPolicy: Owner
  data:
    - secretKey: {{ .Values.hetzner.dns.apiTokenSecretRef.key | quote }}
      remoteRef:
        key: musematic/{{ .Values.environment | default "prod" }}/dns/hetzner/api-token
        property: token
{{- end }}
