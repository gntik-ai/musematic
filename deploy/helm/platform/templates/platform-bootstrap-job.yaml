{{- if .Values.controlPlane.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-platform-bootstrap
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "9"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-platform-bootstrap
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "9"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-platform-bootstrap
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "9"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-platform-bootstrap
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Release.Name }}-platform-bootstrap
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-platform-bootstrap
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/part-of: musematic
        app.kubernetes.io/name: {{ .Release.Name }}-platform-bootstrap
    spec:
      serviceAccountName: {{ .Release.Name }}-platform-bootstrap
      restartPolicy: Never
      containers:
        - name: bootstrap
          image: "{{ .Values.controlPlane.image.repository }}:{{ .Values.controlPlane.image.tag }}"
          imagePullPolicy: {{ .Values.controlPlane.image.pullPolicy }}
          command: ["python", "-m", "platform.admin.bootstrap"]
          env:
            - name: PLATFORM_SUPERADMIN_USERNAME
              value: {{ .Values.superadmin.username | quote }}
            - name: PLATFORM_SUPERADMIN_EMAIL
              value: {{ .Values.superadmin.email | quote }}
            {{- if .Values.superadmin.passwordSecretRef }}
            - name: PLATFORM_SUPERADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.superadmin.passwordSecretRef | quote }}
                  key: password
                  optional: false
            {{- end }}
            - name: PLATFORM_SUPERADMIN_MFA_ENROLLMENT
              value: {{ .Values.superadmin.mfaEnrollment | quote }}
            - name: PLATFORM_SUPERADMIN_FORCE_PASSWORD_CHANGE
              value: {{ .Values.superadmin.forcePasswordChange | quote }}
            - name: PLATFORM_INSTANCE_NAME
              value: {{ .Values.platformInstanceName | quote }}
            - name: PLATFORM_TENANT_MODE
              value: {{ .Values.tenantMode | quote }}
            - name: PLATFORM_ENV
              value: {{ .Values.global.environment | quote }}
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-control-plane-config
            - secretRef:
                name: {{ .Release.Name }}-control-plane-secrets
{{- end }}
