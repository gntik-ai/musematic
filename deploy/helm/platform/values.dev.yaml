# Dev overrides for tenant hostname resolution.
tenancy:
  defaultTenantSlug: default
  defaultTenantSubdomain: app
  reservedSlugs:
    - api
    - grafana
    - status
    - www
    - admin
    - platform
    - webhooks
    - public
    - docs
    - help
  cacheTtlSeconds: 60
  hostnameMiddlewareEnabled: true

billing:
  periodSchedulerIntervalSeconds: 60
  meteringToleranceSeconds: 30
  paymentProvider: stub
  quotaCacheTtlSeconds: 60
  quotaInFlightTtlSeconds: 300
  defaultQuotaPeriodAnchor: calendar_month

signup:
  autoCreateRetrySeconds: 30
  firstAdminInviteTtlDays: 7
  onboardingWizardEnabled: true
  defaultWorkspaceNameTemplate: "{display_name}'s workspace"

marketplace:
  deprecationRetentionDays: 30
  submissionRateLimitPerDay: 5
  forkNotifySourceOwners: true
