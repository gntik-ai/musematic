# Source: musematic-platform/charts/controlPlane/templates/migration-job.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: release-control-plane-migrate
  namespace: default
  annotations:
    helm.sh/hook: "pre-install,pre-upgrade"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: release
        app.kubernetes.io/part-of: musematic
        app.kubernetes.io/name: release-control-plane-migrate
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: "ghcr.io/musematic/control-plane:latest"
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              attempts=1
              delay=5
              count=1
              until alembic -c migrations/alembic.ini upgrade head; do
                if [ "$count" -ge "$attempts" ]; then
                  echo "migration failed after ${count} attempt(s)" >&2
                  exit 1
                fi
                echo "migration attempt ${count}/${attempts} failed; retrying in ${delay}s" >&2
                count=$((count + 1))
                sleep "$delay"
              done
          env:
            - name: QDRANT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: qdrant-api-key
                  key: QDRANT_API_KEY
                  optional: true
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: neo4j-credentials
                  key: NEO4J_PASSWORD
                  optional: true
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clickhouse-credentials
                  key: CLICKHOUSE_PASSWORD
                  optional: true
            - name: OPENSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: opensearch-credentials
                  key: OPENSEARCH_PASSWORD
                  optional: true
          envFrom:
            - configMapRef:
                name: release-control-plane-config
            - secretRef:
                name: release-control-plane-secrets
