# Source: musematic-platform/charts/clickhouse/templates/schema-init-job.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: clickhouse-schema-init
  namespace: default
  labels:
    app: clickhouse-schema-init
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  template:
    metadata:
      labels:
        app: clickhouse-schema-init
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-clickhouse
          image: "clickhouse/clickhouse-server:24.3"
          env:
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clickhouse-credentials
                  key: CLICKHOUSE_PASSWORD
          command:
            - /bin/bash
            - -ec
            - |
              for attempt in $(seq 1 60); do
                if clickhouse-client \
                  --host musematic-clickhouse.default.svc.cluster.local \
                  --port 9000 \
                  --user default \
                  --password "$CLICKHOUSE_PASSWORD" \
                  --query "SELECT 1" >/dev/null 2>&1; then
                  exit 0
                fi
                sleep 5
              done
              exit 1
      containers:
        - name: schema-init
          image: "clickhouse/clickhouse-server:24.3"
          command:
            - /bin/bash
            - -ec
            - |
              cat /scripts/*.sql | clickhouse-client \
                --host musematic-clickhouse.default.svc.cluster.local \
                --port 9000 \
                --user default \
                --password "$CLICKHOUSE_PASSWORD" \
                --multiquery
          env:
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clickhouse-credentials
                  key: CLICKHOUSE_PASSWORD
          volumeMounts:
            - name: init-scripts
              mountPath: /scripts
      volumes:
