# Source: musematic-platform/charts/minio/templates/bucket-init-configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: musematic-minio-bucket-init
  namespace: platform-data
data:
  init-buckets.sh: |
    #!/bin/sh
    set -eu

    endpoint="http://musematic-minio-svc:9000"

    until mc alias set local "${endpoint}" "${MINIO_ROOT_USER}" "${MINIO_ROOT_PASSWORD}" >/dev/null 2>&1; do
      sleep 2
    done

    create_bucket() {
      mc mb --ignore-existing "local/$1"
    }

    create_platform_bucket() {
      create_bucket "$1"
      create_bucket "platform-$1"
    }

    apply_expiry() {
      mc ilm rule add "local/$1" --expire-days "$2" >/dev/null 2>&1 || true
    }

    apply_cleanup_rule() {
      mc ilm rule add "local/$1" --expire-days 7 --noncurrent-expire-days 7 >/dev/null 2>&1 || true
    }

    create_platform_bucket agent-packages
    create_platform_bucket connector-dead-letters
    create_platform_bucket execution-artifacts
    create_platform_bucket execution-task-plans
    create_platform_bucket reasoning-traces
    create_platform_bucket sandbox-outputs
    create_platform_bucket evidence-bundles
    create_platform_bucket simulation-artifacts
    create_platform_bucket backups
    create_platform_bucket forensic-exports

    apply_expiry execution-artifacts 90
    apply_expiry execution-task-plans 30
    apply_expiry reasoning-traces 90
    apply_expiry sandbox-outputs 30
    apply_expiry simulation-artifacts 30
    apply_expiry backups 30
    apply_expiry forensic-exports 90

    for bucket in agent-packages connector-dead-letters execution-artifacts execution-task-plans reasoning-traces sandbox-outputs evidence-bundles simulation-artifacts backups forensic-exports platform-agent-packages platform-connector-dead-letters platform-execution-artifacts platform-execution-task-plans platform-reasoning-traces platform-sandbox-outputs platform-evidence-bundles platform-simulation-artifacts platform-backups platform-forensic-exports; do
      apply_cleanup_rule "${bucket}"
    done

    mc version enable "local/agent-packages" >/dev/null 2>&1 || true

    cat <<'EOF' >/tmp/simulation-policy.json
    {
      "Version": "2012-10-17",
      "Statement": [
        {
          "Effect": "Allow",
          "Action": ["s3:*"],
          "Resource": [
            "arn:aws:s3:::simulation-artifacts",
            "arn:aws:s3:::simulation-artifacts/*"
          ]
        }
      ]
    }
    EOF

    cat <<'EOF' >/tmp/platform-policy.json
    {
      "Version": "2012-10-17",
      "Statement": [
        {
          "Effect": "Allow",
          "Action": ["s3:*"],
          "Resource": [
            "arn:aws:s3:::agent-packages",
            "arn:aws:s3:::agent-packages/*",
            "arn:aws:s3:::platform-agent-packages",
            "arn:aws:s3:::platform-agent-packages/*",
            "arn:aws:s3:::connector-dead-letters",
            "arn:aws:s3:::connector-dead-letters/*",
            "arn:aws:s3:::platform-connector-dead-letters",
            "arn:aws:s3:::platform-connector-dead-letters/*",
            "arn:aws:s3:::execution-artifacts",
            "arn:aws:s3:::execution-artifacts/*",
            "arn:aws:s3:::platform-execution-artifacts",
            "arn:aws:s3:::platform-execution-artifacts/*",
            "arn:aws:s3:::execution-task-plans",
            "arn:aws:s3:::execution-task-plans/*",
            "arn:aws:s3:::platform-execution-task-plans",
            "arn:aws:s3:::platform-execution-task-plans/*",
            "arn:aws:s3:::reasoning-traces",
            "arn:aws:s3:::reasoning-traces/*",
            "arn:aws:s3:::platform-reasoning-traces",
            "arn:aws:s3:::platform-reasoning-traces/*",
            "arn:aws:s3:::sandbox-outputs",
            "arn:aws:s3:::sandbox-outputs/*",
            "arn:aws:s3:::platform-sandbox-outputs",
            "arn:aws:s3:::platform-sandbox-outputs/*",
            "arn:aws:s3:::evidence-bundles",
            "arn:aws:s3:::evidence-bundles/*",
            "arn:aws:s3:::platform-evidence-bundles",
            "arn:aws:s3:::platform-evidence-bundles/*",
            "arn:aws:s3:::backups",
            "arn:aws:s3:::backups/*",
            "arn:aws:s3:::platform-backups",
            "arn:aws:s3:::platform-backups/*",
            "arn:aws:s3:::forensic-exports",
            "arn:aws:s3:::forensic-exports/*",
            "arn:aws:s3:::platform-forensic-exports",
            "arn:aws:s3:::platform-forensic-exports/*"
          ]
        }
      ]
    }
    EOF

    mc admin user info local "${SIMULATION_ACCESS_KEY}" >/dev/null 2>&1 || mc admin user add local "${SIMULATION_ACCESS_KEY}" "${SIMULATION_SECRET_KEY}"
    mc admin user info local "${PLATFORM_ACCESS_KEY}" >/dev/null 2>&1 || mc admin user add local "${PLATFORM_ACCESS_KEY}" "${PLATFORM_SECRET_KEY}"

    mc admin policy create local simulation-policy /tmp/simulation-policy.json >/dev/null 2>&1 || true
    mc admin policy create local platform-policy /tmp/platform-policy.json >/dev/null 2>&1 || true
    mc admin policy attach local simulation-policy --user "${SIMULATION_ACCESS_KEY}" >/dev/null 2>&1 || true
    mc admin policy attach local platform-policy --user "${PLATFORM_ACCESS_KEY}" >/dev/null 2>&1 || true
---
