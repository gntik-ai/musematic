# @section -- Platforminstancename
# -- Configures `platformInstanceName` for the platform chart.
platformInstanceName: "Musematic Platform"
# @section -- Tenantmode
# -- Configures `tenantMode` for the platform chart.
tenantMode: single

# @section -- Tenancy
# -- Configures tenant hostname resolution and default tenant bootstrap values.
tenancy:
  # -- Configures `tenancy.defaultTenantSlug` for the platform chart.
  defaultTenantSlug: default
  # -- Configures `tenancy.defaultTenantSubdomain` for the platform chart.
  defaultTenantSubdomain: app
  # -- Configures `tenancy.reservedSlugs` for the platform chart.
  reservedSlugs:
    - api
    - grafana
    - status
    - www
    - admin
    - platform
    - webhooks
    - public
    - docs
    - help
  # -- Configures `tenancy.cacheTtlSeconds` for the platform chart.
  cacheTtlSeconds: 60
  # -- Configures `tenancy.hostnameMiddlewareEnabled` for the platform chart.
  hostnameMiddlewareEnabled: true

# @section -- Billing
# -- Configures plan, subscription, quota, and payment-provider runtime defaults.
billing:
  # -- Subscription period-rollover scheduler interval in seconds.
  periodSchedulerIntervalSeconds: 60
  # -- Accepted metering delay/tolerance window in seconds.
  meteringToleranceSeconds: 30
  # -- Payment provider implementation selector. Stripe lands in UPD-052.
  paymentProvider: stub
  # -- TTL in seconds for quota plan/usage cache entries.
  quotaCacheTtlSeconds: 60
  # -- TTL in seconds for in-flight execution quota counters.
  quotaInFlightTtlSeconds: 300
  # -- Default period anchor for new quota-bearing plan versions.
  defaultQuotaPeriodAnchor: calendar_month

# @section -- Platformdatanamespace
# -- Configures `platformDataNamespace` for the platform chart.
platformDataNamespace:
  # -- Configures `platformDataNamespace.create` for the platform chart.
  create: true
  # -- Configures `platformDataNamespace.name` for the platform chart.
  name: platform-data

