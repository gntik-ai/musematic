global:
  environment: production
  domain: platform.local

platformDataNamespace:
  create: true
  name: platform-data

postgresql:
  enabled: true
  createNamespace: false
  environment: production
  credentials:
    username: musematic
    password: change-me
    database: musematic

redis:
  enabled: true
  createNamespace: false
  auth:
    password: change-me
  global:
    redis:
      password: change-me
  redis-cluster:
    fullnameOverride: musematic-redis
    password: change-me
    existingSecret: redis-credentials
    existingSecretPasswordKey: password
  networkPolicy:
    enabled: false

kafka:
  enabled: true
  namespace: platform-data
  clusterName: musematic-kafka
  combined: false
  brokerReplicas: 3
  controllerReplicas: 3
  combinedReplicas: 1
  replicationFactor: 3
  minInsyncReplicas: 2

minio:
  enabled: true
  createNamespace: false
  namespace: platform-data
  minio:
    enabled: true
  standalone: false
  clusterName: musematic-minio
  s3:
    endpointUrl: ""
    accessKey: platform
    secretKey: change-me
    region: us-east-1
    bucketPrefix: platform

qdrant:
  enabled: true
  createNamespace: false
  qdrant:
    fullnameOverride: musematic-qdrant

neo4j:
  enabled: true
  createNamespace: false
  neo4j:
    fullnameOverride: musematic-neo4j
    name: musematic-neo4j

clickhouse:
  enabled: true
  createNamespace: false

opensearch:
  enabled: true

controlPlane:
  enabled: true
  image:
    repository: ghcr.io/musematic/control-plane
    tag: latest
    pullPolicy: IfNotPresent
  common:
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 512Mi
    featureE2EMode: false
    mockLlmEnabled: false
    zeroTrustVisibility: false
    otelExporterEndpoint: http://otel-collector.platform-observability.svc.cluster.local:4318
    otelServiceName: control-plane
    otelResourceAttributes: deployment.environment=production
    wsClientBufferSize: 1000
    wsHeartbeatIntervalSeconds: 30
    wsHeartbeatTimeoutSeconds: 10
  privacy:
    dsrEnabled: false
    dlpEnabled: false
    residencyEnforcementEnabled: false
    clickhousePiiTables:
      - execution_metrics
      - agent_performance
      - token_usage
  connections:
    postgresDsn: postgresql+asyncpg://musematic:change-me@musematic-postgres-rw.platform-data.svc.cluster.local:5432/musematic
    redisUrl: redis://:change-me@musematic-redis.platform.svc.cluster.local:6379
    redisTestMode: cluster
    kafkaBrokers: musematic-kafka-kafka-bootstrap.platform-data.svc.cluster.local:9092
    qdrantHost: musematic-qdrant.platform.svc.cluster.local
    qdrantPort: 6333
    qdrantGrpcPort: 6334
    neo4jUri: bolt://musematic-neo4j.platform.svc.cluster.local:7687
    neo4jUser: neo4j
    neo4jPassword: neo4j
    clickhouseHost: musematic-clickhouse.platform.svc.cluster.local
    clickhousePort: 8123
    clickhouseUser: default
    clickhousePassword: ""
    clickhouseDatabase: default
    opensearchHosts: http://musematic-opensearch.platform.svc.cluster.local:9200
    opensearchUsername: admin
    opensearchPassword: admin
    s3EndpointUrl: http://musematic-minio.platform-data.svc.cluster.local:9000
    s3AccessKey: platform
    s3SecretKey: change-me
    s3Region: us-east-1
    s3BucketPrefix: platform
    s3UsePathStyle: true
    s3Provider: generic
    grpcRuntimeController: musematic-runtime-controller.platform.svc.cluster.local:50051
    grpcReasoningEngine: reasoning-engine.platform.svc.cluster.local:50052
    grpcSandboxManager: sandbox-manager.platform.svc.cluster.local:50053
    grpcSimulationController: musematic-simulation-controller.platform.svc.cluster.local:50055
    authJwtSecretKey: change-me
    authMfaEncryptionKey: ""
    authJwtAlgorithm: HS256
  migration:
    enabled: true
    backoffLimit: 3
  api:
    enabled: true
    replicaCount: 1
    service:
      type: ClusterIP
      port: 8000
      nodePort: null
  scheduler:
    enabled: true
    replicaCount: 1
  worker:
    enabled: true
    replicaCount: 1
  wsHub:
    enabled: true
    replicaCount: 1
    service:
      type: ClusterIP
      port: 8001
      nodePort: null

runtimeController:
  enabled: true
  image:
    repository: ghcr.io/musematic/runtime-controller
    tag: latest
  secrets:
    POSTGRES_DSN: postgres://musematic:change-me@musematic-postgres-rw.platform-data.svc.cluster.local:5432/musematic?sslmode=disable
    REDIS_ADDR: musematic-redis.platform.svc.cluster.local:6379
    REDIS_PASSWORD: change-me
    KAFKA_BROKERS: musematic-kafka-kafka-bootstrap.platform-data.svc.cluster.local:9092
    S3_ENDPOINT_URL: http://musematic-minio.platform-data.svc.cluster.local:9000
    S3_BUCKET: platform-execution-artifacts
    S3_ACCESS_KEY: platform
    S3_SECRET_KEY: change-me
    S3_REGION: us-east-1
    S3_USE_PATH_STYLE: "true"
    K8S_DRY_RUN: "false"

reasoningEngine:
  enabled: true
  image:
    repository: ghcr.io/musematic/reasoning-engine
    tag: latest
  secrets:
    POSTGRES_DSN: postgres://musematic:change-me@musematic-postgres-rw.platform-data.svc.cluster.local:5432/musematic?sslmode=disable
    REDIS_ADDR: musematic-redis.platform.svc.cluster.local:6379
    REDIS_PASSWORD: change-me
    KAFKA_BROKERS: musematic-kafka-kafka-bootstrap.platform-data.svc.cluster.local:9092
    MINIO_ENDPOINT: http://musematic-minio.platform-data.svc.cluster.local:9000
    MINIO_BUCKET: reasoning-traces

simulationController:
  enabled: true
  image:
    repository: ghcr.io/musematic/simulation-controller
    tag: latest
  fullnameOverride: musematic-simulation-controller

sandboxManager:
  enabled: true
  fullnameOverride: sandbox-manager
  image:
    repository: ghcr.io/musematic/sandbox-manager
    tag: latest
    pullPolicy: IfNotPresent
  config:
    postgresDsn: postgres://musematic:change-me@musematic-postgres-rw.platform-data.svc.cluster.local:5432/musematic?sslmode=disable
    kafkaBrokers: musematic-kafka-kafka-bootstrap.platform-data.svc.cluster.local:9092
    minioEndpoint: http://musematic-minio.platform-data.svc.cluster.local:9000
    minioBucket: platform-execution-artifacts
    k8sNamespace: platform-execution

ui:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/musematic/ui
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3000
    nodePort: null
  env:
    NEXT_PUBLIC_API_URL: http://localhost:8000
    NEXT_PUBLIC_WS_URL: ws://localhost:8001/ws
    NEXT_PUBLIC_APP_ENV: production

mockOAuth:
  google:
    enabled: false
    image:
      repository: ghcr.io/musematic/mock-google-oidc
      tag: latest
      pullPolicy: IfNotPresent
    replicas: 1
    service:
      type: ClusterIP
      port: 8080
      nodePort: null
    resources: {}
    seedUsers: []
  github:
    enabled: false
    image:
      repository: ghcr.io/musematic/mock-github-oauth
      tag: latest
      pullPolicy: IfNotPresent
    replicas: 1
    service:
      type: ClusterIP
      port: 8080
      nodePort: null
    resources: {}
    seedUsers: []
