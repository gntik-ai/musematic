# @section -- Controlplane
# -- Configures `controlPlane` for the platform chart.
controlPlane:
  # -- Configures `controlPlane.enabled` for the platform chart.
  enabled: true
  # -- Configures `controlPlane.image` for the platform chart.
  image:
    # -- Configures `controlPlane.image.repository` for the platform chart.
    repository: ghcr.io/musematic/control-plane
    # -- Configures `controlPlane.image.tag` for the platform chart.
    tag: latest
    # -- Configures `controlPlane.image.pullPolicy` for the platform chart.
    pullPolicy: IfNotPresent
  # -- Configures `controlPlane.common` for the platform chart.
  common:
    # -- Configures `controlPlane.common.resources` for the platform chart.
    resources:
      # -- Configures `controlPlane.common.resources.requests` for the platform chart.
      requests:
        # -- Configures `controlPlane.common.resources.requests.cpu` for the platform chart.
        cpu: 250m
        # -- Configures `controlPlane.common.resources.requests.memory` for the platform chart.
        memory: 256Mi
      # -- Configures `controlPlane.common.resources.limits` for the platform chart.
      limits:
        # -- Configures `controlPlane.common.resources.limits.cpu` for the platform chart.
        cpu: "1"
        # -- Configures `controlPlane.common.resources.limits.memory` for the platform chart.
        memory: 512Mi
    # -- Configures `controlPlane.common.featureE2EMode` for the platform chart.
    featureE2EMode: false
    # -- Configures `controlPlane.common.mockLlmEnabled` for the platform chart.
    mockLlmEnabled: false
    # -- Configures `controlPlane.common.zeroTrustVisibility` for the platform chart.
    zeroTrustVisibility: false
    # -- Configures `controlPlane.common.otelExporterEndpoint` for the platform chart.
    otelExporterEndpoint: http://otel-collector.platform-observability.svc.cluster.local:4318
    # -- Configures `controlPlane.common.otelServiceName` for the platform chart.
    otelServiceName: control-plane
    # -- Configures `controlPlane.common.otelResourceAttributes` for the platform chart.
    otelResourceAttributes: deployment.environment=production
    # -- Configures `controlPlane.common.wsClientBufferSize` for the platform chart.
    wsClientBufferSize: 1000
    # -- Configures `controlPlane.common.wsHeartbeatIntervalSeconds` for the platform chart.
    wsHeartbeatIntervalSeconds: 30
    # -- Configures `controlPlane.common.wsHeartbeatTimeoutSeconds` for the platform chart.
    wsHeartbeatTimeoutSeconds: 10
  # -- Configures `controlPlane.privacy` for the platform chart.
  privacy:
    # -- Configures `controlPlane.privacy.dsrEnabled` for the platform chart.
    dsrEnabled: false
    # -- Configures `controlPlane.privacy.dlpEnabled` for the platform chart.
    dlpEnabled: false
    # -- Configures `controlPlane.privacy.residencyEnforcementEnabled` for the platform chart.
    residencyEnforcementEnabled: false
    # -- Configures `controlPlane.privacy.clickhousePiiTables` for the platform chart.
    clickhousePiiTables:
      - execution_metrics
      - agent_performance
      - token_usage
  # -- Configures `controlPlane.connections` for the platform chart.
  connections:
    # -- Configures `controlPlane.connections.postgresDsn` for the platform chart.
    postgresDsn: postgresql+asyncpg://musematic:change-me@musematic-postgres-rw.platform-data.svc.cluster.local:5432/musematic
    # -- Configures `controlPlane.connections.redisUrl` for the platform chart.
    redisUrl: redis://:change-me@musematic-redis.platform.svc.cluster.local:6379
    # -- Configures `controlPlane.connections.redisTestMode` for the platform chart.
    redisTestMode: cluster
    # -- Configures `controlPlane.connections.kafkaBrokers` for the platform chart.
    kafkaBrokers: musematic-kafka-kafka-bootstrap.platform-data.svc.cluster.local:9092
    # -- Configures `controlPlane.connections.qdrantHost` for the platform chart.
    qdrantHost: musematic-qdrant.platform.svc.cluster.local
    # -- Configures `controlPlane.connections.qdrantPort` for the platform chart.
    qdrantPort: 6333
    # -- Configures `controlPlane.connections.qdrantGrpcPort` for the platform chart.
    qdrantGrpcPort: 6334
    # -- Configures `controlPlane.connections.neo4jUri` for the platform chart.
    neo4jUri: bolt://musematic-neo4j.platform.svc.cluster.local:7687
    # -- Configures `controlPlane.connections.neo4jUser` for the platform chart.
    neo4jUser: neo4j
    # -- Configures `controlPlane.connections.neo4jPassword` for the platform chart.
    neo4jPassword: neo4j
    # -- Configures `controlPlane.connections.clickhouseHost` for the platform chart.
    clickhouseHost: musematic-clickhouse.platform.svc.cluster.local
    # -- Configures `controlPlane.connections.clickhousePort` for the platform chart.
    clickhousePort: 8123
    # -- Configures `controlPlane.connections.clickhouseUser` for the platform chart.
    clickhouseUser: default
    # -- Configures `controlPlane.connections.clickhousePassword` for the platform chart.
    clickhousePassword: ""
    # -- Configures `controlPlane.connections.clickhouseDatabase` for the platform chart.
    clickhouseDatabase: default
    # -- Configures `controlPlane.connections.opensearchHosts` for the platform chart.
    opensearchHosts: http://musematic-opensearch.platform.svc.cluster.local:9200
    # -- Configures `controlPlane.connections.opensearchUsername` for the platform chart.
    opensearchUsername: admin
    # -- Configures `controlPlane.connections.opensearchPassword` for the platform chart.
    opensearchPassword: admin
    # -- Configures `controlPlane.connections.s3EndpointUrl` for the platform chart.
    s3EndpointUrl: http://musematic-minio.platform-data.svc.cluster.local:9000
    # -- Configures `controlPlane.connections.s3AccessKey` for the platform chart.
    s3AccessKey: platform
    # -- Configures `controlPlane.connections.s3SecretKey` for the platform chart.
    s3SecretKey: change-me
    # -- Configures `controlPlane.connections.s3Region` for the platform chart.
    s3Region: us-east-1
    # -- Configures `controlPlane.connections.s3BucketPrefix` for the platform chart.
    s3BucketPrefix: platform
    # -- Configures `controlPlane.connections.s3UsePathStyle` for the platform chart.
    s3UsePathStyle: true
    # -- Configures `controlPlane.connections.s3Provider` for the platform chart.
    s3Provider: generic
    # -- Configures `controlPlane.connections.grpcRuntimeController` for the platform chart.
    grpcRuntimeController: musematic-runtime-controller.platform.svc.cluster.local:50051
    # -- Configures `controlPlane.connections.grpcReasoningEngine` for the platform chart.
    grpcReasoningEngine: reasoning-engine.platform.svc.cluster.local:50052
    # -- Configures `controlPlane.connections.grpcSandboxManager` for the platform chart.
    grpcSandboxManager: sandbox-manager.platform.svc.cluster.local:50053
    # -- Configures `controlPlane.connections.grpcSimulationController` for the platform chart.
    grpcSimulationController: musematic-simulation-controller.platform.svc.cluster.local:50055
    # -- Configures `controlPlane.connections.authJwtSecretKey` for the platform chart.
    authJwtSecretKey: change-me
    # -- Configures `controlPlane.connections.authMfaEncryptionKey` for the platform chart.
    authMfaEncryptionKey: ""
    # -- Configures `controlPlane.connections.authJwtAlgorithm` for the platform chart.
    authJwtAlgorithm: HS256
  # -- Configures `controlPlane.migration` for the platform chart.
  migration:
    # -- Configures `controlPlane.migration.enabled` for the platform chart.
    enabled: true
    # -- Configures `controlPlane.migration.backoffLimit` for the platform chart.
    backoffLimit: 3
  # -- Configures `controlPlane.api` for the platform chart.
  api:
    # -- Configures `controlPlane.api.enabled` for the platform chart.
    enabled: true
    # -- Configures `controlPlane.api.replicaCount` for the platform chart.
    replicaCount: 1
    # -- Configures `controlPlane.api.service` for the platform chart.
    service:
      # -- Configures `controlPlane.api.service.type` for the platform chart.
      type: ClusterIP
      # -- Configures `controlPlane.api.service.port` for the platform chart.
      port: 8000
      # -- Configures `controlPlane.api.service.nodePort` for the platform chart.
      nodePort: null
  # -- Configures `controlPlane.scheduler` for the platform chart.
  scheduler:
    # -- Configures `controlPlane.scheduler.enabled` for the platform chart.
    enabled: true
    # -- Configures `controlPlane.scheduler.replicaCount` for the platform chart.
    replicaCount: 1
  # -- Configures `controlPlane.worker` for the platform chart.
  worker:
    # -- Configures `controlPlane.worker.enabled` for the platform chart.
    enabled: true
    # -- Configures `controlPlane.worker.replicaCount` for the platform chart.
    replicaCount: 1
  # -- Configures `controlPlane.wsHub` for the platform chart.
  wsHub:
    # -- Configures `controlPlane.wsHub.enabled` for the platform chart.
    enabled: true
    # -- Configures `controlPlane.wsHub.replicaCount` for the platform chart.
    replicaCount: 1
    # -- Configures `controlPlane.wsHub.service` for the platform chart.
    service:
      # -- Configures `controlPlane.wsHub.service.type` for the platform chart.
      type: ClusterIP
      # -- Configures `controlPlane.wsHub.service.port` for the platform chart.
      port: 8001
      # -- Configures `controlPlane.wsHub.service.nodePort` for the platform chart.
      nodePort: null

