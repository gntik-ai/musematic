apiVersion: v2
name: musematic-platform
description: Composite Musematic platform chart used by production and E2E deployments.
type: application
version: 0.1.0
appVersion: "0.1.0"
dependencies:
  - name: musematic-postgresql
    alias: postgresql
    repository: file://../postgresql
    version: 0.1.0
    condition: postgresql.enabled
  - name: musematic-redis
    alias: redis
    repository: file://../redis
    version: 0.1.0
    condition: redis.enabled
  - name: musematic-kafka
    alias: kafka
    repository: file://../kafka
    version: 0.1.0
    condition: kafka.enabled
  - name: musematic-minio
    alias: minio
    repository: file://../minio
    version: 0.1.0
    condition: minio.enabled
  - name: musematic-qdrant
    alias: qdrant
    repository: file://../qdrant
    version: 0.1.0
    condition: qdrant.enabled
  - name: musematic-neo4j
    alias: neo4j
    repository: file://../neo4j
    version: 0.1.0
    condition: neo4j.enabled
  - name: musematic-clickhouse
    alias: clickhouse
    repository: file://../clickhouse
    version: 0.1.0
    condition: clickhouse.enabled
  - name: musematic-opensearch
    alias: opensearch
    repository: file://../opensearch
    version: 0.1.0
    condition: opensearch.enabled
  - name: musematic-vault
    alias: vault
    repository: file://../vault
    version: 0.1.0
    condition: vault.enabled
  - name: musematic-control-plane
    alias: controlPlane
    repository: file://../control-plane
    version: 0.1.0
    condition: controlPlane.enabled
  - name: musematic-runtime-controller
    alias: runtimeController
    repository: file://../runtime-controller
    version: 0.1.0
    condition: runtimeController.enabled
  - name: reasoning-engine
    alias: reasoningEngine
    repository: file://../reasoning-engine
    version: 0.1.0
    condition: reasoningEngine.enabled
  - name: simulation-controller
    alias: simulationController
    repository: file://../simulation-controller
    version: 0.1.0
    condition: simulationController.enabled
  - name: sandbox-manager
    alias: sandboxManager
    repository: file://../../../services/sandbox-manager/deploy/helm/sandbox-manager
    version: 0.1.0
    condition: sandboxManager.enabled
  - name: musematic-ui
    alias: ui
    repository: file://../ui
    version: 0.1.0
    condition: ui.enabled
