replicaCount: 2

image:
  repository: ghcr.io/andrea-mucci/musematic/reasoning-engine
  tag: latest
  pullPolicy: IfNotPresent

grpcPort: 50052

resources:
  requests:
    cpu: 250m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

config:
  maxTotConcurrency: "10"
  traceBufferSize: "10000"
  tracePayloadThreshold: "65536"
  budgetDefaultTTLSeconds: "3600"
  otelExporterOtlpEndpoint: http://otel-collector.platform-observability.svc.cluster.local:4317
  otelServiceName: reasoning-engine
  otelResourceAttributes: deployment.environment=production

configSecretRef: reasoning-engine-config

hpa:
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
