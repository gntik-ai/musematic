apiVersion: v1
kind: ConfigMap
metadata:
  name: reasoning-engine-config
  namespace: {{ .Release.Namespace }}
data:
  GRPC_PORT: "{{ .Values.grpcPort }}"
  MAX_TOT_CONCURRENCY: "{{ .Values.config.maxTotConcurrency }}"
  TRACE_BUFFER_SIZE: "{{ .Values.config.traceBufferSize }}"
  TRACE_PAYLOAD_THRESHOLD: "{{ .Values.config.tracePayloadThreshold }}"
  BUDGET_DEFAULT_TTL_SECONDS: "{{ .Values.config.budgetDefaultTTLSeconds }}"
  STARTUP_DEPENDENCY_TIMEOUT_SECONDS: "{{ .Values.config.startupDependencyTimeoutSeconds }}"
  STARTUP_DEPENDENCY_RETRY_INTERVAL_SECONDS: "{{ .Values.config.startupDependencyRetryIntervalSeconds }}"
  OTEL_EXPORTER_OTLP_ENDPOINT: "{{ .Values.config.otelExporterOtlpEndpoint }}"
  OTEL_SERVICE_NAME: "{{ .Values.config.otelServiceName }}"
  OTEL_RESOURCE_ATTRIBUTES: "{{ .Values.config.otelResourceAttributes }}"
