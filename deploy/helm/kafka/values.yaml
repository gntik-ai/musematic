# @section -- Clustername
# -- Configures `clusterName` for the kafka chart.
clusterName: musematic-kafka
# @section -- Namespace
# -- Configures `namespace` for the kafka chart.
namespace: platform-data
# @section -- Kafkaversion
# -- Configures `kafkaVersion` for the kafka chart.
kafkaVersion: "4.1.1"
# @section -- Metadataversion
# -- Configures `metadataVersion` for the kafka chart.
metadataVersion: "4.1-IV1"
# @section -- Replicationfactor
# -- Configures `replicationFactor` for the kafka chart.
replicationFactor: 3
# @section -- Mininsyncreplicas
# -- Configures `minInsyncReplicas` for the kafka chart.
minInsyncReplicas: 2
# @section -- Logretentionms
# -- Configures `logRetentionMs` for the kafka chart.
logRetentionMs: 604800000
# @section -- Dlqretentionms
# -- Configures `dlqRetentionMs` for the kafka chart.
dlqRetentionMs: 2592000000
# @section -- Dlqpartitions
# -- Configures `dlqPartitions` for the kafka chart.
dlqPartitions: 6
# @section -- Metricsport
# -- Configures `metricsPort` for the kafka chart.
metricsPort: 9404
# @section -- Combined
# -- Configures `combined` for the kafka chart.
combined: false
# @section -- Brokerreplicas
# -- Configures `brokerReplicas` for the kafka chart.
brokerReplicas: 3
# @section -- Controllerreplicas
# -- Configures `controllerReplicas` for the kafka chart.
controllerReplicas: 3
# @section -- Combinedreplicas
# -- Configures `combinedReplicas` for the kafka chart.
combinedReplicas: 1
# @section -- Networkpolicy
# -- Configures `networkPolicy` for the kafka chart.
networkPolicy:
  # -- Configures `networkPolicy.enabled` for the kafka chart.
  enabled: false
# @section -- Storage
# -- Configures `storage` for the kafka chart.
storage:
  # -- Configures `storage.size` for the kafka chart.
  size: 100Gi
  # -- Configures `storage.class` for the kafka chart.
  class: standard
# @section -- Jvmoptions
# -- Configures `jvmOptions` for Kafka node pools.
jvmOptions: {}
# @section -- Resources
# -- Configures `resources` for Kafka node pools.
resources: {}
