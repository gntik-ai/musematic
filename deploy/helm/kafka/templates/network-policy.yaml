{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Values.clusterName }}-intra-cluster
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels:
      strimzi.io/cluster: {{ .Values.clusterName }}
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              strimzi.io/cluster: {{ .Values.clusterName }}
      ports:
        - protocol: TCP
          port: 9090
        - protocol: TCP
          port: 9093
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Values.clusterName }}-client-access
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels:
      strimzi.io/cluster: {{ .Values.clusterName }}
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: platform-control
      ports:
        - protocol: TCP
          port: 9092
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: platform-execution
      ports:
        - protocol: TCP
          port: 9092
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Values.clusterName }}-metrics
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels:
      strimzi.io/cluster: {{ .Values.clusterName }}
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: platform-observability
      ports:
        - protocol: TCP
          port: 9404
{{- end }}

