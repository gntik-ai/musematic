{{- if .Values.combined }}
apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: {{ .Values.clusterName }}-combined
  namespace: {{ .Values.namespace }}
  labels:
    strimzi.io/cluster: {{ .Values.clusterName }}
spec:
  replicas: {{ .Values.combinedReplicas }}
  roles:
    - broker
    - controller
  {{- with .Values.jvmOptions }}
  jvmOptions:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.resources }}
  resources:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  storage:
    type: persistent-claim
    size: {{ .Values.storage.size | quote }}
    class: {{ .Values.storage.class | quote }}
    deleteClaim: false
{{- end }}
