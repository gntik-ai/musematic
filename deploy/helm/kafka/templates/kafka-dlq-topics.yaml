{{- range .Values.topics }}
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: {{ .name }}.dlq
  namespace: {{ $.Values.namespace }}
  labels:
    strimzi.io/cluster: {{ $.Values.clusterName }}
spec:
  partitions: {{ $.Values.dlqPartitions }}
  replicas: {{ $.Values.replicationFactor }}
  config:
    retention.ms: {{ $.Values.dlqRetentionMs | quote }}
---
{{- end }}

