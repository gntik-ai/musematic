{{- if .Values.schemaInit.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: neo4j-schema-init
  namespace: {{ .Release.Namespace }}
  labels:
    app: neo4j-schema-init
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  template:
    metadata:
      labels:
        app: neo4j-schema-init
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-neo4j
          image: {{ .Values.schemaInit.image | quote }}
          command:
            - /bin/bash
            - -ec
            - |
              for attempt in $(seq 1 {{ .Values.schemaInit.retries }}); do
                if cypher-shell -u neo4j -p "$NEO4J_PASSWORD" -a bolt://musematic-neo4j.{{ .Release.Namespace }}.svc.cluster.local:7687 "RETURN 1;" >/dev/null 2>&1; then
                  exit 0
                fi
                sleep {{ .Values.schemaInit.retryIntervalSeconds }}
              done
              exit 1
          env:
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: neo4j-credentials
                  key: NEO4J_PASSWORD
      containers:
        - name: schema-init
          image: {{ .Values.schemaInit.image | quote }}
          command:
            - /bin/bash
            - -ec
            - |
              cypher-shell -u neo4j -p "$NEO4J_PASSWORD" \
                -a bolt://musematic-neo4j.{{ .Release.Namespace }}.svc.cluster.local:7687 \
                -f /scripts/init.cypher
          env:
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: neo4j-credentials
                  key: NEO4J_PASSWORD
          volumeMounts:
            - name: init-cypher
              mountPath: /scripts
      volumes:
        - name: init-cypher
          configMap:
            name: neo4j-init-cypher
{{- end }}
