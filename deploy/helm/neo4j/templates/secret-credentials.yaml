{{- $existing := lookup "v1" "Secret" .Release.Namespace "neo4j-credentials" -}}
apiVersion: v1
kind: Secret
metadata:
  name: neo4j-credentials
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  NEO4J_PASSWORD: {{ (and $existing $existing.data $existing.data.NEO4J_PASSWORD | ternary ($existing.data.NEO4J_PASSWORD | b64dec) (randAlphaNum 32)) | quote }}
