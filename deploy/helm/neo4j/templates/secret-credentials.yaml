{{- $existing := lookup "v1" "Secret" .Release.Namespace "neo4j-credentials" -}}
{{- $configured := .Values.neo4j.password | default "" -}}
{{- $password := randAlphaNum 32 -}}
{{- if $configured -}}
{{- $password = $configured -}}
{{- else if and $existing $existing.data (hasKey $existing.data "NEO4J_PASSWORD") -}}
{{- $password = (index $existing.data "NEO4J_PASSWORD" | b64dec) -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: neo4j-credentials
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  NEO4J_PASSWORD: {{ $password | quote }}
  NEO4J_AUTH: {{ printf "neo4j/%s" $password | quote }}
