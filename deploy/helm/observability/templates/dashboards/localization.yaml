apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-localization
  namespace: {{ include "musematic-observability.namespace" . }}
  labels:
{{ include "musematic-observability.dashboardLabels" . | indent 4 }}
data:
  localization.json: |
    {
      "__inputs": [],
      "__requires": [],
      "annotations": { "list": [] },
      "description": "Localization preference mutations, locale negotiation, missing-key signals, and locale-file publishing.",
      "editable": true,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "Translation Key Not Found Rate",
          "datasource": { "type": "loki", "uid": "loki" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [{ "expr": "sum by (locale) (rate({bounded_context=\"localization\", service=~\"$service\", level=\"warn\"} | json | message=\"translation_key_not_found\" [$__rate_interval]))", "legendFormat": "{{ `{{locale}}` }}", "refId": "A" }]
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Per-Locale Request Rate",
          "datasource": { "type": "loki", "uid": "loki" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [{ "expr": "sum by (locale) (rate({bounded_context=\"localization\", service=~\"$service\"} | json | message=\"locale_resolved\" [$__rate_interval]))", "legendFormat": "{{ `{{locale}}` }}", "refId": "A" }]
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "Preference Mutation Rate",
          "datasource": { "type": "loki", "uid": "loki" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "targets": [{ "expr": "sum by (service) (rate({bounded_context=\"localization\", service=~\"$service\"} | json | action=\"localization.user_preferences.updated\" [$__rate_interval]))", "legendFormat": "{{ `{{service}}` }}", "refId": "A" }]
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "Locale File Publish Events",
          "datasource": { "type": "loki", "uid": "loki" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "targets": [{ "expr": "sum by (locale) (count_over_time({bounded_context=\"localization\", service=~\"$service\"} | json | action=\"localization.locale_file.published\" [$__range]))", "legendFormat": "{{ `{{locale}}` }}", "refId": "A" }]
        },
        {
          "id": 50,
          "type": "logs",
          "title": "Localization Log Stream",
          "datasource": { "type": "loki", "uid": "loki" },
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 16 },
          "targets": [{ "expr": "{bounded_context=\"localization\", service=~\"$service\"} | json | level=~\"$level\" | locale=~\"$locale\"", "refId": "A" }],
          "options": { "dedupStrategy": "none", "enableLogDetails": true, "showLabels": true, "showTime": true, "sortOrder": "Descending" }
        }
      ],
      "refresh": "30s",
      "schemaVersion": 38,
      "tags": ["musematic", "localization"],
      "templating": {
        "list": [
          { "current": { "selected": false, "text": "Prometheus", "value": "Prometheus" }, "hide": 0, "includeAll": false, "label": "Datasource", "multi": false, "name": "datasource", "options": [], "query": "prometheus", "refresh": 1, "regex": "", "type": "datasource" },
          { "current": { "selected": false, "text": "control-plane", "value": "control-plane" }, "hide": 0, "includeAll": false, "label": "Service", "multi": false, "name": "service", "query": "control-plane", "type": "textbox" },
          { "current": { "selected": false, "text": ".*", "value": ".*" }, "hide": 0, "includeAll": false, "label": "Level", "multi": false, "name": "level", "query": ".*", "type": "textbox" },
          { "current": { "selected": false, "text": ".*", "value": ".*" }, "hide": 0, "includeAll": false, "label": "Locale", "multi": false, "name": "locale", "query": ".*", "type": "textbox" }
        ]
      },
      "time": { "from": "now-24h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "Localization",
      "uid": "localization",
      "version": 1
    }
