apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-platform-overview
  namespace: {{ include "musematic-observability.namespace" . }}
  labels:
{{ include "musematic-observability.dashboardLabels" . | indent 4 }}
data:
  platform-overview.json: |
    {
      "__inputs": [],
      "__requires": [
        { "type": "grafana", "id": "grafana", "name": "Grafana", "version": "11.1.0" },
        { "type": "datasource", "id": "prometheus", "name": "Prometheus", "version": "" },
        { "type": "panel", "id": "stat", "name": "Stat", "version": "" },
        { "type": "panel", "id": "timeseries", "name": "Time series", "version": "" }
      ],
      "annotations": { "list": [] },
      "description": "Platform service health, throughput, error rate, and latency.",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Healthy Services",
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "gridPos": { "h": 8, "w": 6, "x": 0, "y": 0 },
          "targets": [
            { "expr": "sum(up{namespace=~\"$namespace\"})", "refId": "A" }
          ],
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "orientation": "horizontal",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }
          }
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Request Rate",
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "gridPos": { "h": 8, "w": 18, "x": 6, "y": 0 },
          "targets": [
            {
              "expr": "sum by (service_name) (rate(http_server_request_duration_seconds_count{k8s_namespace_name=~\"$namespace\"}[5m]))",
              "legendFormat": "{{ `{{service_name}}` }}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "Error Rate",
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "targets": [
            {
              "expr": "sum by (service_name) (rate(http_server_request_duration_seconds_count{http_response_status_code=~\"5..\",k8s_namespace_name=~\"$namespace\"}[5m])) / clamp_min(sum by (service_name) (rate(http_server_request_duration_seconds_count{k8s_namespace_name=~\"$namespace\"}[5m])), 1)",
              "legendFormat": "{{ `{{service_name}}` }}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "p95 Latency",
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum by (le, service_name) (rate(http_server_request_duration_seconds_bucket{k8s_namespace_name=~\"$namespace\"}[5m])))",
              "legendFormat": "{{ `{{service_name}}` }}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 60,
          "type": "timeseries",
          "title": "Tag Mutation Rate",
          "description": "common/tagging is shared substrate, not a bounded context; these panels live on Platform Overview rather than a new BC dashboard.",
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 16 },
          "targets": [
            {
              "expr": "sum by (service, bounded_context, level) (rate(common_tagging_tag_mutations_total{bounded_context=\"common-tagging\"}[5m]))",
              "legendFormat": "{{ `{{service}}` }} {{ `{{level}}` }}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 61,
          "type": "timeseries",
          "title": "Label Mutation Rate",
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 16 },
          "targets": [
            {
              "expr": "sum by (service, bounded_context, level) (rate(common_tagging_label_mutations_total{bounded_context=\"common-tagging\"}[5m]))",
              "legendFormat": "{{ `{{service}}` }} {{ `{{level}}` }}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 62,
          "type": "timeseries",
          "title": "Cross-Entity Tag Search Latency",
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 16 },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum by (le, service, bounded_context, level) (rate(common_tagging_cross_entity_search_duration_seconds_bucket{bounded_context=\"common-tagging\"}[5m])))",
              "legendFormat": "p50",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.95, sum by (le, service, bounded_context, level) (rate(common_tagging_cross_entity_search_duration_seconds_bucket{bounded_context=\"common-tagging\"}[5m])))",
              "legendFormat": "p95",
              "refId": "B"
            },
            {
              "expr": "histogram_quantile(0.99, sum by (le, service, bounded_context, level) (rate(common_tagging_cross_entity_search_duration_seconds_bucket{bounded_context=\"common-tagging\"}[5m])))",
              "legendFormat": "p99",
              "refId": "C"
            }
          ]
        },
        {
          "id": 63,
          "type": "timeseries",
          "title": "Compiled AST Cache Hits",
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 24 },
          "targets": [
            {
              "expr": "sum by (service, bounded_context, level) (rate(common_tagging_label_expression_cache_hits_total{bounded_context=\"common-tagging\"}[5m]))",
              "legendFormat": "hits",
              "refId": "A"
            },
            {
              "expr": "sum by (service, bounded_context, level) (rate(common_tagging_label_expression_cache_misses_total{bounded_context=\"common-tagging\"}[5m]))",
              "legendFormat": "misses",
              "refId": "B"
            }
          ]
        },
        {
          "id": 64,
          "type": "timeseries",
          "title": "Saved View Share Propagation",
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 24 },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum by (le, service, bounded_context, level) (rate(common_tagging_saved_view_share_propagation_seconds_bucket{bounded_context=\"common-tagging\"}[5m])))",
              "legendFormat": "p95",
              "refId": "A"
            }
          ]
        },
        {
          "id": 50,
          "type": "logs",
          "title": "View Related Logs",
          "datasource": { "type": "loki", "uid": "loki" },
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 32 },
          "targets": [
            {
              "expr": "{service=~\"$service\"} | json",
              "refId": "A"
            }
          ],
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "showLabels": true,
            "showTime": true,
            "sortOrder": "Descending"
          }
        }
      ],
      "refresh": "30s",
      "schemaVersion": 38,
      "tags": ["musematic", "platform"],
      "templating": {
        "list": [
          {
            "current": { "selected": false, "text": "Prometheus", "value": "Prometheus" },
            "hide": 0,
            "includeAll": false,
            "label": "Datasource",
            "multi": false,
            "name": "datasource",
            "options": [],
            "query": "prometheus",
            "refresh": 1,
            "regex": "",
            "type": "datasource"
          },
          {
            "current": { "selected": true, "text": ["platform-.*"], "value": ["platform-.*"] },
            "datasource": { "type": "prometheus", "uid": "$datasource" },
            "hide": 0,
            "includeAll": true,
            "label": "Namespace",
            "multi": true,
            "name": "namespace",
            "options": [],
            "query": "label_values(up, namespace)",
            "refresh": 1,
            "regex": "platform-.*",
            "type": "query"
          },
          {
            "current": { "selected": true, "text": "All", "value": "$__all" },
            "datasource": { "type": "loki", "uid": "loki" },
            "hide": 0,
            "includeAll": true,
            "label": "Service",
            "multi": true,
            "name": "service",
            "options": [],
            "query": "label_values(service)",
            "refresh": 1,
            "regex": "",
            "type": "query"
          }
        ]
      },
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "Platform Overview",
      "uid": "platform-overview",
      "version": 1
    }
