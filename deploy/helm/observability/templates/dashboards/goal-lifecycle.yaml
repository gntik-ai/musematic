apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-goal-lifecycle
  namespace: {{ include "musematic-observability.namespace" . }}
  labels:
{{ include "musematic-observability.dashboardLabels" . | indent 4 }}
data:
  goal-lifecycle.json: |
    {
      "annotations": { "list": [] },
      "description": "Goal lifecycle state, completion times, response decisions, messages, and attention requests.",
      "editable": true,
      "id": null,
      "panels": [
        { "id": 1, "type": "gauge", "title": "Goals by State", "datasource": { "type": "prometheus", "uid": "$prometheus" }, "gridPos": { "h": 8, "w": 8, "x": 0, "y": 0 }, "targets": [ { "expr": "sum by (state) (goal_lifecycle_goals)", "refId": "A" } ] },
        { "id": 2, "type": "timeseries", "title": "Goal Completion Time", "datasource": { "type": "prometheus", "uid": "$prometheus" }, "gridPos": { "h": 8, "w": 8, "x": 8, "y": 0 }, "targets": [ { "expr": "histogram_quantile(0.95, sum by (le) (rate(goal_completion_seconds_bucket[5m])))", "refId": "A" } ] },
        { "id": 3, "type": "bargauge", "title": "Agent Response Decisions", "datasource": { "type": "loki", "uid": "loki" }, "gridPos": { "h": 8, "w": 8, "x": 16, "y": 0 }, "targets": [ { "expr": "sum by (decision) (count_over_time({bounded_context=~\"interactions|goals\"} | json | decision != \"\" [1h]))", "refId": "A" } ] },
        { "id": 4, "type": "timeseries", "title": "Messages per Goal", "datasource": { "type": "prometheus", "uid": "$prometheus" }, "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 }, "targets": [ { "expr": "histogram_quantile(0.95, sum by (le) (rate(goal_messages_total_bucket[5m])))", "refId": "A" } ] },
        { "id": 5, "type": "stat", "title": "Attention Requests", "datasource": { "type": "prometheus", "uid": "$prometheus" }, "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 }, "targets": [ { "expr": "sum(rate(attention_requests_total[5m]))", "refId": "A" } ] }
      ],
      "refresh": "30s",
      "schemaVersion": 38,
      "tags": ["musematic", "goals"],
      "templating": { "list": [ { "name": "prometheus", "type": "datasource", "query": "prometheus", "current": { "selected": false, "text": "Prometheus", "value": "Prometheus" } } ] },
      "time": { "from": "now-1h", "to": "now" },
      "timezone": "browser",
      "title": "D20 Goal Lifecycle & Agent Responses",
      "uid": "d20-goal-lifecycle",
      "version": 1
    }
