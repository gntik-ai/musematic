apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-cost-governance
  namespace: {{ include "musematic-observability.namespace" . }}
  labels:
{{ include "musematic-observability.dashboardLabels" . | indent 4 }}
data:
  cost-governance.json: |
    {
      "__inputs": [],
      "__requires": [],
      "annotations": { "list": [] },
      "description": "Cost governance attribution, budget enforcement, forecasts, and anomalies.",
      "editable": true,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "Attribution Write Rate",
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [{ "expr": "sum by (service) (rate(cost_governance_attribution_writes_total[5m]))", "legendFormat": "{{ `{{service}}` }}", "refId": "A" }]
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Budget Threshold Crossings",
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [{ "expr": "sum by (service) (increase(cost_governance_budget_thresholds_total[1h]))", "legendFormat": "{{ `{{service}}` }}", "refId": "A" }]
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Hard-Cap Blocks",
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "gridPos": { "h": 6, "w": 8, "x": 0, "y": 8 },
          "targets": [{ "expr": "sum(increase(cost_governance_hard_cap_blocks_total[1h]))", "legendFormat": "blocks", "refId": "A" }]
        },
        {
          "id": 4,
          "type": "barchart",
          "title": "Open Anomalies by Severity",
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "gridPos": { "h": 6, "w": 8, "x": 8, "y": 8 },
          "targets": [{ "expr": "sum by (level) (cost_governance_open_anomalies)", "legendFormat": "{{ `{{level}}` }}", "refId": "A" }]
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "Forecast vs Actual Delta",
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "gridPos": { "h": 6, "w": 8, "x": 16, "y": 8 },
          "targets": [{ "expr": "avg by (service) (cost_governance_forecast_actual_delta_cents)", "legendFormat": "{{ `{{service}}` }}", "refId": "A" }]
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "ClickHouse Batch Flush Latency",
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 14 },
          "targets": [{ "expr": "histogram_quantile(0.95, sum by (le, service) (rate(cost_governance_clickhouse_flush_seconds_bucket[5m])))", "legendFormat": "p95 {{ `{{service}}` }}", "refId": "A" }]
        }
      ],
      "refresh": "30s",
      "schemaVersion": 38,
      "tags": ["musematic", "cost-governance"],
      "templating": {
        "list": [
          { "current": { "selected": false, "text": "Prometheus", "value": "Prometheus" }, "hide": 0, "includeAll": false, "label": "Datasource", "multi": false, "name": "datasource", "options": [], "query": "prometheus", "refresh": 1, "regex": "", "type": "datasource" }
        ]
      },
      "time": { "from": "now-6h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "Cost Governance",
      "uid": "cost-governance",
      "version": 1
    }
