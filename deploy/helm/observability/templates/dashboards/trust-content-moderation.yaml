apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-trust-content-moderation
  namespace: {{ include "musematic-observability.namespace" . }}
  labels:
{{ include "musematic-observability.dashboardLabels" . | indent 4 }}
data:
  trust-content-moderation.json: |
    {
      "__inputs": [],
      "__requires": [
        { "type": "grafana", "id": "grafana", "name": "Grafana", "version": "11.1.0" },
        { "type": "datasource", "id": "prometheus", "name": "Prometheus", "version": "" },
        { "type": "panel", "id": "barchart", "name": "Bar chart", "version": "" },
        { "type": "panel", "id": "stat", "name": "Stat", "version": "" },
        { "type": "panel", "id": "timeseries", "name": "Time series", "version": "" }
      ],
      "annotations": { "list": [] },
      "description": "Content moderation trigger rate, action breakdown, provider failures, and fairness-evaluation volume.",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "id": 1,
          "title": "Moderation Trigger Rate by Category",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "sum by (workspace_id, category) (rate(content_moderation_triggered_total{namespace=~\"$namespace\"}[5m]))",
              "legendFormat": "{{ `{{workspace_id}} {{category}}` }}",
              "refId": "A"
            }
          ],
          "links": [
            {
              "title": "View related logs",
              "url": "/explore?left={\"datasource\":\"loki\",\"queries\":[{\"expr\":\"{bounded_context=~\\\"trust|content_safety|content_moderation\\\"} | json\"}],\"range\":{\"from\":\"${__from}\",\"to\":\"${__to}\"}}",
              "targetBlank": false
            }
          ],
          "fieldConfig": { "defaults": { "unit": "ops" }, "overrides": [] }
        },
        {
          "id": 2,
          "title": "Action Breakdown",
          "type": "barchart",
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "sum by (workspace_id, action) (increase(content_moderation_actions_total{namespace=~\"$namespace\"}[1h]))",
              "legendFormat": "{{ `{{workspace_id}} {{action}}` }}",
              "refId": "A"
            }
          ],
          "links": [
            {
              "title": "View related logs",
              "url": "/explore?left={\"datasource\":\"loki\",\"queries\":[{\"expr\":\"{bounded_context=~\\\"trust|content_safety|content_moderation\\\"} | json\"}],\"range\":{\"from\":\"${__from}\",\"to\":\"${__to}\"}}",
              "targetBlank": false
            }
          ],
          "fieldConfig": { "defaults": { "unit": "short" }, "overrides": [] }
        },
        {
          "id": 3,
          "title": "Provider Failure Rate",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "targets": [
            {
              "expr": "sum by (workspace_id, provider) (rate(content_moderation_provider_failed_total{namespace=~\"$namespace\"}[5m]))",
              "legendFormat": "{{ `{{workspace_id}} {{provider}}` }}",
              "refId": "A"
            }
          ],
          "links": [
            {
              "title": "View related logs",
              "url": "/explore?left={\"datasource\":\"loki\",\"queries\":[{\"expr\":\"{bounded_context=~\\\"trust|content_safety|content_moderation\\\"} | json\"}],\"range\":{\"from\":\"${__from}\",\"to\":\"${__to}\"}}",
              "targetBlank": false
            }
          ],
          "fieldConfig": { "defaults": { "unit": "ops" }, "overrides": [] }
        },
        {
          "id": 4,
          "title": "Fairness Evaluations",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "targets": [
            {
              "expr": "sum by (workspace_id) (increase(fairness_evaluations_total{namespace=~\"$namespace\"}[24h]))",
              "legendFormat": "{{ `{{workspace_id}}` }}",
              "refId": "A"
            }
          ],
          "links": [
            {
              "title": "View related logs",
              "url": "/explore?left={\"datasource\":\"loki\",\"queries\":[{\"expr\":\"{bounded_context=~\\\"trust|content_safety|content_moderation\\\"} | json\"}],\"range\":{\"from\":\"${__from}\",\"to\":\"${__to}\"}}",
              "targetBlank": false
            }
          ],
          "fieldConfig": { "defaults": { "unit": "short" }, "overrides": [] }
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": ["musematic", "trust", "content-moderation", "fairness"],
      "templating": {
        "list": [
          {
            "current": { "selected": false, "text": "Prometheus", "value": "Prometheus" },
            "hide": 0,
            "includeAll": false,
            "label": "Datasource",
            "multi": false,
            "name": "datasource",
            "options": [],
            "query": "prometheus",
            "refresh": 1,
            "regex": "",
            "type": "datasource"
          },
          {
            "current": { "selected": true, "text": ["platform-.*"], "value": ["platform-.*"] },
            "datasource": { "type": "prometheus", "uid": "$datasource" },
            "hide": 0,
            "includeAll": true,
            "label": "Namespace",
            "multi": true,
            "name": "namespace",
            "options": [],
            "query": "label_values(up, namespace)",
            "refresh": 1,
            "regex": "",
            "type": "query"
          }
        ]
      },
      "time": { "from": "now-6h", "to": "now" },
      "title": "Trust Content Moderation",
      "uid": "trust-content-moderation",
      "version": 1
    }
