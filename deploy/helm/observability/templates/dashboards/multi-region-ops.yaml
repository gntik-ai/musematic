apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-multi-region-ops
  namespace: {{ include "musematic-observability.namespace" . }}
  labels:
{{ include "musematic-observability.dashboardLabels" . | indent 4 }}
data:
  multi-region-ops.json: |
    {
      "__inputs": [],
      "__requires": [],
      "annotations": { "list": [] },
      "description": "Multi-region replication health, failover readiness, maintenance state, and capacity saturation signals.",
      "editable": true,
      "graphTooltip": 1,
      "id": null,
      "links": [
        { "title": "Failover runbook", "url": "/docs/runbooks/failover.md", "type": "link", "targetBlank": true },
        { "title": "Zero-downtime upgrade runbook", "url": "/docs/runbooks/zero-downtime-upgrade.md", "type": "link", "targetBlank": true },
        { "title": "Active-active considerations", "url": "/docs/runbooks/active-active-considerations.md", "type": "link", "targetBlank": true }
      ],
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "Replication Lag by Component",
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "gridPos": { "h": 8, "w": 16, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "max by (component) (multi_region_replication_lag_seconds{bounded_context=\"multi_region_ops\",component=~\"postgres|kafka|s3|clickhouse|qdrant|neo4j|opensearch\"})",
              "legendFormat": "{{ `{{component}}` }}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "s" },
            "overrides": []
          }
        },
        {
          "id": 2,
          "type": "stat",
          "title": "RPO Threshold Breaches",
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 0 },
          "targets": [
            {
              "expr": "sum(increase(multi_region_rpo_threshold_breaches_total{bounded_context=\"multi_region_ops\"}[1h]))",
              "legendFormat": "breaches",
              "refId": "A"
            }
          ],
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "orientation": "horizontal",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }
          }
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "Per-Store Probe Success Rate",
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "targets": [
            {
              "expr": "sum by (component) (rate(multi_region_replication_probe_total{bounded_context=\"multi_region_ops\",result=\"success\",component=~\"postgres|kafka|s3|clickhouse|qdrant|neo4j|opensearch\"}[5m])) / clamp_min(sum by (component) (rate(multi_region_replication_probe_total{bounded_context=\"multi_region_ops\",component=~\"postgres|kafka|s3|clickhouse|qdrant|neo4j|opensearch\"}[5m])), 1)",
              "legendFormat": "{{ `{{component}}` }}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "percentunit" },
            "overrides": []
          }
        },
        {
          "id": 4,
          "type": "barchart",
          "title": "Maintenance Windows",
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "targets": [
            {
              "expr": "sum by (status) (multi_region_maintenance_windows{bounded_context=\"multi_region_ops\"})",
              "legendFormat": "{{ `{{status}}` }}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 5,
          "type": "stat",
          "title": "Stale Failover Plans",
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "targets": [
            {
              "expr": "sum(multi_region_failover_plan_stale{bounded_context=\"multi_region_ops\"})",
              "legendFormat": "stale plans",
              "refId": "A"
            }
          ],
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "orientation": "horizontal",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }
          }
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "Capacity Saturation Horizon",
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "targets": [
            {
              "expr": "min by (resource_class) (multi_region_capacity_saturation_horizon_days{bounded_context=\"multi_region_ops\"})",
              "legendFormat": "{{ `{{resource_class}}` }}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "d" },
            "overrides": []
          }
        },
        {
          "id": 50,
          "type": "logs",
          "title": "Multi-Region Log Stream",
          "datasource": { "type": "loki", "uid": "loki" },
          "gridPos": { "h": 10, "w": 12, "x": 0, "y": 24 },
          "targets": [
            { "expr": "{bounded_context=\"multi_region_ops\"} | json", "refId": "A" }
          ],
          "options": { "dedupStrategy": "none", "enableLogDetails": true, "showLabels": true, "showTime": true, "sortOrder": "Descending" }
        },
        {
          "id": 51,
          "type": "logs",
          "title": "Replication Lag Log Events",
          "datasource": { "type": "loki", "uid": "loki" },
          "gridPos": { "h": 10, "w": 12, "x": 12, "y": 24 },
          "targets": [
            { "expr": "{bounded_context=\"multi_region_ops\"} | json | message=~\".*replication.*lag.*|.*replication.*status.*\"", "refId": "A" }
          ],
          "options": { "dedupStrategy": "none", "enableLogDetails": true, "showLabels": true, "showTime": true, "sortOrder": "Descending" }
        }
      ],
      "refresh": "30s",
      "schemaVersion": 38,
      "tags": ["musematic", "multi-region-ops"],
      "templating": {
        "list": [
          {
            "current": { "selected": false, "text": "Prometheus", "value": "Prometheus" },
            "hide": 0,
            "includeAll": false,
            "label": "Datasource",
            "multi": false,
            "name": "datasource",
            "options": [],
            "query": "prometheus",
            "refresh": 1,
            "regex": "",
            "type": "datasource"
          }
        ]
      },
      "time": { "from": "now-6h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "Multi-Region Ops",
      "uid": "multi-region-ops",
      "version": 1
    }
