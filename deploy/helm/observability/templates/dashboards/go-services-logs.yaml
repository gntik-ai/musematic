apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-go-services-logs
  namespace: {{ include "musematic-observability.namespace" . }}
  labels:
{{ include "musematic-observability.dashboardLabels" . | indent 4 }}
data:
  go-services-logs.json: |
    {
      "annotations": { "list": [] },
      "description": "Go satellite service logs, gRPC errors, and pod restart correlation.",
      "editable": true,
      "graphTooltip": 1,
      "id": null,
      "panels": [
        { "id": 1, "type": "timeseries", "title": "Log Volume by Service", "datasource": { "type": "loki", "uid": "loki" }, "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 }, "targets": [ { "expr": "sum by (service) (rate({service=~\"runtime-controller|sandbox-manager|reasoning-engine|simulation-controller|hostops-broker|browser-worker\"}[5m]))", "refId": "A" } ] },
        { "id": 2, "type": "timeseries", "title": "Error Rate by Service", "datasource": { "type": "loki", "uid": "loki" }, "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 }, "targets": [ { "expr": "sum by (service) (rate({level=\"error\",service=~\"runtime-controller|sandbox-manager|reasoning-engine|simulation-controller|hostops-broker|browser-worker\"}[5m]))", "refId": "A" } ] },
        { "id": 3, "type": "timeseries", "title": "Pod Restarts Near Error Bursts", "datasource": { "type": "prometheus", "uid": "$prometheus" }, "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 }, "targets": [ { "expr": "sum by (pod) (increase(kube_pod_container_status_restarts_total{namespace=~\"platform-execution|platform-simulation\"}[15m]))", "refId": "A" } ] },
        { "id": 4, "type": "logs", "title": "gRPC Error Patterns", "datasource": { "type": "loki", "uid": "loki" }, "gridPos": { "h": 10, "w": 12, "x": 12, "y": 8 }, "targets": [ { "expr": "{level=\"error\",service=~\"$service\"} |= \"grpc\"", "refId": "A" } ], "options": { "dedupStrategy": "none", "enableLogDetails": true, "showLabels": true, "showTime": true, "sortOrder": "Descending" } }
      ],
      "refresh": "30s",
      "schemaVersion": 38,
      "tags": ["musematic", "logs", "go"],
      "templating": { "list": [
        { "name": "service", "type": "query", "datasource": { "type": "loki", "uid": "loki" }, "query": "label_values(service)", "regex": "runtime-controller|sandbox-manager|reasoning-engine|simulation-controller|hostops-broker|browser-worker", "includeAll": true, "multi": true, "current": { "selected": true, "text": "All", "value": "$__all" } },
        { "name": "prometheus", "type": "datasource", "query": "prometheus", "current": { "selected": false, "text": "Prometheus", "value": "Prometheus" } }
      ] },
      "time": { "from": "now-1h", "to": "now" },
      "timezone": "browser",
      "title": "D9 Go Satellite Service Logs",
      "uid": "d9-go-services-logs",
      "version": 1
    }
