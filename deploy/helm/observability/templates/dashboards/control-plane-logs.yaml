apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-control-plane-logs
  namespace: {{ include "musematic-observability.namespace" . }}
  labels:
{{ include "musematic-observability.dashboardLabels" . | indent 4 }}
data:
  control-plane-logs.json: |
    {
      "annotations": { "list": [] },
      "description": "Control-plane structured logs by bounded context, level, workspace, goal, and user.",
      "editable": true,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "Log Volume by Bounded Context",
          "datasource": { "type": "loki", "uid": "loki" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            { "expr": "sum by (bounded_context) (rate({bounded_context=~\"$bounded_context\",service=~\"api|scheduler|worker|ws|trust-certifier|context-engineering|projection-indexer|agentops-testing\"} | json | workspace_id=~\"$workspace\" | goal_id=~\"$goal\" | user_id=~\"$user\" [5m]))", "refId": "A" }
          ]
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Error Rate by Bounded Context",
          "datasource": { "type": "loki", "uid": "loki" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            { "expr": "sum by (bounded_context) (rate({level=\"error\",bounded_context=~\"$bounded_context\"} | json | workspace_id=~\"$workspace\" | goal_id=~\"$goal\" | user_id=~\"$user\" [5m]))", "refId": "A" }
          ]
        },
        {
          "id": 3,
          "type": "logs",
          "title": "Recent Errors",
          "datasource": { "type": "loki", "uid": "loki" },
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 8 },
          "targets": [
            { "expr": "{level=\"error\",bounded_context=~\"$bounded_context\"} | json | workspace_id=~\"$workspace\" | goal_id=~\"$goal\" | user_id=~\"$user\"", "refId": "A" }
          ],
          "options": { "dedupStrategy": "none", "enableLogDetails": true, "showLabels": true, "showTime": true, "sortOrder": "Descending" }
        },
        {
          "id": 4,
          "type": "logs",
          "title": "Log Entries Timeline",
          "datasource": { "type": "loki", "uid": "loki" },
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 18 },
          "targets": [
            { "expr": "{bounded_context=~\"$bounded_context\"} | json | workspace_id=~\"$workspace\" | goal_id=~\"$goal\" | user_id=~\"$user\"", "refId": "A" }
          ],
          "options": { "dedupStrategy": "none", "enableLogDetails": true, "prettifyLogMessage": true, "showLabels": true, "showTime": true, "sortOrder": "Descending" }
        }
      ],
      "refresh": "30s",
      "schemaVersion": 38,
      "tags": ["musematic", "logs", "control-plane"],
      "templating": {
        "list": [
          { "name": "bounded_context", "type": "query", "datasource": { "type": "loki", "uid": "loki" }, "query": "label_values(bounded_context)", "includeAll": true, "multi": true, "current": { "selected": true, "text": "All", "value": "$__all" } },
          { "name": "workspace", "type": "textbox", "label": "Workspace", "query": ".*", "current": { "selected": false, "text": ".*", "value": ".*" } },
          { "name": "goal", "type": "textbox", "label": "Goal", "query": ".*", "current": { "selected": false, "text": ".*", "value": ".*" } },
          { "name": "user", "type": "textbox", "label": "User", "query": ".*", "current": { "selected": false, "text": ".*", "value": ".*" } }
        ]
      },
      "time": { "from": "now-1h", "to": "now" },
      "timezone": "browser",
      "title": "D8 Control Plane Service Logs",
      "uid": "d8-control-plane-logs",
      "version": 1
    }
