apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-cross-service-errors
  namespace: {{ include "musematic-observability.namespace" . }}
  labels:
{{ include "musematic-observability.dashboardLabels" . | indent 4 }}
data:
  cross-service-errors.json: |
    {
      "annotations": { "list": [] },
      "description": "Cross-service error frequency, trends, clustering, and trace-linked log rows.",
      "editable": true,
      "graphTooltip": 1,
      "id": null,
      "panels": [
        { "id": 1, "type": "table", "title": "Top Errors by Frequency", "datasource": { "type": "loki", "uid": "loki" }, "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 }, "targets": [ { "expr": "topk(10, sum by (service, message) (rate({level=\"error\"} | json [1h])))", "refId": "A" } ] },
        { "id": 2, "type": "timeseries", "title": "Error Trend", "datasource": { "type": "loki", "uid": "loki" }, "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 }, "targets": [ { "expr": "sum by (service) (rate({level=\"error\"}[5m]))", "refId": "A" } ] },
        { "id": 3, "type": "heatmap", "title": "Affected Services Heatmap", "datasource": { "type": "loki", "uid": "loki" }, "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 }, "targets": [ { "expr": "sum by (service) (rate({level=\"error\"}[5m]))", "refId": "A" } ] },
        { "id": 4, "type": "table", "title": "Error Clusters by Pattern", "datasource": { "type": "loki", "uid": "loki" }, "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 }, "targets": [ { "expr": "sum by (service) (count_over_time({level=\"error\"} | pattern `<_>` [1h]))", "refId": "A" } ] },
        { "id": 5, "type": "logs", "title": "Trace-Linked Error Logs", "datasource": { "type": "loki", "uid": "loki" }, "gridPos": { "h": 10, "w": 24, "x": 0, "y": 16 }, "targets": [ { "expr": "{level=\"error\"} | json | trace_id != \"\"", "refId": "A" } ], "options": { "dedupStrategy": "none", "enableLogDetails": true, "showLabels": true, "showTime": true, "sortOrder": "Descending" } }
      ],
      "refresh": "30s",
      "schemaVersion": 38,
      "tags": ["musematic", "errors", "logs"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "timezone": "browser",
      "title": "D12 Cross-Service Error Overview",
      "uid": "d12-cross-service-errors",
      "version": 1
    }
