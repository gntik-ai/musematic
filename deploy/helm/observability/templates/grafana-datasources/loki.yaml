apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource-loki
  namespace: {{ include "musematic-observability.namespace" . }}
  labels:
{{ include "musematic-observability.dataSourceLabels" . | indent 4 }}
data:
  loki.yaml: |
    apiVersion: 1
    datasources:
      - name: Loki
        uid: loki
        type: loki
        access: proxy
        url: http://observability-loki-gateway.platform-observability.svc.cluster.local:80
        isDefault: false
        editable: false
        jsonData:
          # FR-515: trace_id opens the matching Jaeger trace; correlation_id
          # opens a Loki query scoped to the same correlation ID.
          derivedFields:
            - name: trace_id
              matcherRegex: '"trace_id"\s*:\s*"([A-Fa-f0-9]+)"'
              datasourceUid: jaeger
              url: "$${__value.raw}"
              urlDisplayLabel: "View trace"
            - name: correlation_id
              matcherRegex: '"correlation_id"\s*:\s*"([^"]+)"'
              datasourceUid: loki
              url: '{correlation_id="$${__value.raw}"}'
              urlDisplayLabel: "Filter logs"
