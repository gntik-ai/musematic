apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource-prometheus
  namespace: {{ include "musematic-observability.namespace" . }}
  labels:
{{ include "musematic-observability.dataSourceLabels" . | indent 4 }}
data:
  prometheus.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://kube-prometheus-stack-prometheus.platform-observability.svc.cluster.local:9090
        isDefault: true
        editable: false
