{{- /*
UPD-053 (106) US5 — alert when the Cloudflare Pages push CronJob has failed
10 consecutive ticks (≈10 minutes). The status page can stay reachable
because Cloudflare Pages keeps serving the last successful deploy, but
"last updated" badges go stale and on-call should investigate.
*/}}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: status-page-push-alerts
  namespace: {{ include "musematic-observability.namespace" . }}
  labels:
{{ include "musematic-observability.ruleLabels" . | indent 4 }}
spec:
  groups:
    - name: status-page.push
      interval: 1m
      rules:
        - alert: StatusPagePushStuck
          expr: |
            increase(kube_job_status_failed{job_name=~".*-status-pages-push-.*"}[15m]) >= 10
          for: 0m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: Cloudflare Pages status push CronJob is failing
            description: |
              The CronJob `<release>-status-pages-push` has logged 10 or
              more failed Job runs in the last 15 minutes. The Cloudflare
              Pages deployment will keep serving the last successful
              snapshot, but the page is going stale. Check the wrangler
              logs and the Cloudflare API token / Pages project settings.
            runbook_url: https://github.com/gntik-ai/musematic/blob/main/docs/operations/cloudflare-pages-status.md
