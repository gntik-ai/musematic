{{- if .Values.loki.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: loki-bucket-init
  namespace: {{ include "musematic-observability.namespace" . }}
  labels:
{{ include "musematic-observability.labels" . | indent 4 }}
  annotations:
    helm.sh/hook: pre-install
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  template:
    metadata:
      labels:
{{ include "musematic-observability.labels" . | indent 8 }}
        job: loki-bucket-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: aws
          image: amazon/aws-cli:2.17.57
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              endpoint_args=""
              if [ -n "${S3_ENDPOINT_URL:-}" ]; then
                endpoint_args="--endpoint-url ${S3_ENDPOINT_URL}"
              fi
              if ! aws s3api head-bucket --bucket platform-loki-chunks ${endpoint_args} >/dev/null 2>&1; then
                aws s3api create-bucket --bucket platform-loki-chunks ${endpoint_args}
              fi
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: minio-platform-credentials
                  key: S3_ACCESS_KEY
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-platform-credentials
                  key: S3_SECRET_KEY
            - name: AWS_DEFAULT_REGION
              value: us-east-1
            - name: S3_ENDPOINT_URL
              valueFrom:
                secretKeyRef:
                  name: minio-platform-credentials
                  key: S3_ENDPOINT_URL
{{- end }}
