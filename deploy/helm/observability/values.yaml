createNamespace: false

frontendNamespaces:
  - platform-control

networkPolicy:
  enabled: true
  platformNamespaces:
    - platform-control
    - platform-execution
    - platform-simulation
    - platform-data
    - platform-ui
  ingressControllerNamespaces:
    - ingress-nginx
  s3EgressCidrs:
    - 0.0.0.0/0

global:
  frontendNamespaces:
    - platform-control

opentelemetry-collector:
  fullnameOverride: otel-collector
  mode: deployment
  replicaCount: 2
  image:
    repository: otel/opentelemetry-collector-contrib
  command:
    name: otelcol-contrib
  serviceMonitor:
    enabled: false
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi
  ports:
    otlp:
      enabled: true
      containerPort: 4317
      servicePort: 4317
      protocol: TCP
      appProtocol: grpc
    otlp-http:
      enabled: true
      containerPort: 4318
      servicePort: 4318
      protocol: TCP
    jaeger-compact:
      enabled: false
    jaeger-thrift:
      enabled: false
    jaeger-grpc:
      enabled: false
    zipkin:
      enabled: false
    metrics:
      enabled: true
      containerPort: 8889
      servicePort: 8889
      protocol: TCP
  alternateConfig:
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      memory_limiter:
        check_interval: 5s
        limit_percentage: 80
        spike_limit_percentage: 25
      batch: {}
      transform/correlation:
        error_mode: ignore
        trace_statements:
          - context: span
            statements:
              - set(resource.attributes["correlation_id"], attributes["correlation_id"]) where attributes["correlation_id"] != nil
    exporters:
      prometheus:
        endpoint: 0.0.0.0:8889
      otlp/jaeger:
        endpoint: musematic-observability-jaeger-collector:4317
        tls:
          insecure: true
    service:
      extensions:
        - health_check
      pipelines:
        traces:
          receivers:
            - otlp
          processors:
            - memory_limiter
            - transform/correlation
            - batch
          exporters:
            - otlp/jaeger
        metrics:
          receivers:
            - otlp
          processors:
            - memory_limiter
            - batch
          exporters:
            - prometheus

kube-prometheus-stack:
  cleanPrometheusOperatorObjectNames: true
  grafana:
    adminPassword: admin
    plugins:
      - grafana-image-renderer
    sidecar:
      dashboards:
        enabled: true
        label: grafana_dashboard
        labelValue: "1"
        searchNamespace: platform-observability
      datasources:
        enabled: true
        label: grafana_datasource
        labelValue: "1"
        searchNamespace: platform-observability
  alertmanager:
    alertmanagerSpec:
      storage:
        volumeClaimTemplate:
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 5Gi
  prometheus:
    prometheusSpec:
      scrapeInterval: 15s
      retention: 15d
      ruleSelector:
        matchLabels:
          prometheus: musematic
      serviceMonitorSelector:
        matchLabels:
          prometheus: musematic
      podMonitorSelector:
        matchLabels:
          prometheus: musematic
      storageSpec:
        volumeClaimTemplate:
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 20Gi

jaeger:
  provisionDataStore:
    cassandra: false
    elasticsearch: false
    kafka: false
  agent:
    enabled: false
  collector:
    enabled: false
  query:
    enabled: false
  allInOne:
    enabled: true
    args:
      - --collector.otlp.enabled=true
    service:
      headless: false
      collector:
        otlp:
          grpc:
            name: otlp-grpc
          http:
            name: otlp-http
  storage:
    type: badger
    badger:
      ephemeral: false
      persistence:
        mountPath: /mnt/data
        useExistingPvcName: jaeger-badger
  persistence:
    enabled: true
    size: 5Gi

loki:
  enabled: true
  fullnameOverride: observability-loki
  deploymentMode: SingleBinary
  loki:
    auth_enabled: false
    commonConfig:
      replication_factor: 1
    limits_config:
      retention_period: 336h
    compactor:
      retention_enabled: true
      delete_request_store: s3
    storage:
      type: s3
      bucketNames:
        chunks: platform-loki-chunks
        ruler: platform-loki-chunks
        admin: platform-loki-chunks
      s3:
        endpoint: ${S3_ENDPOINT_URL}
        access_key_id: ${S3_ACCESS_KEY}
        secret_access_key: ${S3_SECRET_KEY}
        s3ForcePathStyle: ${S3_USE_PATH_STYLE}
        insecure: true
    schemaConfig:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: s3
          schema: v13
          index:
            prefix: loki_index_
            period: 24h
    rulerConfig:
      storage:
        type: s3
        s3:
          bucketnames: platform-loki-chunks
  singleBinary:
    replicas: 1
    persistence:
      enabled: true
      size: 20Gi
  read:
    replicas: 0
  write:
    replicas: 0
  backend:
    replicas: 0
  gateway:
    enabled: true
  extraArgs:
    - -config.expand-env=true
  extraEnv:
    - name: S3_ENDPOINT_URL
      valueFrom:
        secretKeyRef:
          name: minio-platform-credentials
          key: S3_ENDPOINT_URL
    - name: S3_ACCESS_KEY
      valueFrom:
        secretKeyRef:
          name: minio-platform-credentials
          key: S3_ACCESS_KEY
    - name: S3_SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: minio-platform-credentials
          key: S3_SECRET_KEY
    - name: S3_USE_PATH_STYLE
      valueFrom:
        secretKeyRef:
          name: minio-platform-credentials
          key: S3_USE_PATH_STYLE
          optional: true
  retention:
    hot: 336h
    cold: 2160h
  tenantRetentionOverrides: []

promtail:
  enabled: true
  daemonset:
    enabled: true
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
    fsGroup: 10001
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
  config:
    clients:
      - url: http://observability-loki:3100/loki/api/v1/push
    snippets:
      extraRelabelConfigs:
        - source_labels:
            - __meta_kubernetes_namespace
          regex: platform-control|platform-execution|platform-simulation|platform-data|platform-observability
          action: keep
      pipelineStages:
        - cri: {}
        - json:
            expressions:
              timestamp: timestamp
              level: level
              service: service
              bounded_context: bounded_context
              message: message
              trace_id: trace_id
              span_id: span_id
              correlation_id: correlation_id
              workspace_id: workspace_id
              goal_id: goal_id
              user_id: user_id
              execution_id: execution_id
        - labels:
            level:
            service:
            bounded_context:
        - timestamp:
            source: timestamp
            format: RFC3339Nano
        - replace:
            expression: 'Bearer [A-Za-z0-9\-_]+\.?[A-Za-z0-9\-_]*\.?[A-Za-z0-9\-_]*'
            replace: '[REDACTED_TOKEN]'
        - replace:
            expression: 'sk-[A-Za-z0-9]{32,}|api_key=[A-Za-z0-9]{16,}|ghp_[A-Za-z0-9]{36}|AKIA[0-9A-Z]{16}'
            replace: '[REDACTED_API_KEY]'
        - replace:
            expression: '[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}'
            replace: '[REDACTED_EMAIL]'
        - replace:
            expression: '\b[0-9]{3}-[0-9]{2}-[0-9]{4}\b'
            replace: '[REDACTED_SSN]'
        - replace:
            expression: '\b(?:[0-9][ -]*?){13,16}\b'
            replace: '[REDACTED_CARD]'
