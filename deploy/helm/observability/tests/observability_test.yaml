suite: observability dashboards and Loki alerts
templates:
  - templates/dashboards/control-plane-logs.yaml
  - templates/dashboards/platform-overview.yaml
  - templates/alerts/loki-alerts.yaml
capabilities:
  apiVersions:
    - loki.grafana.com/v1/LokiRule
tests:
  - it: renders D8 control-plane logs dashboard
    template: templates/dashboards/control-plane-logs.yaml
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.labels.grafana_dashboard
          value: "1"
      - isNotEmpty:
          path: data
  - it: renders platform overview dashboard
    template: templates/dashboards/platform-overview.yaml
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.labels.grafana_dashboard
          value: "1"
      - isNotEmpty:
          path: data
  - it: renders Loki alert rules when LokiRule is available
    template: templates/alerts/loki-alerts.yaml
    asserts:
      - isKind:
          of: LokiRule
      - equal:
          path: spec.groups[0].rules[3].alert
          value: AuditChainAnomaly
      - equal:
          path: spec.groups[0].rules[3].labels.incident_trigger
          value: audit_chain_anomaly
