suite: observability chart render contracts
templates:
  - templates/dashboards/audit-event-stream.yaml
  - templates/dashboards/billing.yaml
  - templates/dashboards/control-plane-logs.yaml
  - templates/dashboards/cost-governance.yaml
  - templates/dashboards/cost-intelligence.yaml
  - templates/dashboards/cross-service-errors.yaml
  - templates/dashboards/data-stores.yaml
  - templates/dashboards/fleet-health.yaml
  - templates/dashboards/frontend-web-logs.yaml
  - templates/dashboards/go-services-logs.yaml
  - templates/dashboards/goal-lifecycle.yaml
  - templates/dashboards/governance-pipeline.yaml
  - templates/dashboards/incident-response.yaml
  - templates/dashboards/localization.yaml
  - templates/dashboards/model-catalog.yaml
  - templates/dashboards/multi-region-ops.yaml
  - templates/dashboards/notifications-channels.yaml
  - templates/dashboards/platform-overview.yaml
  - templates/dashboards/privacy-compliance.yaml
  - templates/dashboards/reasoning-engine.yaml
  - templates/dashboards/security-compliance.yaml
  - templates/dashboards/self-correction.yaml
  - templates/dashboards/trust-content-moderation.yaml
  - templates/dashboards/workflow-execution.yaml
  - templates/alerts/execution-alerts.yaml
  - templates/alerts/fleet-alerts.yaml
  - templates/alerts/kafka-alerts.yaml
  - templates/alerts/loki-alerts.yaml
  - templates/alerts/reasoning-alerts.yaml
  - templates/alerts/service-alerts.yaml
  - templates/grafana-datasources/jaeger.yaml
  - templates/grafana-datasources/loki.yaml
  - templates/grafana-datasources/prometheus.yaml
  - templates/networkpolicy.yaml
capabilities:
  apiVersions:
    - loki.grafana.com/v1/LokiRule
tests:
  - it: renders every dashboard ConfigMap with the Grafana dashboard label
    asserts:
      - isKind:
          of: ConfigMap
        template: templates/dashboards/audit-event-stream.yaml
      - equal:
          path: metadata.labels.grafana_dashboard
          value: "1"
        template: templates/dashboards/audit-event-stream.yaml
      - equal:
          path: metadata.labels.grafana_dashboard
          value: "1"
        template: templates/dashboards/billing.yaml
      - equal:
          path: metadata.labels.grafana_dashboard
          value: "1"
        template: templates/dashboards/control-plane-logs.yaml
      - equal:
          path: metadata.labels.grafana_dashboard
          value: "1"
        template: templates/dashboards/cost-governance.yaml
      - equal:
          path: metadata.labels.grafana_dashboard
          value: "1"
        template: templates/dashboards/cost-intelligence.yaml
      - equal:
          path: metadata.labels.grafana_dashboard
          value: "1"
        template: templates/dashboards/cross-service-errors.yaml
      - equal:
          path: metadata.labels.grafana_dashboard
          value: "1"
        template: templates/dashboards/data-stores.yaml
      - equal:
          path: metadata.labels.grafana_dashboard
          value: "1"
        template: templates/dashboards/fleet-health.yaml
      - equal:
          path: metadata.labels.grafana_dashboard
          value: "1"
        template: templates/dashboards/frontend-web-logs.yaml
      - equal:
          path: metadata.labels.grafana_dashboard
          value: "1"
        template: templates/dashboards/go-services-logs.yaml
      - equal:
          path: metadata.labels.grafana_dashboard
          value: "1"
        template: templates/dashboards/goal-lifecycle.yaml
      - equal:
          path: metadata.labels.grafana_dashboard
          value: "1"
        template: templates/dashboards/governance-pipeline.yaml
      - equal:
          path: metadata.labels.grafana_dashboard
          value: "1"
        template: templates/dashboards/incident-response.yaml
      - equal:
          path: metadata.labels.grafana_dashboard
          value: "1"
        template: templates/dashboards/localization.yaml
      - equal:
          path: metadata.labels.grafana_dashboard
          value: "1"
        template: templates/dashboards/model-catalog.yaml
      - equal:
          path: metadata.labels.grafana_dashboard
          value: "1"
        template: templates/dashboards/multi-region-ops.yaml
      - equal:
          path: metadata.labels.grafana_dashboard
          value: "1"
        template: templates/dashboards/notifications-channels.yaml
      - equal:
          path: metadata.labels.grafana_dashboard
          value: "1"
        template: templates/dashboards/platform-overview.yaml
      - equal:
          path: metadata.labels.grafana_dashboard
          value: "1"
        template: templates/dashboards/privacy-compliance.yaml
      - equal:
          path: metadata.labels.grafana_dashboard
          value: "1"
        template: templates/dashboards/reasoning-engine.yaml
      - equal:
          path: metadata.labels.grafana_dashboard
          value: "1"
        template: templates/dashboards/security-compliance.yaml
      - equal:
          path: metadata.labels.grafana_dashboard
          value: "1"
        template: templates/dashboards/self-correction.yaml
      - equal:
          path: metadata.labels.grafana_dashboard
          value: "1"
        template: templates/dashboards/trust-content-moderation.yaml
      - equal:
          path: metadata.labels.grafana_dashboard
          value: "1"
        template: templates/dashboards/workflow-execution.yaml

  - it: renders alert rules with the Prometheus rule discovery label
    asserts:
      - equal:
          path: metadata.labels.prometheus-rule
          value: "1"
        template: templates/alerts/execution-alerts.yaml
      - equal:
          path: metadata.labels.prometheus-rule
          value: "1"
        template: templates/alerts/fleet-alerts.yaml
      - equal:
          path: metadata.labels.prometheus-rule
          value: "1"
        template: templates/alerts/kafka-alerts.yaml
      - equal:
          path: metadata.labels.prometheus-rule
          value: "1"
        template: templates/alerts/loki-alerts.yaml
      - equal:
          path: metadata.labels.prometheus-rule
          value: "1"
        template: templates/alerts/reasoning-alerts.yaml
      - equal:
          path: metadata.labels.prometheus-rule
          value: "1"
        template: templates/alerts/service-alerts.yaml
      - equal:
          path: spec.groups[0].rules[0].alert
          value: HighErrorLogRate
        template: templates/alerts/loki-alerts.yaml

  - it: renders Grafana datasource ConfigMaps with the sidecar label
    asserts:
      - equal:
          path: metadata.labels.grafana_datasource
          value: "1"
        template: templates/grafana-datasources/jaeger.yaml
      - equal:
          path: metadata.labels.grafana_datasource
          value: "1"
        template: templates/grafana-datasources/loki.yaml
      - equal:
          path: metadata.labels.grafana_datasource
          value: "1"
        template: templates/grafana-datasources/prometheus.yaml

  - it: renders the default NetworkPolicy isolation contract
    asserts:
      - isKind:
          of: NetworkPolicy
        template: templates/networkpolicy.yaml
      - equal:
          path: spec.podSelector
          value: {}
        template: templates/networkpolicy.yaml
      - contains:
          path: spec.policyTypes
          content: Ingress
        template: templates/networkpolicy.yaml
      - contains:
          path: spec.policyTypes
          content: Egress
        template: templates/networkpolicy.yaml
