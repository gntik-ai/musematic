# Preset: minimal
# Purpose: single-node dev/kind installs with persistent hot data and no S3 dependency.
# Capacity envelope: <= 1 GiB total stack RAM, 7d Prometheus retention, 24h Loki retention,
# approximately 100k metric series, 10 logs/s, and 100 traces/s.
networkPolicy:
  enabled: false

opentelemetry-collector:
  replicaCount: 1
  resources:
    requests:
      cpu: 50m
      memory: 96Mi
    limits:
      cpu: 250m
      memory: 192Mi

kube-prometheus-stack:
  grafana:
    replicas: 1
    plugins: []
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 256Mi
  alertmanager:
    alertmanagerSpec:
      replicas: 1
      storage:
        volumeClaimTemplate:
          spec:
            resources:
              requests:
                storage: 1Gi
  prometheus:
    prometheusSpec:
      replicas: 1
      retention: 7d
      resources:
        requests:
          cpu: 100m
          memory: 192Mi
        limits:
          cpu: 500m
          memory: 384Mi
      storageSpec:
        volumeClaimTemplate:
          spec:
            resources:
              requests:
                storage: 2Gi

jaeger:
  storage:
    type: badger
    badger:
      ephemeral: false
      persistence:
        mountPath: /mnt/data
        useExistingPvcName: jaeger-badger
  persistence:
    enabled: true
    size: 1Gi

loki:
  deploymentMode: SingleBinary
  loki:
    limits_config:
      retention_period: 24h
    compactor:
      retention_enabled: true
      delete_request_store: filesystem
    storage:
      type: filesystem
    schemaConfig:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: loki_index_
            period: 24h
    rulerConfig:
      storage:
        type: local
  singleBinary:
    replicas: 1
    persistence:
      enabled: true
      size: 2Gi
  extraEnv: []

promtail:
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
