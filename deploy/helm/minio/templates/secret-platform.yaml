{{- $name := include "musematic.minio.fullname" . -}}
{{- $namespace := include "musematic.minio.namespace" . -}}
{{- $internalEndpoint := ternary (printf "http://%s:9000" $name) (printf "http://%s-svc:9000" $name) .Values.standalone -}}
{{- $defaultEndpoint := .Values.s3.endpointUrl | default $internalEndpoint -}}
{{- $defaultAccessKey := .Values.s3.accessKey | default "platform" -}}
{{- $defaultSecretKey := .Values.s3.secretKey | default (randAlphaNum 32) -}}
apiVersion: v1
kind: Secret
metadata:
  name: minio-platform-credentials
  namespace: {{ $namespace }}
type: Opaque
stringData:
  S3_ENDPOINT_URL: {{ include "musematic.minio.lookupOrDefault" (dict "namespace" $namespace "name" "minio-platform-credentials" "key" "S3_ENDPOINT_URL" "default" $defaultEndpoint) | quote }}
  S3_ACCESS_KEY: {{ include "musematic.minio.lookupOrDefault" (dict "namespace" $namespace "name" "minio-platform-credentials" "key" "S3_ACCESS_KEY" "default" $defaultAccessKey) | quote }}
  S3_SECRET_KEY: {{ include "musematic.minio.lookupOrDefault" (dict "namespace" $namespace "name" "minio-platform-credentials" "key" "S3_SECRET_KEY" "default" $defaultSecretKey) | quote }}
  MINIO_ACCESS_KEY: {{ include "musematic.minio.lookupOrDefault" (dict "namespace" $namespace "name" "minio-platform-credentials" "key" "MINIO_ACCESS_KEY" "default" $defaultAccessKey) | quote }}
  MINIO_SECRET_KEY: {{ include "musematic.minio.lookupOrDefault" (dict "namespace" $namespace "name" "minio-platform-credentials" "key" "MINIO_SECRET_KEY" "default" $defaultSecretKey) | quote }}
