{{- if .Values.standalone }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "musematic.minio.fullname" . }}-data
  namespace: {{ include "musematic.minio.namespace" . }}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.storageClass | quote }}
  resources:
    requests:
      storage: {{ .Values.storageSize | quote }}
{{- end }}
