{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: minio-s3-client-access
  namespace: {{ include "musematic.minio.namespace" . }}
spec:
  podSelector:
    matchLabels:
      app: minio
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: platform-control
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: platform-execution
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: platform-simulation
      ports:
        - protocol: TCP
          port: 9000
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: minio-console-and-metrics-access
  namespace: {{ include "musematic.minio.namespace" . }}
spec:
  podSelector:
    matchLabels:
      app: minio
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: platform-observability
      ports:
        - protocol: TCP
          port: 9000
        - protocol: TCP
          port: 9001
{{- end }}
