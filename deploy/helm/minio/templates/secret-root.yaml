{{- $name := include "musematic.minio.fullname" . -}}
{{- $namespace := include "musematic.minio.namespace" . -}}
{{- $rootUser := include "musematic.minio.lookupOrDefault" (dict "namespace" $namespace "name" "minio-root-credentials" "key" "MINIO_ROOT_USER" "default" "admin") -}}
{{- $rootPassword := include "musematic.minio.lookupOrDefault" (dict "namespace" $namespace "name" "minio-root-credentials" "key" "MINIO_ROOT_PASSWORD" "default" (randAlphaNum 32)) -}}
apiVersion: v1
kind: Secret
metadata:
  name: minio-root-credentials
  namespace: {{ $namespace }}
type: Opaque
stringData:
  MINIO_ROOT_USER: {{ $rootUser | quote }}
  MINIO_ROOT_PASSWORD: {{ $rootPassword | quote }}
  config.env: |
    export MINIO_ROOT_USER={{ $rootUser }}
    export MINIO_ROOT_PASSWORD={{ $rootPassword }}
