clusterName: musematic-minio
namespace: platform-data
standalone: false
servers: 4
volumesPerServer: 4
storageClass: standard
storageSize: 100Gi
consoleEnabled: true

images:
  minio:
    repository: minio/minio
    tag: latest
  mc:
    repository: minio/mc
    tag: latest

resources:
  requests:
    cpu: "500m"
    memory: 1Gi
  limits:
    cpu: "1000m"
    memory: 2Gi

networkPolicy:
  enabled: true

buckets:
  executionArtifactsRetentionDays: 90
