apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "sandbox-manager.fullname" . }}-sandbox-allow
spec:
  podSelector:
    matchLabels:
      musematic/sandbox: "true"
      musematic/network-allowed: "true"
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: TCP
          port: 443
