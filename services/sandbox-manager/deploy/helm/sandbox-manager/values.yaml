replicaCount: 1

fullnameOverride: ""
nameOverride: ""

image:
  repository: ghcr.io/musematic/sandbox-manager
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  grpcPort: 50053
  httpPort: 8080

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

config:
  grpcPort: 50053
  httpPort: 8080
  postgresDsn: postgres://postgres:postgres@postgres:5432/musematic?sslmode=disable
  kafkaBrokers: localhost:9092
  minioEndpoint: http://minio:9000
  minioBucket: musematic-artifacts
  k8sNamespace: platform-execution
  defaultTimeout: 30s
  maxTimeout: 300s
  maxOutputSize: 10485760
  orphanScanInterval: 60s
  idleTimeout: 300s
  maxConcurrentSandboxes: 50
  k8sDryRun: false
