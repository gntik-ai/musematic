apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "runtime-controller.fullname" . }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: runtime-controller
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: platform-control
        - namespaceSelector:
            matchLabels:
              name: platform-execution
      ports:
        - protocol: TCP
          port: {{ .Values.grpcPort }}
    - from:
        - namespaceSelector:
            matchLabels:
              name: platform-observability
      ports:
        - protocol: TCP
          port: {{ .Values.httpPort }}
