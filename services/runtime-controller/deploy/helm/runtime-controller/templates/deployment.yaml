apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "runtime-controller.fullname" . }}
  labels:
    app.kubernetes.io/name: runtime-controller
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: runtime-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: runtime-controller
    spec:
      serviceAccountName: {{ include "runtime-controller.fullname" . }}
      containers:
        - name: runtime-controller
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: grpc
              containerPort: {{ .Values.grpcPort }}
            - name: http
              containerPort: {{ .Values.httpPort }}
          envFrom:
            - configMapRef:
                name: {{ include "runtime-controller.fullname" . }}-config
            - secretRef:
                name: {{ .Values.configSecretRef }}
          resources:
{{ toYaml .Values.resources | indent 12 }}
