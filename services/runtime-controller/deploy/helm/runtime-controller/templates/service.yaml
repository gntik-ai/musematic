apiVersion: v1
kind: Service
metadata:
  name: {{ include "runtime-controller.fullname" . }}
  labels:
    app.kubernetes.io/name: runtime-controller
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: runtime-controller
  ports:
    - name: grpc
      port: {{ .Values.grpcPort }}
      targetPort: grpc
    - name: http
      port: {{ .Values.httpPort }}
      targetPort: http
