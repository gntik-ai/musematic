syntax = "proto3";

package musematic.reasoning.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/musematic/reasoning-engine/api/grpc/v1;reasoningv1";

service ReasoningEngineService {
  rpc SelectReasoningMode(SelectReasoningModeRequest) returns (ReasoningModeConfig);
  rpc AllocateReasoningBudget(AllocateReasoningBudgetRequest) returns (ReasoningBudgetEnvelope);
  rpc GetReasoningBudgetStatus(GetBudgetStatusRequest) returns (BudgetStatusResponse);
  rpc StreamBudgetEvents(StreamBudgetEventsRequest) returns (stream BudgetEvent);
  rpc StreamReasoningTrace(stream ReasoningTraceEvent) returns (ReasoningTraceAck);
  rpc CreateTreeBranch(CreateTreeBranchRequest) returns (TreeBranchHandle);
  rpc EvaluateTreeBranches(EvaluateTreeBranchesRequest) returns (BranchSelectionResult);
  rpc StartDebateSession(StartDebateSessionRequest) returns (DebateSessionHandle);
  rpc SubmitDebateTurn(SubmitDebateTurnRequest) returns (DebateRoundResult);
  rpc FinalizeDebateSession(FinalizeDebateSessionRequest) returns (DebateSessionResult);
  rpc StartSelfCorrectionLoop(StartSelfCorrectionRequest) returns (SelfCorrectionHandle);
  rpc SubmitCorrectionIteration(CorrectionIterationEvent) returns (ConvergenceResult);
  rpc GetReasoningTrace(GetReasoningTraceRequest) returns (GetReasoningTraceResponse);
}

enum ReasoningMode {
  REASONING_MODE_UNSPECIFIED = 0;
  DIRECT = 1;
  CHAIN_OF_THOUGHT = 2;
  TREE_OF_THOUGHT = 3;
  REACT = 4;
  CODE_AS_REASONING = 5;
  DEBATE = 6;
  SELF_CORRECTION = 7;
}

message SelectReasoningModeRequest {
  string execution_id = 1;
  string task_brief = 2;
  string forced_mode = 3;
  BudgetConstraints budget_constraints = 4;
  optional double compute_budget = 7;
}

message BudgetConstraints {
  int64 max_tokens = 1;
  int64 max_rounds = 2;
  double max_cost = 3;
  int64 max_time_ms = 4;
}

message ReasoningModeConfig {
  ReasoningMode mode = 1;
  int32 complexity_score = 2;
  BudgetAllocation recommended_budget = 3;
  string rationale = 4;
}

message BudgetAllocation {
  int64 tokens = 1;
  int64 rounds = 2;
  double cost = 3;
  int64 time_ms = 4;
}

message AllocateReasoningBudgetRequest {
  string execution_id = 1;
  string step_id = 2;
  BudgetAllocation limits = 3;
  int64 ttl_seconds = 4;
}

message ReasoningBudgetEnvelope {
  string execution_id = 1;
  string step_id = 2;
  BudgetAllocation limits = 3;
  BudgetAllocation used = 4;
  string status = 5;
  google.protobuf.Timestamp allocated_at = 6;
}

message GetBudgetStatusRequest {
  string execution_id = 1;
  string step_id = 2;
}

message BudgetStatusResponse {
  ReasoningBudgetEnvelope envelope = 1;
}

message StreamBudgetEventsRequest {
  string execution_id = 1;
  string step_id = 2;
}

message BudgetEvent {
  string execution_id = 1;
  string step_id = 2;
  string event_type = 3;
  string dimension = 4;
  double current_value = 5;
  double max_value = 6;
  google.protobuf.Timestamp occurred_at = 7;
}

message ReasoningTraceEvent {
  string execution_id = 1;
  string step_id = 2;
  string event_id = 3;
  string event_type = 4;
  int32 sequence_num = 5;
  bytes payload = 6;
  google.protobuf.Timestamp occurred_at = 7;
}

message ReasoningTraceAck {
  string execution_id = 1;
  int32 total_received = 2;
  int32 total_persisted = 3;
  int32 total_dropped = 4;
  repeated string failed_event_ids = 5;
}

message CreateTreeBranchRequest {
  string tree_id = 1;
  string branch_id = 2;
  string hypothesis = 3;
  BudgetAllocation branch_budget = 4;
}

message TreeBranchHandle {
  string tree_id = 1;
  string branch_id = 2;
  string status = 3;
  google.protobuf.Timestamp created_at = 4;
}

message EvaluateTreeBranchesRequest {
  string tree_id = 1;
  string scoring_function = 2;
}

message BranchSelectionResult {
  string selected_branch_id = 1;
  double selected_quality = 2;
  int64 selected_token_cost = 3;
  repeated BranchSummary all_branches = 4;
  bool no_viable_branches = 5;
  string best_partial_branch_id = 6;
}

message BranchSummary {
  string branch_id = 1;
  string hypothesis = 2;
  double quality_score = 3;
  int64 token_cost = 4;
  string status = 5;
  double score = 6;
}

message StartDebateSessionRequest {
  string execution_id = 1;
  string debate_id = 2;
  repeated string participant_fqns = 3;
  int32 round_limit = 4;
  int64 per_turn_timeout_ms = 5;
  optional double compute_budget = 6;
  double consensus_epsilon = 7;
}

message SubmitDebateTurnRequest {
  string debate_id = 1;
  string agent_fqn = 2;
  string step_type = 3;
  string content = 4;
  double quality_score = 5;
  int64 tokens_used = 6;
  google.protobuf.Timestamp occurred_at = 7;
}

message DebateSessionHandle {
  string execution_id = 1;
  string debate_id = 2;
  string status = 3;
  int32 current_round = 4;
}

message DebateRoundResult {
  string debate_id = 1;
  int32 round_number = 2;
  string consensus_status = 3;
  bool debate_complete = 4;
  double compute_budget_used = 5;
  bool compute_budget_exhausted = 6;
}

message FinalizeDebateSessionRequest {
  string debate_id = 1;
}

message DebateSessionResult {
  string execution_id = 1;
  string debate_id = 2;
  string status = 3;
  bool consensus_reached = 4;
  double compute_budget_used = 5;
  bool compute_budget_exhausted = 6;
  string storage_key = 7;
}

message StartSelfCorrectionRequest {
  string loop_id = 1;
  string execution_id = 2;
  int32 max_iterations = 3;
  double cost_cap = 4;
  double epsilon = 5;
  bool escalate_on_budget_exceeded = 6;
  string step_id = 7;
  optional double compute_budget = 8;
  double degradation_threshold = 9;
}

message SelfCorrectionHandle {
  string loop_id = 1;
  string status = 2;
  google.protobuf.Timestamp started_at = 3;
}

message CorrectionIterationEvent {
  string loop_id = 1;
  double quality_score = 2;
  double cost = 3;
  int64 duration_ms = 4;
  string prior_answer = 5;
  string critique = 6;
  string refined_answer = 7;
  int32 iteration_num = 8;
}

enum ConvergenceStatus {
  CONVERGENCE_STATUS_UNSPECIFIED = 0;
  CONTINUE = 1;
  CONVERGED = 2;
  BUDGET_EXCEEDED = 3;
  ESCALATE_TO_HUMAN = 4;
}

message ConvergenceResult {
  ConvergenceStatus status = 1;
  int32 iteration_num = 2;
  double delta = 3;
  string loop_id = 4;
}

message GetReasoningTraceRequest {
  string execution_id = 1;
  string step_id = 2;
}

message GetReasoningTraceResponse {
  string execution_id = 1;
  string technique = 2;
  string status = 3;
  string storage_key = 4;
  int64 step_count = 5;
  double compute_budget_used = 6;
  bool consensus_reached = 7;
  bool stabilized = 8;
  bool degradation_detected = 9;
  bool compute_budget_exhausted = 10;
  string last_updated_at = 11;
  string effective_budget_scope = 12;
}
