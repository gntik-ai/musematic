openapi: 3.1.0
info:
  title: Authenticated Status & Subscription API
  version: "0.1.0"
  description: |
    Authenticated endpoints for the in-shell banner and the
    `/settings/status-subscriptions` page. Subject to standard JWT auth
    middleware. Self-service endpoints under `/api/v1/me/*` are scoped to
    `current_user` per Constitution Rule 46.

paths:
  /api/v1/me/platform-status:
    get:
      summary: Current platform status with user-specific affected-features context
      operationId: getMyPlatformStatus
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Status with the features-the-user-cares-about flag set
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MyPlatformStatus' }

  /api/v1/me/status-subscriptions:
    get:
      summary: List the current user's status subscriptions
      operationId: listMyStatusSubscriptions
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Subscriptions
          content:
            application/json:
              schema:
                type: object
                properties:
                  subscriptions:
                    type: array
                    items: { $ref: '#/components/schemas/MyStatusSubscription' }
    post:
      summary: Create a new subscription owned by the current user
      operationId: createMyStatusSubscription
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateMyStatusSubscriptionRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MyStatusSubscription' }

  /api/v1/me/status-subscriptions/{subscriptionId}:
    parameters:
      - in: path
        name: subscriptionId
        required: true
        schema: { type: string }
    patch:
      summary: Update scope or target
      operationId: updateMyStatusSubscription
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                scope_components:
                  type: array
                  items: { type: string }
                target: { type: string }
      responses:
        '200': { description: Updated }
        '404': { description: Not found or not owned by current user }
    delete:
      summary: Unsubscribe
      operationId: deleteMyStatusSubscription
      security: [{ bearerAuth: [] }]
      responses:
        '204': { description: Deleted }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    MyPlatformStatus:
      type: object
      properties:
        overall_state: { type: string }
        active_maintenance:
          oneOf:
            - { type: 'null' }
            - type: object
              properties:
                window_id: { type: string }
                ends_at: { type: string, format: date-time }
                blocks_writes: { type: boolean }
                affects_my_features:
                  type: array
                  items: { type: string }
                  description: Feature areas the current user works in that are affected.
        active_incidents:
          type: array
          items:
            type: object
            properties:
              id: { type: string }
              severity: { type: string }
              title: { type: string }
              affects_my_features:
                type: array
                items: { type: string }

    MyStatusSubscription:
      type: object
      properties:
        id: { type: string }
        channel: { type: string, enum: [email, webhook, slack] }
        target: { type: string }
        scope_components:
          type: array
          items: { type: string }
        health: { type: string, enum: [pending, healthy, unhealthy, unsubscribed] }
        confirmed_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }

    CreateMyStatusSubscriptionRequest:
      type: object
      required: [channel, target]
      properties:
        channel: { type: string, enum: [email, webhook, slack] }
        target: { type: string }
        scope_components:
          type: array
          items: { type: string }
