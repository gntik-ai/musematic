site_name: musematic
site_description: Multi-tenant agent orchestration platform — agent lifecycle, workflow execution, fleet coordination, trust governance.
site_url: https://gntik-ai.github.io/musematic/
repo_url: https://github.com/gntik-ai/musematic
repo_name: gntik-ai/musematic
edit_uri: edit/main/docs/
copyright: Copyright &copy; musematic contributors

docs_dir: docs
site_dir: site
exclude_docs: |
  README.md
  gen_env_vars.py
  gen_helm_values.py
  gen_openapi.py

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - navigation.path
    - toc.follow
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - announce.dismiss
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
    logo: material/graph-outline

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

plugins:
  - search:
      separator: '[\s\-\.]+'
  - gen-files:
      scripts:
        - docs/gen_env_vars.py
        - docs/gen_helm_values.py
        - docs/gen_openapi.py
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      languages:
        - locale: en
          name: English
          default: true
          build: true
        - locale: es
          name: Espanol
          build: true
          site_name: musematic
        - locale: de
          name: Deutsch
          build: true
          site_name: musematic
        - locale: fr
          name: Francais
          build: true
          site_name: musematic
        - locale: it
          name: Italiano
          build: true
          site_name: musematic
        - locale: zh
          name: Simplified Chinese (zh-CN)
          build: true
          site_name: musematic
  - redirects:
      redirect_maps:
        agents.md: developer-guide/building-agents.md
        development/structured-logging.md: developer-guide/structured-logging.md
        operations/grafana-metrics-logs-traces.md: operator-guide/observability.md
        integrations/webhook-verification.md: developer-guide/mcp-integration.md
        administration/audit-and-compliance.md: admin-guide/security-compliance.md
        administration/integrations-and-credentials.md: admin-guide/system-config.md
        features/074-security-compliance.md: release-notes/feature-074-security-compliance.md
        features/075-model-catalog-fallback.md: release-notes/feature-075-model-catalog-fallback.md
        features/076-privacy-compliance.md: release-notes/feature-076-privacy-compliance.md
        system-architecture-v3.md: architecture/system-architecture.md
        system-architecture-v5.md: architecture/system-architecture.md
        software-architecture-v3.md: architecture/software-architecture.md
        software-architecture-v5.md: architecture/software-architecture.md
        functional-requirements-revised-v4.md: functional-requirements-revised-v6.md
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            docstring_style: google

extra:
  version:
    provider: mike
    default: latest
  localized_sections:
    - getting-started
    - user-guide
    - admin-guide
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/gntik-ai/musematic
  generator: false

